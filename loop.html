<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
cursor:none;
font-family:monospace;
}

#bg{
position:absolute;
width:110%;
height:110%;
left:-5%;
top:-5%;

background:url("mask.jpg") center center/cover no-repeat;

filter:
brightness(0.12)
contrast(1.6)
grayscale(1);

transform-origin:center center;
transition:transform 8s linear;
}

#canvas{
position:absolute;
width:100%;
height:100%;
}

#noise{
position:absolute;
width:100%;
height:100%;

background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

opacity:0.05;

mix-blend-mode:screen;

pointer-events:none;
}

#symbol{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:180px;

color:white;

opacity:0.03;

pointer-events:none;

transition:2s;

}

#hint{

position:absolute;

bottom:60px;

width:100%;

text-align:center;

font-size:10px;

letter-spacing:8px;

opacity:0.08;

color:white;

transition:1s;

}

.flash{
animation:flash .08s;
}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>

<canvas id="canvas"></canvas>

<div id="noise"></div>

<div id="symbol">
∞
</div>

<div id="hint">
LOOP
</div>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const centerX =
canvas.width/2;

const centerY =
canvas.height/2;

const symbol =
document.getElementById("symbol");

const bg =
document.getElementById("bg");

let activated = false;

let progress = 0;

const trail = [];

document.addEventListener(
"mousemove",
(e)=>{

if(activated) return;

trail.push({

x:e.clientX,
y:e.clientY,
life:1

});

const dx =
e.clientX-centerX;

const dy =
e.clientY-centerY;

const leftLoop =
Math.pow(dx+130,2)/14000 +
Math.pow(dy,2)/8000;

const rightLoop =
Math.pow(dx-130,2)/14000 +
Math.pow(dy,2)/8000;

if(
(leftLoop > 0.75 && leftLoop < 1.25)
||
(rightLoop > 0.75 && rightLoop < 1.25)
){

progress += 0.4;

}

});

function drawTrail(){

ctx.fillStyle =
"rgba(0,0,0,0.04)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

for(
let i=trail.length-1;
i>=0;
i--
){

const p = trail[i];

p.life -= 0.012;

if(p.life<=0){

trail.splice(i,1);

continue;

}

ctx.beginPath();

ctx.fillStyle =
"rgba(255,255,255,"+
(p.life*0.18)+
")";

ctx.arc(

p.x,
p.y,

30*(1-p.life)+8,

0,
Math.PI*2

);

ctx.fill();

}

requestAnimationFrame(
drawTrail
);

}

drawTrail();

function update(){

if(activated) return;

const p =
Math.min(
progress/350,
1
);

symbol.style.opacity =
0.03 + p*0.65;

symbol.style.transform =
`translate(-50%,-50%) scale(${1+p*0.2})`;

if(p > 0.25){

document
.getElementById("hint")
.innerText =
"ПЕТЛЯ ПРОЯВЛЯЕТСЯ";

}

if(p > 0.55){

document
.getElementById("hint")
.innerText =
"ЦИКЛ ЗАМЫКАЕТСЯ";

}

if(p > 0.85){

document
.getElementById("hint")
.innerText =
"∞";

}

if(progress >= 350){

activate();

}

requestAnimationFrame(
update
);

}

update();

function activate(){

activated = true;

symbol.style.opacity = "1";

symbol.style.transition =
"transform 12s linear";

symbol.style.transform =
"translate(-50%,-50%) scale(1.3) rotate(720deg)";

bg.style.transform =
"rotate(8deg) scale(1.15)";

let flashes = 0;

const fx =
setInterval(()=>{

document.body
.classList
.add("flash");

setTimeout(()=>{

document.body
.classList
.remove("flash");

},80);

flashes++;

if(flashes>10){

clearInterval(fx);

setTimeout(()=>{

window.location.href =
"deeper.html";

},2500);

}

},400);

}

</script>

<script src="audio.js"></script>

</body>
</html>
