<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    cursor:none;
    font-family:monospace;
}

#bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url("mask.jpg") center center/cover no-repeat;

    filter:
    brightness(0.15)
    contrast(1.5)
    grayscale(1);

    transform:scale(1.04);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.08;
    mix-blend-mode:screen;
    pointer-events:none;
}

#scan{
    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
    );

    opacity:0.24;

    pointer-events:none;
}

#canvas{
    position:absolute;
    width:100%;
    height:100%;
}

#message{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    color:white;

    opacity:0.06;

    letter-spacing:8px;

    font-size:22px;

    transition:1s;

    text-align:center;

}

.flash{
    animation:flash 0.08s;
}

.shake{
    animation:shake 0.08s infinite;
}

@keyframes flash{
    50%{
        opacity:0;
    }
}

@keyframes shake{

    0%{
        transform:translate(0);
    }

    25%{
        transform:translate(-5px,2px);
    }

    50%{
        transform:translate(5px,-2px);
    }

    100%{
        transform:translate(0);
    }

}

</style>
</head>

<body>

<div id="bg"></div>

<canvas id="canvas"></canvas>

<div id="noise"></div>
<div id="scan"></div>

<div id="message">
    НЕ ВСЕ ДВИЖЕНИЯ СЛУЧАЙНЫ
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

const msg = document.getElementById("message");

let energy = 0;
let activated = false;

let points = [];

document.addEventListener("mousemove",(e)=>{

    const x = e.clientX;
    const y = e.clientY;

    // ТОЧКИ

    points.push({x,y});

    ctx.fillStyle = "rgba(255,255,255,0.16)";

    ctx.beginPath();

    ctx.arc(x,y,2,0,Math.PI*2);

    ctx.fill();

    // ЛИНИИ

    if(points.length > 1){

        let prev = points[points.length - 2];

        ctx.strokeStyle = "rgba(255,255,255,0.025)";

        ctx.lineWidth = 1;

        ctx.beginPath();

        ctx.moveTo(prev.x,prev.y);
        ctx.lineTo(x,y);

        ctx.stroke();

    }

    // РАССТОЯНИЕ ДО ЦЕНТРА

    const dx = x - centerX;
    const dy = y - centerY;

    const dist = Math.sqrt(dx*dx + dy*dy);

    // ЕСЛИ ВОДЯТ ВОКРУГ ЦЕНТРА

    if(dist < 180){

        energy += 1;

    }

    // ПРОЯВЛЕНИЕ

    if(energy > 60){

        msg.style.opacity = "0.18";

    }

    if(energy > 120){

        msg.style.opacity = "0.4";

        msg.innerText = "СИГНАЛ ОБНАРУЖЕН";

    }

    // АКТИВАЦИЯ

    if(energy > 220 && !activated){

        activated = true;

        activateSequence();

    }

    // РЕДКИЕ ВСПЫШКИ

    if(Math.random() > 0.992){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

});

// АКТИВАЦИЯ

function activateSequence(){

    document.body.classList.add("shake");

    msg.style.opacity = "1";

    msg.innerText = "ТЫ НАШЛА ВХОД";

    // РЕЗКИЙ ШУМ

    document.getElementById("noise").style.opacity = "0.22";

    // КРАСНЫЕ ВСПЫШКИ

    let flashes = 0;

    let fx = setInterval(()=>{

        document.body.style.background = flashes % 2
        ? "black"
        : "#200";

        flashes++;

        if(flashes > 10){

            clearInterval(fx);

            setTimeout(()=>{

                window.location.href = "secret.html";

            },1400);

        }

    },120);

}

// МЕДЛЕННОЕ ЗАТУХАНИЕ СЛЕДОВ

setInterval(()=>{

    ctx.fillStyle = "rgba(0,0,0,0.03)";

    ctx.fillRect(0,0,canvas.width,canvas.height);

},60);

</script>

<script src="audio.js"></script>

</body>
</html>
