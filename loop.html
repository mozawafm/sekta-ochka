<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
cursor:crosshair;
font-family:monospace;
color:white;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:black;
}

#text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70%;
max-width:800px;
text-align:center;
font-size:18px;
line-height:2;
letter-spacing:2px;
opacity:.85;
user-select:none;
pointer-events:none;
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:.08;
mix-blend-mode:screen;
pointer-events:none;
}

#status{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
font-size:11px;
letter-spacing:6px;
opacity:.15;
}

.progress-container{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:200px;
height:2px;
background:rgba(255,255,255,0.1);
z-index:30;
border-radius:2px;
overflow:hidden;
}

.progress-bar{
width:0%;
height:100%;
background:#d4c5a0;
transition:width 0.05s linear;
}

.hint{
position:fixed;
bottom:20px;
left:0;
right:0;
text-align:center;
font-size:9px;
letter-spacing:3px;
color:#6a5a4a;
opacity:0.3;
pointer-events:none;
}

.flash{
animation:flash .08s;
}

@keyframes flash{
50%{ opacity:0; }
}
</style>
</head>
<body>

<div id="bg"></div>

<div id="text">
И было сказано:
<br><br>
«Не ищи выход.<br>
Потому что выход становится входом.<br>
Не ищи начало.<br>
Потому что начало уже произошло.<br>
Кто увидел знак,<br>
тот увидел лишь знак.<br>
Кто увидел повторение,<br>
тот приблизился к пониманию».
<br><br>
216
</div>

<canvas id="cover"></canvas>

<div id="noise"></div>

<div id="status">ЗАПИСЬ ПОВРЕЖДЕНА</div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
<div class="hint">[ стирайте слой ]</div>

<script>
const canvas = document.getElementById("cover");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle = "black";
ctx.fillRect(0, 0, canvas.width, canvas.height);

let revealed = 0;
let activated = false;
let totalPixels = canvas.width * canvas.height;

const statusDiv = document.getElementById("status");
const progressBar = document.getElementById("progressBar");

const BRUSH_SIZE = 60;
const NEEDED = 250; // столько "мазков" нужно для активации

function erase(x,y){
if(activated) return;

ctx.globalCompositeOperation = "destination-out";
ctx.beginPath();
ctx.arc(x, y, BRUSH_SIZE, 0, Math.PI*2);
ctx.fill();

revealed++;

let percent = Math.min(100, Math.floor((revealed / NEEDED) * 100));
progressBar.style.width = percent + "%";

if(revealed > NEEDED * 0.3){
statusDiv.innerText = "ВОССТАНОВЛЕНИЕ";
}
if(revealed > NEEDED * 0.7){
statusDiv.innerText = "ЧТЕНИЕ";
}
if(revealed > NEEDED){
activate();
}
}

function activate(){
activated = true;
statusDiv.innerText = "СОВПАДЕНИЕ ПОДТВЕРЖДЕНО";

const text = document.getElementById("text");
const bg = document.getElementById("bg");
const noise = document.getElementById("noise");

setTimeout(()=>{
bg.style.background = "#200";
noise.style.opacity = "0.18";
text.style.transform = "translate(-50%,-250%)";
text.style.opacity = "0";
statusDiv.style.opacity = "0";
document.querySelector(".progress-container").style.opacity = "0";
document.querySelector(".hint").style.opacity = "0";
}, 1000);

let flashes = 0;
const fx = setInterval(()=>{
document.body.classList.add("flash");
setTimeout(()=> document.body.classList.remove("flash"), 80);
flashes++;
if(flashes > 12){
clearInterval(fx);
setTimeout(()=> window.location.href = "deeper.html", 2500);
}
}, 250);
}

// Мышь
canvas.addEventListener("mousemove", (e) => {
erase(e.clientX, e.clientY);
});

// Тач (мобильные)
canvas.addEventListener("touchmove", (e) => {
e.preventDefault();
erase(e.touches[0].clientX, e.touches[0].clientY);
});

window.addEventListener("resize", () => {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
ctx.fillStyle = "black";
ctx.fillRect(0, 0, canvas.width, canvas.height);
revealed = 0;
activated = false;
progressBar.style.width = "0%";
});
</script>

<script src="audio.js"></script>
</body>
</html>
