<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
cursor:none;
font-family:monospace;
color:white;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:black;
}

#text{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:70%;

max-width:800px;

text-align:center;

font-size:18px;

line-height:2;

letter-spacing:2px;

opacity:.85;

user-select:none;

}

#cover{

position:absolute;
width:100%;
height:100%;

}

#noise{

position:absolute;
width:100%;
height:100%;

background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

opacity:.08;

mix-blend-mode:screen;

pointer-events:none;

}

#status{

position:absolute;

bottom:50px;

width:100%;

text-align:center;

font-size:11px;

letter-spacing:6px;

opacity:.15;

transition:1s;

}

.flash{
animation:flash .08s;
}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>

<div id="text">

И было сказано:

<br><br>

«Не ищи выход.

Потому что выход становится входом.

Не ищи начало.

Потому что начало уже произошло.

Кто увидел знак,
тот увидел лишь знак.

Кто увидел повторение,
тот приблизился к пониманию».

<br><br>

216

</div>

<canvas id="cover"></canvas>

<div id="noise"></div>

<div id="status">
ЗАПИСЬ ПОВРЕЖДЕНА
</div>

<script>

const canvas =
document.getElementById("cover");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

ctx.fillStyle = "black";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

let revealed = 0;
let activated = false;

const status =
document.getElementById("status");

function erase(x,y){

if(activated) return;

ctx.globalCompositeOperation =
"destination-out";

ctx.beginPath();

ctx.arc(
x,
y,
28,
0,
Math.PI*2
);

ctx.fill();

revealed++;

if(revealed > 150){

status.innerText =
"ВОССТАНОВЛЕНИЕ";

}

if(revealed > 400){

status.innerText =
"ЧТЕНИЕ";

}

if(revealed > 800){

activate();

}

}

canvas.addEventListener(
"mousemove",
e=>{

erase(
e.clientX,
e.clientY
);

});

canvas.addEventListener(
"touchmove",
e=>{

erase(
e.touches[0].clientX,
e.touches[0].clientY
);

});

function activate(){

activated = true;

status.innerText =
"СОВПАДЕНИЕ ПОДТВЕРЖДЕНО";

let flashes = 0;

const fx =
setInterval(()=>{

document.body.classList.add(
"flash"
);

setTimeout(()=>{

document.body.classList.remove(
"flash"
);

},80);

flashes++;

if(flashes > 8){

clearInterval(fx);

setTimeout(()=>{

window.location.href =
"deeper.html";

},2000);

}

},250);

}

</script>

<script src="audio.js"></script>

</body>
</html>
