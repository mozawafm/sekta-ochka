<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
    color:white;
    cursor:none;
}

#bg{

    position:absolute;
    width:100%;
    height:100%;

    background:url("mask.jpg") center center/cover no-repeat;

    filter:
    brightness(0.18)
    contrast(1.4)
    grayscale(1);

    transform:scale(1.05);

}

#noise{

    position:absolute;
    width:100%;
    height:100%;

    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

    opacity:0.08;

    mix-blend-mode:screen;

    pointer-events:none;

}

#scan{

    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );

    opacity:0.3;

    pointer-events:none;

}

#center{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    width:90%;

}

#line{

    font-size:28px;

    letter-spacing:7px;

    opacity:0.9;

    transition:0.3s;

}

#sub{

    margin-top:30px;

    opacity:0.2;

    font-size:11px;

    letter-spacing:4px;

}

#hidden{

    position:absolute;

    bottom:30px;
    right:30px;

    opacity:0;

    font-size:11px;

    transition:1s;

}

.trail{

    position:absolute;

    width:3px;
    height:3px;

    background:white;

    border-radius:50%;

    pointer-events:none;

    opacity:0.2;

    animation:fade 1.2s linear forwards;

}

.flash{
    animation:flash 0.08s;
}

.shake{
    animation:shake 0.08s;
}

@keyframes fade{

    to{
        opacity:0;
        transform:scale(4);
    }

}

@keyframes flash{

    50%{
        opacity:0;
    }

}

@keyframes shake{

    0%{
        transform:translate(-50%,-50%);
    }

    25%{
        transform:translate(calc(-50% - 7px),calc(-50% + 2px));
    }

    50%{
        transform:translate(calc(-50% + 7px),calc(-50% - 2px));
    }

    100%{
        transform:translate(-50%,-50%);
    }

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="scan"></div>

<div id="center">

    <div id="line">
        ПОВТОР ПРОДОЛЖАЕТСЯ
    </div>

    <div id="sub">
        move slowly
    </div>

</div>

<div id="hidden">
    она уже была здесь
</div>

<script>

let hiddenUnlocked = false;

const line = document.getElementById("line");
const hidden = document.getElementById("hidden");
const center = document.getElementById("center");

const phrases = [

"ПОВТОР ПРОДОЛЖАЕТСЯ",
"НЕ ВЫКЛЮЧАЙ ЗАПИСЬ",
"ТЫ УЖЕ ВИДЕЛА ЭТО",
"СИГНАЛ НЕ ПРЕРЫВАЛСЯ",
"22:22",
"ОНА СМОТРИТ ЧЕРЕЗ ТЕБЯ"

];

// СЛЕДЫ КУРСОРА

document.addEventListener("mousemove",(e)=>{

    const trail = document.createElement("div");

    trail.className = "trail";

    trail.style.left = e.pageX + "px";
    trail.style.top = e.pageY + "px";

    document.body.appendChild(trail);

    setTimeout(()=>{

        trail.remove();

    },1200);

});

// РЕАКЦИЯ НА ДВИЖЕНИЕ

let moveCount = 0;

document.addEventListener("mousemove",()=>{

    moveCount++;

    // ГЛИТЧ ТЕКСТА

    if(moveCount % 30 === 0){

        center.classList.add("shake");

        line.innerText =
        phrases[
            Math.floor(Math.random()*phrases.length)
        ];

        setTimeout(()=>{

            center.classList.remove("shake");

        },120);

    }

    // РЕДКИЙ FLASH

    if(Math.random() > 0.985){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

    // СКРЫТОЕ СООБЩЕНИЕ

    if(moveCount > 180 && !hiddenUnlocked){

        hiddenUnlocked = true;

        hidden.style.opacity = "0.12";

    }

});

// СКРЫТЫЙ ПЕРЕХОД

hidden.onclick = () => {

    hidden.innerText = "доступ разрешен";

    setTimeout(()=>{

        window.location.href = "signal.html";

    },1400);

};

// СЛУЧАЙНЫЕ ГЛИТЧИ

setInterval(()=>{

    if(Math.random() > 0.8){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

},2800);

// РЕДКИЙ КАДР

setInterval(()=>{

    if(Math.random() > 0.93){

        document.getElementById("bg").style.backgroundImage =
        'url("girl.jpg")';

        setTimeout(()=>{

            document.getElementById("bg").style.backgroundImage =
            'url("mask.jpg")';

        },100);

    }

},5000);

// АВТОПЕРЕХОД

setTimeout(()=>{

    let r = Math.random();

    if(r > 0.7){

        window.location.href = "observe.html";

    }else if(r > 0.45){

        window.location.href = "glitch.html";

    }else{

        window.location.href = "hub.html";

    }

},26000);

</script>

<script src="audio.js"></script>

</body>
</html>
