<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    cursor:none;
    font-family:monospace;
}

#bg{

    position:absolute;
    width:100%;
    height:100%;

    background:url("mask.jpg") center center/cover no-repeat;

    filter:
    brightness(0.15)
    contrast(1.5)
    grayscale(1);

    transform:scale(1.05);

}

#noise{

    position:absolute;
    width:100%;
    height:100%;

    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

    opacity:0.08;

    mix-blend-mode:screen;

    pointer-events:none;

}

#scan{

    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
    );

    opacity:0.24;

    pointer-events:none;

}

#message{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    color:white;

    letter-spacing:8px;

    font-size:28px;

    opacity:0.12;

    transition:1s;

    text-align:center;

}

.point{

    position:absolute;

    width:4px;
    height:4px;

    background:white;

    border-radius:50%;

    opacity:0.16;

    pointer-events:none;

}

#lineCanvas{

    position:absolute;
    width:100%;
    height:100%;

}

.flash{
    animation:flash 0.08s;
}

.shake{
    animation:shake 0.08s infinite;
}

@keyframes flash{

    50%{
        opacity:0;
    }

}

@keyframes shake{

    0%{
        transform:translate(0);
    }

    25%{
        transform:translate(-5px,2px);
    }

    50%{
        transform:translate(5px,-2px);
    }

    100%{
        transform:translate(0);
    }

}

</style>
</head>

<body>

<div id="bg"></div>

<canvas id="lineCanvas"></canvas>

<div id="noise"></div>
<div id="scan"></div>

<div id="message">
    НЕ ВСЕ ДВИЖЕНИЯ СЛУЧАЙНЫ
</div>

<script>

const canvas = document.getElementById("lineCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let points = [];

let discovered = false;

const msg = document.getElementById("message");

// СЛЕДЫ

document.addEventListener("mousemove",(e)=>{

    const point = document.createElement("div");

    point.className = "point";

    point.style.left = e.clientX + "px";
    point.style.top = e.clientY + "px";

    document.body.appendChild(point);

    points.push({
        x:e.clientX,
        y:e.clientY
    });

    // ЛИНИИ

    if(points.length > 1){

        let p1 = points[points.length - 2];
        let p2 = points[points.length - 1];

        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        ctx.lineWidth = 1;

        ctx.beginPath();

        ctx.moveTo(p1.x,p1.y);
        ctx.lineTo(p2.x,p2.y);

        ctx.stroke();

    }

    // НЕ УДАЛЯЕМ СЛЕДЫ СРАЗУ

    setTimeout(()=>{

        point.style.opacity = "0";

    },6000);

    setTimeout(()=>{

        point.remove();

    },8000);

    // ГЛИТЧИ

    if(Math.random() > 0.985){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

    // ОБНАРУЖЕНИЕ

    if(points.length > 220 && !discovered){

        discovered = true;

        triggerDiscovery();

    }

});

// ОБНАРУЖЕНИЕ СКРЫТОГО

function triggerDiscovery(){

    document.body.classList.add("shake");

    msg.style.opacity = "0.95";

    msg.innerText = "ТЫ НАШЛА ВХОД";

    setTimeout(()=>{

        msg.innerText = "СИГНАЛ ПРИНЯТ";

    },3000);

    setTimeout(()=>{

        window.location.href = "secret.html";

    },7000);

}

// СЛУЧАЙНЫЕ ВСПЫШКИ

setInterval(()=>{

    if(Math.random() > 0.82){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

},3200);

</script>

<script src="audio.js"></script>

</body>
</html>
