<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
    cursor:none;
}

#bg{

    position:absolute;
    width:100%;
    height:100%;

    background:url("mask.jpg") center center/cover no-repeat;

    filter:
    brightness(0.2)
    contrast(1.5)
    grayscale(1);

    transform:scale(1.04);

}

#hiddenLayer{

    position:absolute;
    width:100%;
    height:100%;

    display:flex;

    align-items:center;
    justify-content:center;

    color:white;

    font-size:42px;

    letter-spacing:10px;

    opacity:0.9;

    text-align:center;

    pointer-events:none;

}

#cover{

    position:absolute;
    width:100%;
    height:100%;

    background:black;

}

#noise{

    position:absolute;
    width:100%;
    height:100%;

    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

    opacity:0.08;

    mix-blend-mode:screen;

    pointer-events:none;

}

#scan{

    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );

    opacity:0.3;

    pointer-events:none;

}

#hint{

    position:absolute;

    bottom:25px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    opacity:0.12;

    letter-spacing:4px;

    font-size:11px;

}

#next{

    position:absolute;

    bottom:60px;
    left:50%;

    transform:translateX(-50%);

    color:white;

    border:1px solid rgba(255,255,255,0.2);

    padding:14px 24px;

    opacity:0;

    transition:1s;

    cursor:pointer;

    letter-spacing:4px;

}

#next:hover{

    background:white;
    color:black;

}

.flash{
    animation:flash 0.08s;
}

@keyframes flash{

    50%{
        opacity:0;
    }

}

</style>
</head>

<body>

<div id="bg"></div>

<div id="hiddenLayer">
    ОНА УЖЕ ЗДЕСЬ
</div>

<canvas id="cover"></canvas>

<div id="noise"></div>
<div id="scan"></div>

<div id="hint">
    СОТРИТЕ ШУМ
</div>

<div id="next">
    ПРОДОЛЖИТЬ
</div>

<script>

const canvas = document.getElementById("cover");
const ctx = canvas.getContext("2d");

const next = document.getElementById("next");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ЧЕРНЫЙ СЛОЙ

ctx.fillStyle = "black";
ctx.fillRect(0,0,canvas.width,canvas.height);

// СТИРАНИЕ

let revealed = 0;

document.addEventListener("mousemove",(e)=>{

    ctx.globalCompositeOperation = "destination-out";

    ctx.beginPath();

    ctx.arc(
        e.clientX,
        e.clientY,
        50,
        0,
        Math.PI * 2
    );

    ctx.fill();

    revealed++;

    // ГЛИТЧ

    if(Math.random() > 0.97){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

    // ПОЯВЛЕНИЕ КНОПКИ

    if(revealed > 140){

        next.style.opacity = "0.5";

    }

});

// ПЕРЕХОД

next.onclick = () => {

    next.innerText = "ЗАГРУЗКА";

    setTimeout(()=>{

        let r = Math.random();

        if(r > 0.7){

            window.location.href = "signal.html";

        }else if(r > 0.45){

            window.location.href = "observe.html";

        }else{

            window.location.href = "hub.html";

        }

    },1400);

};

// РЕДКИЕ ВСПЫШКИ

setInterval(()=>{

    if(Math.random() > 0.84){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

},3200);

</script>

<script src="audio.js"></script>

</body>
</html>
