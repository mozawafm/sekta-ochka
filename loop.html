<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
cursor:none;
font-family:monospace;
}

#bg{
position:absolute;
width:100%;
height:100%;

background:url("mask.jpg") center center/cover no-repeat;

filter:
brightness(0.12)
contrast(1.6)
grayscale(1);

}

#symbol{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

color:white;

font-size:240px;

opacity:0.85;

pointer-events:none;

user-select:none;

}

#hint{

position:absolute;

bottom:60px;

width:100%;

text-align:center;

color:white;

font-size:12px;

letter-spacing:8px;

opacity:0.12;

pointer-events:none;

transition:1s;

}

#cover{

position:absolute;
width:100%;
height:100%;

}

#noise{

position:absolute;
width:100%;
height:100%;

background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

opacity:0.06;

mix-blend-mode:screen;

pointer-events:none;

}

.flash{
animation:flash .08s;
}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>

<div id="symbol">
∞
</div>

<canvas id="cover"></canvas>

<div id="noise"></div>

<div id="hint">
СТИРАЙ
</div>

<script>

const canvas =
document.getElementById("cover");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

// ЧЕРНЫЙ СЛОЙ

ctx.fillStyle = "black";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

let erased = 0;
let activated = false;

const hint =
document.getElementById("hint");

canvas.addEventListener(
"mousemove",
erase
);

canvas.addEventListener(
"touchmove",
function(e){

erase(e.touches[0]);

});

function erase(e){

if(activated) return;

ctx.globalCompositeOperation =
"destination-out";

ctx.beginPath();

ctx.arc(

e.clientX,
e.clientY,

70,
0,
Math.PI*2

);

ctx.fill();

erased++;

if(erased > 80){

hint.innerText =
"ПРОДОЛЖАЙ";

}

if(erased > 200){

hint.innerText =
"ПОЧТИ";

}

if(erased > 350){

activate();

}

}

function activate(){

activated = true;

hint.innerText =
"ЦИКЛ ОБНАРУЖЕН";

let flashes = 0;

const fx =
setInterval(()=>{

document.body
.classList
.add("flash");

setTimeout(()=>{

document.body
.classList
.remove("flash");

},80);

flashes++;

if(flashes > 8){

clearInterval(fx);

setTimeout(()=>{

window.location.href =
"deeper.html";

},2000);

}

},250);

}

</script>

<script src="audio.js"></script>

</body>
</html>
