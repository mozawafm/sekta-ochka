<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: 'Courier New', monospace;
        color: white;
        cursor: crosshair;
        height: 100vh;
        position: relative;
    }

    /* Фон */
    #bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        transition: all 1s ease;
    }

    /* Шум */
    #noise {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
        opacity: 0.06;
        mix-blend-mode: screen;
        pointer-events: none;
        transition: 0.5s;
    }

    /* Текст (скрыт под защитным слоем) */
    .text-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 750px;
        text-align: center;
        z-index: 5;
        opacity: 0;
        transition: opacity 1.5s ease;
        pointer-events: none;
    }

    .quote {
        font-size: 20px;
        line-height: 2;
        letter-spacing: 3px;
        color: rgba(255,255,255,0.85);
        text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .quote-number {
        font-size: 16px;
        margin-top: 40px;
        letter-spacing: 8px;
        color: #8a7a5a;
    }

    /* Canvas для стирания */
    #coverCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        cursor: crosshair;
    }

    /* Статус и прогресс */
    #status {
        position: fixed;
        bottom: 30px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        letter-spacing: 5px;
        opacity: 0.2;
        z-index: 15;
        transition: 0.3s;
        pointer-events: none;
    }

    .progress-container {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 250px;
        height: 2px;
        background: rgba(255,255,255,0.1);
        z-index: 25;
        border-radius: 2px;
        overflow: hidden;
        opacity: 0.5;
        transition: 0.3s;
    }

    .progress-bar {
        width: 0%;
        height: 100%;
        background: #d4c5a0;
        transition: width 0.05s linear;
        box-shadow: 0 0 5px #d4c5a0;
    }

    /* Подсказка */
    .hint {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 9px;
        letter-spacing: 3px;
        color: #6a5a4a;
        opacity: 0.3;
        z-index: 25;
        transition: 0.3s;
        pointer-events: none;
    }

    /* Эффекты */
    .flash {
        animation: flashAnim 0.08s;
    }

    @keyframes flashAnim {
        50% { opacity: 0; }
    }

    .pulse {
        animation: pulseAnim 0.3s ease-out;
    }

    @keyframes pulseAnim {
        0% { filter: brightness(1); }
        50% { filter: brightness(1.3); }
        100% { filter: brightness(1); }
    }

    .fade-out-text {
        animation: textFadeOut 1s forwards;
    }

    @keyframes textFadeOut {
        0% { opacity: 0.85; transform: translate(-50%, -50%); }
        100% { opacity: 0; transform: translate(-50%, -150%); }
    }

    /* Эффект "дрожания" при стирании */
    @keyframes slightShake {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(1px, -1px); }
        75% { transform: translate(-1px, 1px); }
    }

    .shake {
        animation: slightShake 0.05s infinite;
    }
</style>
</head>
<body>

<div id="bg"></div>
<div id="noise"></div>

<div class="text-container" id="textContainer">
    <div class="quote">
        И было сказано:
        <br><br>
        «Не ищи выход.<br>
        Потому что выход становится входом.<br>
        Не ищи начало.<br>
        Потому что начало уже произошло.<br>
        Кто увидел знак,<br>
        тот увидел лишь знак.<br>
        Кто увидел повторение,<br>
        тот приблизился к пониманию».
    </div>
    <div class="quote-number">216</div>
</div>

<canvas id="coverCanvas"></canvas>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>
<div class="hint" id="hint">[ стирайте защитный слой ]</div>
<div id="status">ЗАПИСЬ ПОВРЕЖДЕНА</div>

<script>
    // ============================================
    // НАСТРОЙКИ
    // ============================================
    const canvas = document.getElementById("coverCanvas");
    const ctx = canvas.getContext("2d");
    const progressBar = document.getElementById("progressBar");
    const statusDiv = document.getElementById("status");
    const hint = document.getElementById("hint");
    const textContainer = document.getElementById("textContainer");
    const bg = document.getElementById("bg");
    const noise = document.getElementById("noise");
    
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    let revealed = 0;
    let totalPixels = 0;
    let activated = false;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    
    // Параметры кисти
    const BRUSH_SIZE = 45;
    const REQUIRED_PERCENT = 65; // Нужно стереть 65% площади
    
    // ============================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================
    function initCanvas() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        
        // Рисуем чёрный защитный слой
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        // Добавляем текстуру на защитный слой (чтобы было видно, что стираешь)
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(30,30,40,0.3)";
        for (let i = 0; i < 800; i++) {
            ctx.fillRect(
                Math.random() * canvasWidth,
                Math.random() * canvasHeight,
                2,
                2
            );
        }
        
        // Добавляем надпись на защитный слой
        ctx.font = "bold 24px 'Courier New', monospace";
        ctx.fillStyle = "rgba(80,70,50,0.4)";
        ctx.textAlign = "center";
        ctx.fillText("ЗАЩИТНЫЙ СЛОЙ", canvasWidth/2, canvasHeight/2);
        
        ctx.font = "12px 'Courier New', monospace";
        ctx.fillStyle = "rgba(80,70,50,0.25)";
        ctx.fillText("216", canvasWidth/2, canvasHeight/2 + 50);
        
        // Подсчёт общего количества пикселей для прогресса (упрощённо)
        totalPixels = canvasWidth * canvasHeight;
    }
    
    // ============================================
    // ФУНКЦИЯ СТИРАНИЯ
    // ============================================
    function erase(x, y, isDrawingMotion = true) {
        if (activated) return;
        if (x < 0 || x > canvasWidth || y < 0 || y > canvasHeight) return;
        
        ctx.globalCompositeOperation = "destination-out";
        
        // Рисуем круг кистью
        ctx.beginPath();
        ctx.arc(x, y, BRUSH_SIZE, 0, Math.PI * 2);
        ctx.fill();
        
        // Добавляем случайные точки для более органичного стирания
        for (let i = 0; i < 12; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * BRUSH_SIZE;
            const offsetX = Math.cos(angle) * radius;
            const offsetY = Math.sin(angle) * radius;
            ctx.beginPath();
            ctx.arc(x + offsetX, y + offsetY, BRUSH_SIZE * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Обновляем прогресс
        if (!activated) {
            // Имитация прогресса — считаем количество стёртых пикселей (приблизительно)
            const erasedPixels = Math.PI * BRUSH_SIZE * BRUSH_SIZE;
            revealed += erasedPixels;
            
            let percent = Math.min(100, Math.floor((revealed / totalPixels) * 100 * 2.5));
            if (percent > REQUIRED_PERCENT) percent = REQUIRED_PERCENT;
            
            progressBar.style.width = percent + "%";
            
            // Обновляем статус в зависимости от прогресса
            if (percent >= 30 && percent < 60) {
                statusDiv.innerText = "ВОССТАНОВЛЕНИЕ";
                statusDiv.style.opacity = "0.3";
                hint.style.opacity = "0.4";
            } else if (percent >= 60 && percent < REQUIRED_PERCENT) {
                statusDiv.innerText = "ЧТЕНИЕ";
                statusDiv.style.opacity = "0.5";
                hint.style.opacity = "0.5";
            } else if (percent >= REQUIRED_PERCENT) {
                activate();
            }
            
            // Эффекты при стирании
            if (isDrawingMotion && percent > 20) {
                if (Math.random() > 0.85) {
                    document.body.classList.add("flash");
                    setTimeout(() => document.body.classList.remove("flash"), 80);
                }
                if (Math.random() > 0.92) {
                    noise.style.opacity = "0.12";
                    setTimeout(() => noise.style.opacity = "0.06", 150);
                }
            }
        }
    }
    
    // ============================================
    // АКТИВАЦИЯ (защитный слой стёрт)
    // ============================================
    function activate() {
        if (activated) return;
        activated = true;
        
        // Показываем текст
        textContainer.style.opacity = "0.95";
        
        // Финальные эффекты
        document.body.classList.add("flash");
        setTimeout(() => document.body.classList.remove("flash"), 80);
        
        for (let i = 0; i < 6; i++) {
            setTimeout(() => {
                document.body.classList.add("flash");
                setTimeout(() => document.body.classList.remove("flash"), 80);
            }, i * 120);
        }
        
        // Усиление шума
        noise.style.opacity = "0.18";
        
        // Изменение фона
        bg.style.background = "radial-gradient(circle at center, #1a0a0a 0%, #000000 100%)";
        
        // Плавно скрываем подсказки и прогресс
        progressBar.parentElement.style.opacity = "0";
        hint.style.opacity = "0";
        statusDiv.innerText = "СОВПАДЕНИЕ ПОДТВЕРЖДЕНО";
        statusDiv.style.opacity = "0.8";
        
        // Запись в localStorage
        let state = JSON.parse(localStorage.getItem('state') || '{}');
        if (!state.loop) {
            state.loop = { completed: 1, timestamp: Date.now() };
        } else {
            state.loop.completed++;
        }
        localStorage.setItem('state', JSON.stringify(state));
        
        // Переход на deeper.html
        setTimeout(() => {
            textContainer.classList.add("fade-out-text");
            statusDiv.style.opacity = "0";
            
            setTimeout(() => {
                window.location.href = "deeper.html";
            }, 1000);
        }, 2800);
    }
    
    // ============================================
    // ОБРАБОТЧИКИ МЫШИ И ТАЧА
    // ============================================
    function handleStart(e) {
        e.preventDefault();
        isDrawing = true;
        const coords = getCoordinates(e);
        lastX = coords.x;
        lastY = coords.y;
        erase(lastX, lastY, false);
        
        // Эффект дрожания
        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 100);
    }
    
    function handleMove(e) {
        if (!isDrawing || activated) return;
        e.preventDefault();
        
        const coords = getCoordinates(e);
        const x = coords.x;
        const y = coords.y;
        
        // Интерполяция между точками для плавного стирания
        const distance = Math.hypot(x - lastX, y - lastY);
        if (distance > 1) {
            const steps = Math.min(10, Math.ceil(distance / 5));
            for (let step = 1; step <= steps; step++) {
                const t = step / steps;
                const ix = lastX + (x - lastX) * t;
                const iy = lastY + (y - lastY) * t;
                erase(ix, iy, true);
            }
        }
        
        erase(x, y, true);
        lastX = x;
        lastY = y;
    }
    
    function handleEnd(e) {
        isDrawing = false;
    }
    
    function getCoordinates(e) {
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        
        x = Math.max(0, Math.min(canvasWidth, x));
        y = Math.max(0, Math.min(canvasHeight, y));
        
        return { x, y };
    }
    
    // ============================================
    // ЗАПУСК
    // ============================================
    initCanvas();
    
    canvas.addEventListener("mousedown", handleStart);
    window.addEventListener("mousemove", handleMove);
    window.addEventListener("mouseup", handleEnd);
    
    canvas.addEventListener("touchstart", handleStart);
    window.addEventListener("touchmove", handleMove);
    window.addEventListener("touchend", handleEnd);
    
    // Защита от перетаскивания
    canvas.addEventListener("dragstart", (e) => e.preventDefault());
    
    // Консольное сообщение
    console.log("%c━━━━━━━━━━━━━━━━━━━━", "color: #d4c5a0");
    console.log("%cСТИРАЙТЕ ЗАЩИТНЫЙ СЛОЙ", "color: #8a7a5a; font-size: 12px;");
    console.log("%c216", "color: #6a5a4a; font-size: 10px;");
    console.log("%c━━━━━━━━━━━━━━━━━━━━", "color: #d4c5a0");
</script>

<script src="audio.js"></script>
</body>
</html>
