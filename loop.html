<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>loop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    cursor:none;
    font-family:monospace;
}

#bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url("mask.jpg") center center/cover no-repeat;

    filter:
    brightness(0.15)
    contrast(1.5)
    grayscale(1);

    transform:scale(1.04);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.08;
    mix-blend-mode:screen;
    pointer-events:none;
}

#scan{
    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
    );

    opacity:0.24;

    pointer-events:none;
}

#canvas{
    position:absolute;
    width:100%;
    height:100%;
}

#message{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    color:white;

    opacity:0.08;

    letter-spacing:8px;

    font-size:22px;

    transition:1s;

    text-align:center;

    pointer-events:none;

}

.flash{
    animation:flash 0.08s;
}

@keyframes flash{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="bg"></div>

<canvas id="canvas"></canvas>

<div id="noise"></div>
<div id="scan"></div>

<div id="message">
НЕ ВСЕ ДВИЖЕНИЯ СЛУЧАЙНЫ
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

const radius = 180;

const msg = document.getElementById("message");

let activated = false;
let rotation = 0;

const visited = new Set();

const trail = [];

document.addEventListener("mousemove",(e)=>{

    const x = e.clientX;
    const y = e.clientY;

    trail.push({
        x:x,
        y:y,
        life:1
    });

    const dx = x - centerX;
    const dy = y - centerY;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < radius + 60 && dist > radius - 60){

        const angle =
        Math.atan2(dy,dx);

        const segment =
        Math.floor(
            ((angle + Math.PI) /
            (Math.PI*2)) * 72
        );

        visited.add(segment);

    }

});

function draw(){

    requestAnimationFrame(draw);

    ctx.fillStyle =
    "rgba(0,0,0,0.04)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let i=trail.length-1;i>=0;i--){

        let p = trail[i];

        p.life -= 0.01;

        if(p.life <= 0){

            trail.splice(i,1);

            continue;

        }

        ctx.beginPath();

        ctx.fillStyle =
        "rgba(255,255,255," +
        (p.life*0.25) +
        ")";

        ctx.arc(
            p.x,
            p.y,
            10 + (1-p.life)*20,
            0,
            Math.PI*2
        );

        ctx.fill();

    }

    const progress =
    visited.size / 72;

    if(progress > 0.15){

        msg.style.opacity =
        0.15 + progress*0.6;
    }

    if(progress > 0.35){

        msg.innerText =
        "КРУГ ПРОЯВЛЯЕТСЯ";
    }

    if(progress > 0.65){

        msg.innerText =
        "ЦИКЛ НЕ ЗАВЕРШЕН";
    }

    if(progress > 0.9){

        msg.innerText =
        "ТЫ УЖЕ БЫЛА ЗДЕСЬ";
    }

    ctx.save();

    ctx.translate(
        centerX,
        centerY
    );

    if(progress > 0.9){

        rotation += 0.003;
    }

    ctx.rotate(rotation);

    ctx.beginPath();

    ctx.strokeStyle =
    "rgba(255,255,255," +
    Math.min(progress,1) +
    ")";

    ctx.lineWidth = 3;

    ctx.arc(
        0,
        0,
        radius,
        0,
        Math.PI*2*progress
    );

    ctx.stroke();

    if(progress > 0.9){

        ctx.beginPath();

        ctx.strokeStyle =
        "rgba(255,255,255,0.4)";

        ctx.lineWidth = 1;

        ctx.arc(
            0,
            0,
            radius+25,
            0,
            Math.PI*2
        );

        ctx.stroke();

    }

    ctx.restore();

    if(progress > 0.98 && !activated){

        activated = true;

        activateSequence();

    }

}

function activateSequence(){

    msg.innerText =
    "ВХОД ОБНАРУЖЕН";

    document.getElementById("noise")
    .style.opacity = "0.2";

    let flashes = 0;

    const fx = setInterval(()=>{

        document.body.classList.add(
            "flash"
        );

        setTimeout(()=>{

            document.body.classList.remove(
                "flash"
            );

        },80);

        flashes++;

        if(flashes > 8){

            clearInterval(fx);

            setTimeout(()=>{

                window.location.href =
                "question.html";

            },1200);

        }

    },250);

}

draw();

</script>

<script src="audio.js"></script>

</body>
</html>
