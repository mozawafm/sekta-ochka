<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>secret</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:monospace;
    cursor:none;
}

#bg{

    position:absolute;
    width:100%;
    height:100%;

    background:url("garage.jpg") center center/cover no-repeat;

    filter:
    brightness(0.08)
    contrast(1.6)
    grayscale(1);

    transform:scale(1.08);

}

#noise{

    position:absolute;
    width:100%;
    height:100%;

    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

    opacity:0.10;

    mix-blend-mode:screen;

    pointer-events:none;

}

#scan{

    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
    );

    opacity:0.25;

    pointer-events:none;

}

#center{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:90%;

    text-align:center;

}

#line{

    font-size:30px;

    letter-spacing:8px;

    opacity:0;

    transition:2s;

}

#memory{

    margin-top:40px;

    font-size:13px;

    letter-spacing:3px;

    opacity:0;

    transition:2s;

}

#small{

    margin-top:60px;

    opacity:0;

    font-size:10px;

    letter-spacing:4px;

    transition:2s;

}

.flash{
    animation:flash 0.08s;
}

@keyframes flash{

    50%{
        opacity:0;
    }

}

</style>
</head>

<body>

<script>

// ДОСТУП ТОЛЬКО ЧЕРЕЗ КОД

if(
localStorage.getItem("secret_access")
!== "granted"
){

    window.location.replace(
    "hub.html"
    );

}

localStorage.removeItem(
"secret_access"
);

</script>

<div id="bg"></div>
<div id="noise"></div>
<div id="scan"></div>

<div id="center">

    <div id="line">
        ДОСТУП РАЗРЕШЕН
    </div>

    <div id="memory"></div>

    <div id="small">
        запись не была удалена
    </div>

</div>

<script>

const state =
JSON.parse(
localStorage.getItem("state")
) || {};

const line =
document.getElementById("line");

const memory =
document.getElementById("memory");

const small =
document.getElementById("small");

setTimeout(()=>{

    line.style.opacity = "0.9";

},1500);

setTimeout(()=>{

    memory.style.opacity = "0.45";

},3500);

setTimeout(()=>{

    small.style.opacity = "0.18";

},6000);

if(state.memory==="garage"){

    memory.innerText =
    "ты помнишь место";

}

else if(state.memory==="mask"){

    memory.innerText =
    "ты помнишь наблюдателя";

}

else if(state.memory==="face"){

    memory.innerText =
    "ты помнишь слишком много";

}

else if(state.memory==="nothing"){

    memory.innerText =
    "ты ничего не помнишь";

}

else if(state.memory==="not_me"){

    memory.innerText =
    "это действительно было не с тобой";

}

else{

    memory.innerText =
    "запись повреждена";

}

setInterval(()=>{

    if(Math.random()>0.84){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

},3500);

setTimeout(()=>{

    line.innerText =
    "СОВПАДЕНИЕ ПОДТВЕРЖДЕНО";

},10000);

setTimeout(()=>{

    small.innerText =
    "наблюдение продолжается";

},14000);

// ПОСЛЕ СЕКРЕТНОЙ СТРАНИЦЫ НЕТ ВОЗВРАТА В SECRET

setTimeout(()=>{

    window.location.href =
    "final.html";

},22000);

</script>

<script src="audio.js"></script>

</body>
</html>
