<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>secret</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:monospace;
    overflow:hidden;
}

#bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url("mask.png") center center/contain no-repeat;
    opacity:0.08;
    filter:blur(1px);
}

#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:80%;
}

#line{
    font-size:22px;
    letter-spacing:2px;
}

#small{
    margin-top:30px;
    opacity:0.4;
    font-size:13px;
}

.flash{
    animation:flash 0.15s;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div id="bg"></div>

<div id="container">

    <div id="line">
        распознавание...
    </div>

    <div id="small">
        teo867102
    </div>

</div>

<script>

// STATE
let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {
        visits:0,
        trust:0,
        path:"",
        secrets:0,
        unlocked:false
    };

}

// 🔥 ГЛАВНОЕ
state.unlocked = true;

// усиливаем trust
state.trust += 50;

// сохраняем
localStorage.setItem("state", JSON.stringify(state));

const line = document.getElementById("line");

// ЭТАПЫ
setTimeout(()=>{

    line.innerText = "совпадение найдено";

},3000);

setTimeout(()=>{

    document.body.classList.add("flash");

},5000);

setTimeout(()=>{

    line.innerText = "доступ расширен";

},7000);

setTimeout(()=>{

    line.innerText = "она помнит";

},10000);

setTimeout(()=>{

    line.innerText = "не возвращай маску";

},13000);

// 🔥 КЛЮЧЕВОЙ МОМЕНТ
setTimeout(()=>{

    let r = Math.random();

    // РЕДКИЙ LOOP
    if(r > 0.75){

        window.location.href = "loop.html";

    // РЕДКИЙ TIME
    }else if(r > 0.45){

        window.location.href = "time.html";

    // ENTER
    }else{

        window.location.href = "enter.html";

    }

},17000);

</script>

<script src="audio.js"></script>

</body>
</html>
