<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>question</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
cursor:none;
}

#container{
text-align:center;
width:90%;
max-width:600px;
}

#title{
font-size:28px;
letter-spacing:8px;
margin-bottom:40px;
opacity:.9;
}

input{

width:100%;
max-width:420px;

padding:15px;

background:black;

border:1px solid rgba(255,255,255,.25);

color:white;

font-family:monospace;

font-size:18px;

text-align:center;

outline:none;

}

#msg{

margin-top:25px;

min-height:20px;

font-size:12px;

letter-spacing:4px;

opacity:.5;

}

#reset{

display:none;

margin:30px auto 0;

padding:14px 28px;

border:1px solid rgba(255,255,255,.25);

background:black;

color:white;

font-family:monospace;

letter-spacing:4px;

cursor:pointer;

transition:.25s;

}

#reset:hover{

background:white;
color:black;

}

.flash{

animation:flash .08s;

}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="container">

<div id="title">
ВОПРОС
</div>

<input
id="answer"
type="text"
autocomplete="off"
spellcheck="false"
>

<div id="msg"></div>

<button id="reset">
ОБНУЛИТЬ
</button>

</div>

<script>

const input =
document.getElementById("answer");

const msg =
document.getElementById("msg");

const reset =
document.getElementById("reset");

input.focus();

input.addEventListener("keydown", function(e){

if(e.key !== "Enter") return;

const value =
input.value.trim().toLowerCase();

if(value === "ответ"){

window.location.href =
"loop.html";

return;

}

if(value === "тео867102"){

localStorage.setItem(
"secret_access",
"granted"
);

window.location.href =
"secret.html";

return;

}

msg.innerText =
"ДАННЫЕ ИСКАЖЕНЫ";

reset.style.display =
"inline-block";

document.body.classList.add("flash");

setTimeout(()=>{

document.body.classList.remove("flash");

},100);

input.value = "";
input.focus();

});

reset.onclick = function(){

window.location.href =
"hub.html";

};

</script>

<script src="audio.js"></script>

</body>
</html>
