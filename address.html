<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>address</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
cursor:none;
}

#bg{

position:absolute;
width:100%;
height:100%;

background:url("garage.jpg") center center/cover no-repeat;

filter:
brightness(0.08)
contrast(1.8)
grayscale(1);

transform:scale(1.05);

}

#center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#line{

font-size:26px;

letter-spacing:6px;

opacity:0;

transition:2s;

}

#sub{

margin-top:35px;

font-size:13px;

letter-spacing:4px;

opacity:0;

transition:2s;

}

#coords{

margin-top:50px;

font-size:12px;

letter-spacing:3px;

opacity:0;

transition:2s;

}

.flash{

animation:flash .08s;

}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>

<div id="center">

<div id="line"></div>

<div id="sub"></div>

<div id="coords"></div>

</div>

<script>

const line =
document.getElementById("line");

const sub =
document.getElementById("sub");

const coords =
document.getElementById("coords");

const messages = [

"адрес найден",

"адрес удален",

"адрес изменен",

"адрес больше не существует"

];

line.innerText =
messages[
Math.floor(
Math.random()*messages.length
)
];

setTimeout(()=>{

line.style.opacity=".9";

},1000);

setTimeout(()=>{

sub.innerText =
"гараж №216";

sub.style.opacity=".6";

},3500);

setTimeout(()=>{

coords.innerText =
"61.432 / 22.216";

coords.style.opacity=".35";

},6500);

setTimeout(()=>{

coords.innerText =
"место уже было посещено";

},10000);

setTimeout(()=>{

coords.innerText =
"не нужно искать";

},14000);

setInterval(()=>{

if(Math.random()>.87){

document.body.classList.add("flash");

setTimeout(()=>{

document.body.classList.remove("flash");

},80);

}

},3000);

setTimeout(()=>{

window.location.href="hub.html";

},20000);

</script>

<script src="audio.js"></script>

</body>
</html>
