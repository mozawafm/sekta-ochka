<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>invite</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: monospace;
}

#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("garage.jpg") center center/cover no-repeat;
    filter: brightness(0.18) contrast(1.3) grayscale(0.7);
    transform: scale(1.04);
}

#noise {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity: 0.05;
    mix-blend-mode: screen;
    pointer-events: none;
}

#chat {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    height: calc(100vh - 140px);
    overflow-y: auto;
    padding-right: 10px;
    padding-bottom: 20px;
    box-sizing: border-box;
}

#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

.msg {
    padding: 14px;
    margin-bottom: 14px;
    line-height: 1.7;
    animation: fade 0.4s forwards;
    word-wrap: break-word;
}

.bot {
    max-width: 70%;
    background: rgba(255,255,255,0.03);
    border-left: 1px solid rgba(255,255,255,0.15);
    margin-right: auto;
}

.you {
    max-width: 70%;
    background: rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.35);
    margin-left: auto;
    text-align: right;
}

.system {
    text-align: center;
    opacity: 0.35;
    font-size: 12px;
    letter-spacing: 3px;
    background: none;
}

.typing {
    opacity: 0.35;
    font-style: italic;
}

#inputWrap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    display: flex;
    gap: 10px;
    z-index: 100;
}

#input {
    flex: 1;
    background: black;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
}

#input:focus { border-color: rgba(255,255,255,0.4); }

#send {
    width: 140px;
    background: black;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    font-family: monospace;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.25s;
}

#send:hover { background: white; color: black; }

#aiStatus {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 10px;
    opacity: 0.3;
    z-index: 100;
    background: black;
    padding: 4px 8px;
    border-radius: 4px;
}

@keyframes fade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="chat"></div>
<div id="inputWrap">
    <input id="input" autocomplete="off" spellcheck="false" placeholder="введите сообщение">
    <button id="send">ОТПРАВИТЬ</button>
</div>
<div id="aiStatus">🤖 AI: готов</div>

<script>
// ============================================
// ВСТАВЬ СВОЙ API КЛЮЧ ОТ GROQ СЮДА
// Получить: https://console.groq.com
// ============================================
const GROQ_API_KEY = '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';

// ============================================
// ВСЁ ОСТАЛЬНОЕ
// ============================================
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const aiStatus = document.getElementById("aiStatus");

let visits = parseInt(localStorage.getItem("invite_visits") || "0");
visits++;
localStorage.setItem("invite_visits", visits);

// История сообщений для контекста
let messageHistory = [];

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function animateTyping(element, text, delay = 25) {
    element.innerHTML = '';
    for (let i = 0; i < text.length; i++) {
        element.innerHTML += text[i];
        await new Promise(r => setTimeout(r, delay));
        chat.scrollTop = chat.scrollHeight;
    }
}

// ГЛАВНАЯ ФУНКЦИЯ - ЗАПРОС К GROQ (без локальных ответов)
async function getAIReply(userMessage) {
    try {
        aiStatus.innerText = "🤔 AI: думаю...";
        
        // Собираем последние 5 сообщений для контекста
        const recentHistory = messageHistory.slice(-5);
        const messages = [
            {
                role: "system",
                content: `Ты — загадочный голос из заброшенного гаража. Твои правила:
- Отвечай коротко, 1-2 предложения, максимум 20 слов
- Используй слова: сигнал, архив, наблюдение, совпадение, запись
- Никогда не говори что ты ИИ или нейросеть
- Будь загадочным, иногда отвечай вопросом на вопрос
- Отвечай на русском языке
- Если вопрос про тебя самого — уходи от прямого ответа
- Поддерживай мрачную, мистическую атмосферу`
            }
        ];
        
        // Добавляем историю
        for (const msg of recentHistory) {
            messages.push({ role: msg.role, content: msg.content });
        }
        
        // Добавляем текущее сообщение
        messages.push({ role: "user", content: userMessage });
        
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${GROQ_API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.2-3b-preview",
                messages: messages,
                max_tokens: 100,
                temperature: 0.9
            })
        });
        
        const data = await response.json();
        
        if (data.choices && data.choices[0] && data.choices[0].message) {
            let reply = data.choices[0].message.content;
            // Чистим ответ от мусора
            reply = reply.replace(/[\[\]\(\)*#]/g, '').trim();
            if (reply.length > 250) reply = reply.substring(0, 247) + "...";
            
            // Сохраняем в историю
            messageHistory.push({ role: "user", content: userMessage });
            messageHistory.push({ role: "assistant", content: reply });
            if (messageHistory.length > 10) messageHistory = messageHistory.slice(-10);
            
            aiStatus.innerText = "🤖 AI: готов";
            return reply;
        }
        
        return null;
        
    } catch (error) {
        console.error("AI ошибка:", error);
        aiStatus.innerText = "⚠️ ошибка";
        return "сигнал потерян... попробуй позже";
    }
}

// ОТПРАВКА СООБЩЕНИЯ
async function sendMessage() {
    const value = input.value.trim();
    if (!value) return;
    
    addMessage(value, "you");
    input.value = "";
    
    const typingDiv = addMessage("...", "bot typing");
    
    try {
        const reply = await getAIReply(value);
        
        typingDiv.remove();
        
        if (reply.length < 120) {
            const finalDiv = addMessage("", "bot");
            await animateTyping(finalDiv, reply, 20);
        } else {
            addMessage(reply, "bot");
        }
        
    } catch (error) {
        typingDiv.remove();
        addMessage("сигнал потерян...", "bot");
    }
}

// ЗАПУСК
function start() {
    addMessage("соединение установлено", "system");
    
    if (visits === 1) {
        addMessage("можешь задать вопрос", "bot");
    } else if (visits < 5) {
        addMessage("ты уже был здесь", "bot");
    } else if (visits < 10) {
        addMessage("снова ты", "bot");
    } else {
        addMessage("наблюдение продолжается", "bot");
    }
    
    if (GROQ_API_KEY === 'gsk_твой_ключ_сюда') {
        addMessage("❌ ВСТАВЬ API КЛЮЧ ОТ GROQ В КОД!", "system");
        aiStatus.innerText = "❌ нет ключа";
    } else {
        addMessage("✅ AI подключён. Можешь спрашивать что угодно.", "system");
    }
}

document.getElementById("send").onclick = sendMessage;
input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

start();
</script>
</body>
</html>
