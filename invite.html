<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>invite</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("garage.jpg") center center/cover no-repeat;
filter:brightness(0.22) contrast(1.2) grayscale(.5);
transform:scale(1.04);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:.05;
mix-blend-mode:screen;
pointer-events:none;
}

#chat{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;
max-width:700px;

max-height:85vh;

overflow-y:auto;

}

.msg{

margin-bottom:16px;

padding:14px;

background:rgba(255,255,255,.04);

border-left:1px solid rgba(255,255,255,.15);

line-height:1.7;

opacity:0;

animation:fade 1s forwards;

}

.you{

border-left:1px solid rgba(255,255,255,.45);

}

.system{

opacity:.4;

font-size:13px;

}

#playWrap{

display:none;

text-align:center;

margin-top:40px;

margin-bottom:80px;

}

#playBtn{

display:inline-block;

padding:16px 30px;

border:1px solid rgba(255,255,255,.35);

cursor:pointer;

letter-spacing:4px;

transition:.25s;

}

#playBtn:hover{

background:white;
color:black;

}

@keyframes fade{

to{
opacity:1;
}

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>

<div id="chat"></div>

<script>

const chat =
document.getElementById("chat");

const messages = [

{
text:"есть запись.",
class:"msg"
},

{
text:"какая?",
class:"msg you"
},

{
text:"не знаю.",
class:"msg"
},

{
text:"тогда зачем пишешь?",
class:"msg you"
},

{
text:"на ней есть гараж.",
class:"msg"
},

{
text:"и что?",
class:"msg you"
},

{
text:"на записи кто-то стоит за камерой.",
class:"msg"
},

{
text:"оператор?",
class:"msg you"
},

{
text:"нет.",
class:"msg"
},

{
text:"откуда знаешь?",
class:"msg you"
},

{
text:"оператора там не было.",
class:"msg"
},

{
text:"📎 VIDEO_ATTACH_01.mp4",
class:"msg system"
}

];

let i = 0;

function addMessage(){

if(i >= messages.length){

showButton();

return;

}

let div =
document.createElement("div");

div.className =
messages[i].class;

div.innerText =
messages[i].text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

i++;

setTimeout(addMessage,2500);

}

function showButton(){

let wrap =
document.createElement("div");

wrap.id = "playWrap";

wrap.style.display = "block";

wrap.innerHTML = `

<div id="playBtn">
ОТКРЫТЬ ЗАПИСЬ
</div>

`;

chat.appendChild(wrap);

chat.scrollTop =
chat.scrollHeight;

document
.getElementById("playBtn")
.onclick = ()=>{

let r = Math.random();

if(r > 0.85){

window.location.href =
"address.html";

}
else if(r > 0.55){

window.location.href =
"video.html";

}
else{

window.location.href =
"observe.html";

}

};

}

addMessage();

</script>

<script src="audio.js"></script>

</body>
</html>
