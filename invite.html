<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>invite</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("garage.jpg") center center/cover no-repeat;
filter:brightness(0.18) contrast(1.3) grayscale(.7);
transform:scale(1.04);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:.05;
mix-blend-mode:screen;
pointer-events:none;
}

#chat{

position:absolute;

top:20px;
left:50%;

transform:translateX(-50%);

width:90%;
max-width:800px;

height:calc(100vh - 120px);

overflow-y:auto;

padding-bottom:120px;

}

.msg{

margin-bottom:16px;

padding:14px;

background:rgba(255,255,255,.04);

border-left:1px solid rgba(255,255,255,.15);

line-height:1.7;

animation:fade .6s forwards;

}

.you{

border-left:1px solid rgba(255,255,255,.45);

}

.system{

opacity:.45;

font-size:13px;

}

#inputWrap{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

width:90%;
max-width:800px;

display:flex;

gap:10px;

}

#input{

flex:1;

background:black;

border:1px solid rgba(255,255,255,.2);

color:white;

padding:14px;

font-family:monospace;

outline:none;

}

#send{

padding:14px 24px;

background:black;

border:1px solid rgba(255,255,255,.2);

color:white;

font-family:monospace;

cursor:pointer;

}

#send:hover{

background:white;
color:black;

}

@keyframes fade{

from{
opacity:0;
}

to{
opacity:1;
}

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>

<div id="chat"></div>

<div id="inputWrap">

<input
id="input"
autocomplete="off"
spellcheck="false"
>

<button id="send">
ОТПРАВИТЬ
</button>

</div>

<script>

const chat =
document.getElementById("chat");

const input =
document.getElementById("input");

function add(text,type="msg"){

const div =
document.createElement("div");

div.className =
type;

div.innerHTML =
text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

}

add(
"соединение установлено",
"msg system"
);

add(
"можешь задать вопрос",
"msg"
);

const randomReplies = [

"не уверен",

"это уже происходило",

"совпадение подтверждено",

"наблюдение продолжается",

"запись повреждена",

"не все движения случайны",

"ты видишь то, что можешь видеть",

"оператора там не было",

"мир не обязан соответствовать твоим представлениям",

"ошибочный опыт тоже опыт",

"данные неполные",

"216",

"сигнал слабый",

"источник не найден",

"архив открыт частично",

"спокойствие требует меньше энергии"

];

function botReply(text){

const t =
text.toLowerCase();

if(
t.includes("216")
){

return "встречается чаще, чем должно";

}

if(
t.includes("11")
||
t.includes("22")
){

return "совпадения интересуют меня";

}

if(
t.includes("гараж")
){

return "на записи кто-то стоял за камерой";

}

if(
t.includes("тео")
){

return "доступ уже был получен";

}

if(
t.includes("кто ты")
){

return "не уверен, что это важно";

}

if(
t.includes("а4ко")
){

return "название не имеет значения";

}

if(
t.includes("мух")
){

return "МУХОГЕНОЦИД";

}

if(
t.includes("диджей")
||

t.includes("сн")
){

return "запись была удалена";

}

if(
t.includes("книга")
||

t.includes("озарения")
){

const book = [

"не для чего, а почему",

"все случайности имеют значение",

"человек видит то, что может видеть",

"самое главное это ничего",

"люди разные. и я разный.",

"гравитация есть время"

];

return book[
Math.floor(
Math.random()*book.length
)
];

}

if(
Math.random() > 0.93
){

window.location.href =
"address.html";

}

if(
Math.random() > 0.90
){

return "[АРХИВ ПОВРЕЖДЁН]";

}

if(
Math.random() > 0.87
){

return "[СООБЩЕНИЕ УТЕРЯНО]";

}

return randomReplies[
Math.floor(
Math.random()*randomReplies.length
)
];

}

function send(){

const value =
input.value.trim();

if(!value) return;

add(
value,
"msg you"
);

input.value = "";

setTimeout(()=>{

add(
botReply(value),
"msg"
);

},600);

}

document
.getElementById("send")
.onclick = send;

input.addEventListener(
"keydown",
e=>{

if(e.key==="Enter")
send();

}
);

</script>

<script src="audio.js"></script>

</body>
</html>
