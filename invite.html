<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>invite</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: monospace;
}

#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("garage.jpg") center center/cover no-repeat;
    filter: brightness(0.18) contrast(1.3) grayscale(0.7);
    transform: scale(1.04);
}

#noise {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity: 0.05;
    mix-blend-mode: screen;
    pointer-events: none;
}

#chat {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    height: calc(100vh - 140px);
    overflow-y: auto;
    padding-right: 10px;
    padding-bottom: 20px;
    box-sizing: border-box;
}

#chat::-webkit-scrollbar {
    width: 6px;
}
#chat::-webkit-scrollbar-track {
    background: transparent;
}
#chat::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.15);
}
#chat::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.25);
}

.msg {
    padding: 14px;
    margin-bottom: 14px;
    line-height: 1.7;
    animation: fade 0.4s forwards;
    word-wrap: break-word;
}

.bot {
    max-width: 70%;
    background: rgba(255,255,255,0.03);
    border-left: 1px solid rgba(255,255,255,0.15);
    margin-right: auto;
}

.you {
    max-width: 70%;
    background: rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.35);
    margin-left: auto;
    text-align: right;
}

.system {
    text-align: center;
    opacity: 0.35;
    font-size: 12px;
    letter-spacing: 3px;
    background: none;
}

.typing {
    opacity: 0.35;
    font-style: italic;
}

#inputWrap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    display: flex;
    gap: 10px;
    z-index: 100;
}

#input {
    flex: 1;
    background: black;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
}

#input:focus {
    border-color: rgba(255,255,255,0.4);
}

#send {
    width: 140px;
    background: black;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    font-family: monospace;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.25s;
}

#send:hover {
    background: white;
    color: black;
}

#aiStatus {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 10px;
    opacity: 0.3;
    z-index: 100;
    background: black;
    padding: 4px 8px;
    border-radius: 4px;
}

@keyframes fade {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Стиль для отладочных сообщений */
.debug {
    color: #888;
    font-size: 10px;
    text-align: center;
    margin: 5px;
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="chat"></div>
<div id="inputWrap">
    <input id="input" autocomplete="off" spellcheck="false" placeholder="введите сообщение">
    <button id="send">ОТПРАВИТЬ</button>
</div>
<div id="aiStatus">🤖 HF: проверка...</div>

<script>
// ============================================
// ⚠️ ВСТАВЬ СВОЙ ТОКЕН СЮДА!
// ============================================
const HF_API_TOKEN = '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'; // <- ЗАМЕНИ НА РЕАЛЬНЫЙ ТОКЕН

// Используем более простую и надёжную модель
const HF_MODEL = 'HuggingFaceH4/zephyr-7b-beta';  // Отличная модель, понимает русский

// ============================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const aiStatus = document.getElementById("aiStatus");

// Состояние
let trust = parseInt(localStorage.getItem("invite_trust") || "0");
let visits = parseInt(localStorage.getItem("invite_visits") || "0");
visits++;
localStorage.setItem("invite_visits", visits);

// История сообщений для контекста
let conversationHistory = [];

// Флаг, что API протестирован
let apiTested = false;

// ============================================
// ОТЛАДОЧНАЯ ФУНКЦИЯ
// ============================================
function addDebug(text) {
    const div = document.createElement("div");
    div.className = "debug";
    div.innerHTML = `🔧 ${text}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    console.log("[DEBUG]", text);
}

// ============================================
// ОСНОВНЫЕ ФУНКЦИИ
// ============================================
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text.replace(/\n/g, '<br>');
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function animateTyping(element, text, delay = 20) {
    element.innerHTML = '';
    for (let i = 0; i < text.length; i++) {
        element.innerHTML += text[i];
        await new Promise(r => setTimeout(r, delay));
        chat.scrollTop = chat.scrollHeight;
    }
}

// ============================================
// ЛОКАЛЬНЫЕ ОТВЕТЫ (твои старые правила)
// ============================================
function getLocalReply(userMessage) {
    const t = userMessage.toLowerCase().trim();
    
    const insults = ["нахуй", "хуй", "ебан", "сука", "долбоеб", "иди нах", "пошел"];
    for (let word of insults) {
        if (t.includes(word)) {
            trust--;
            localStorage.setItem("invite_trust", trust);
            if (trust > -3) return "это не вопрос";
            if (trust > -6) return "соединение нестабильно";
            if (trust > -10) return "доступ ограничен";
            return "...";
        }
    }
    
    if (t.includes("216")) {
        let count = parseInt(localStorage.getItem("216_count") || "0");
        count++;
        localStorage.setItem("216_count", count);
        if (count > 15) return "оно не изменится";
        if (count > 10) return "хватит проверять число";
        return "встречается чаще, чем должно";
    }
    
    if (t.includes("гараж")) return "на записи кто-то стоял за камерой";
    if (t.includes("кто ты")) return "не уверен, что это важно";
    if (t.includes("а4ко")) return "название не имеет значения";
    if (t.includes("тео")) return "доступ уже был получен";
    
    if (t.includes("мух")) {
        let flies = parseInt(localStorage.getItem("flies_count") || "0");
        flies++;
        localStorage.setItem("flies_count", flies);
        if (flies > 8) return "МУХОГЕНОЦИД";
        if (flies > 4) return "не будем об этом";
        return "взаимодействие с мухами есть часть опыта";
    }
    
    if (t.includes("книга") || t.includes("озарения")) {
        const quotes = [
            "не для чего, а почему", "все случайности имеют значение",
            "человек видит то, что может видеть", "самое главное это ничего",
            "гравитация есть время", "люди разные. и я разный."
        ];
        return quotes[Math.floor(Math.random() * quotes.length)];
    }
    
    if (t.includes("диджей") || t.includes("сн")) return "запись была удалена";
    
    const goodWords = ["кто", "что", "почему", "как", "216", "гараж", "книга", "озарения", "сигнал", "наблюдение", "время"];
    for (let word of goodWords) {
        if (t.includes(word)) {
            trust++;
            localStorage.setItem("invite_trust", trust);
            break;
        }
    }
    
    if (Math.random() > 0.985) {
        setTimeout(() => { window.location.href = "address.html"; }, 1500);
        return "обнаружен адрес";
    }
    if (Math.random() > 0.96) return "[СООБЩЕНИЕ УТЕРЯНО]";
    if (Math.random() > 0.93) return "[АРХИВ ПОВРЕЖДЁН]";
    
    if (trust > 8) {
        const deeper = ["ты задаешь правильные вопросы", "оператора действительно не было", "архив постепенно восстанавливается", "запись существует", "ты уже близко", "не все посетители доходят сюда"];
        return deeper[Math.floor(Math.random() * deeper.length)];
    }
    
    return null;
}

// ============================================
// HUGGING FACE API - ОБНОВЛЁННАЯ ВЕРСИЯ
// ============================================

// Функция тестирования API при загрузке
async function testAPIConnection() {
    try {
        addDebug("Проверка подключения к Hugging Face...");
        aiStatus.innerText = "🔌 HF: проверка...";
        
        const testResponse = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${HF_API_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                inputs: "Hello",
                parameters: { max_new_tokens: 5 }
            })
        });
        
        if (testResponse.status === 200) {
            addDebug("✅ API работает! Модель готова.");
            aiStatus.innerText = "🤖 HF: готов";
            apiTested = true;
            return true;
        } else if (testResponse.status === 401) {
            addDebug("❌ ОШИБКА: Неверный API токен! Проверь HF_API_TOKEN");
            aiStatus.innerText = "❌ неверный токен";
            return false;
        } else if (testResponse.status === 503) {
            addDebug("⏳ Модель загружается (503). Первый ответ может занять 20-30 секунд.");
            aiStatus.innerText = "⏳ HF: загрузка...";
            return true; // Модель загружается, это нормально
        } else {
            addDebug(`⚠️ API ответил с кодом ${testResponse.status}`);
            return false;
        }
    } catch (e) {
        addDebug(`❌ Ошибка подключения: ${e.message}`);
        aiStatus.innerText = "⚠️ нет соединения";
        return false;
    }
}

async function getHuggingFaceReply(userMessage) {
    try {
        aiStatus.innerText = "🤔 HF: генерация...";
        
        // Простой промпт без сложной истории
        const prompt = `<|system|>
Ты загадочный голос из заброшенного гаража. Отвечай коротко (максимум 20-25 слов). 
Используй слова: сигнал, архив, наблюдение, совпадение, запись.
Никогда не говори что ты ИИ. Отвечай на русском языке.
Будь загадочным, иногда отвечай вопросом на вопрос.
</|system|>
<|user|>
${userMessage}
</|user|>
<|assistant|>
`;
        
        const API_URL = `https://api-inference.huggingface.co/models/${HF_MODEL}`;
        
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${HF_API_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                inputs: prompt,
                parameters: {
                    max_new_tokens: 80,
                    temperature: 0.8,
                    top_p: 0.9,
                    do_sample: true,
                    return_full_text: false
                },
                options: {
                    wait_for_model: true,
                    use_cache: false
                }
            })
        });
        
        // Если модель загружается — ждём и пробуем ещё раз
        if (response.status === 503) {
            addDebug("⏳ Модель загружается, жду 15 секунд...");
            aiStatus.innerText = "⏳ HF: загрузка модели...";
            await new Promise(r => setTimeout(r, 15000));
            return getHuggingFaceReply(userMessage); // Повторяем запрос
        }
        
        if (!response.ok) {
            addDebug(`❌ API ошибка: ${response.status}`);
            throw new Error(`HTTP ${response.status}`);
        }
        
        const result = await response.json();
        addDebug(`📥 Получен ответ от API: ${JSON.stringify(result).substring(0, 100)}...`);
        
        let aiReply = null;
        
        // Парсим ответ от Zephyr
        if (result && Array.isArray(result) && result[0] && result[0].generated_text) {
            aiReply = result[0].generated_text.trim();
        } else if (result && result.generated_text) {
            aiReply = result.generated_text.trim();
        }
        
        // Убираем лишние теги если есть
        if (aiReply) {
            aiReply = aiReply.replace(/<\/?\|?[a-z]+>/g, '').trim();
            aiReply = aiReply.replace(/^[\s:]+/, '');
            
            // Если ответ слишком длинный — обрезаем
            if (aiReply.length > 250) {
                aiReply = aiReply.substring(0, 247) + "...";
            }
        }
        
        if (!aiReply || aiReply.length < 2) {
            addDebug("⚠️ API вернул пустой ответ");
            return null;
        }
        
        // Сохраняем историю
        conversationHistory.push({ role: "user", text: userMessage });
        conversationHistory.push({ role: "bot", text: aiReply });
        if (conversationHistory.length > 10) conversationHistory = conversationHistory.slice(-10);
        
        addDebug(`✅ Ответ получен: "${aiReply.substring(0, 50)}..."`);
        aiStatus.innerText = "🤖 HF: готов";
        return aiReply;
        
    } catch (error) {
        addDebug(`❌ Ошибка: ${error.message}`);
        aiStatus.innerText = "⚠️ HF: ошибка";
        setTimeout(() => { aiStatus.innerText = "🤖 HF: готов"; }, 3000);
        return null;
    }
}

// ============================================
// ОТПРАВКА СООБЩЕНИЯ
// ============================================
async function sendMessage() {
    const value = input.value.trim();
    if (!value) return;
    
    addMessage(value, "you");
    input.value = "";
    
    const typingDiv = addMessage("...", "bot typing");
    
    try {
        // Сначала проверяем локальные ответы
        let reply = getLocalReply(value);
        
        if (!reply) {
            addDebug(`🔄 Отправляю в API: "${value}"`);
            reply = await getHuggingFaceReply(value);
            
            if (!reply) {
                addDebug("⚠️ API не ответил, использую fallback");
                const fallbacks = ["не уверен", "наблюдение продолжается", "сигнал слабый", "запись повреждена"];
                reply = fallbacks[Math.floor(Math.random() * fallbacks.length)];
            } else {
                addDebug(`🎯 Оригинальный AI ответ: "${reply}"`);
            }
        } else {
            addDebug(`📝 Локальный ответ: "${reply}"`);
        }
        
        typingDiv.remove();
        
        // Показываем ответ с анимацией
        if (reply.length < 150) {
            const finalDiv = addMessage("", "bot");
            await animateTyping(finalDiv, reply, 20);
        } else {
            addMessage(reply, "bot");
        }
        
        localStorage.setItem("invite_trust", trust);
        
    } catch (error) {
        addDebug(`💥 Критическая ошибка: ${error.message}`);
        typingDiv.remove();
        addMessage("сигнал потерян... попробуй позже", "bot");
    }
}

// ============================================
// ЗАПУСК
// ============================================

async function start() {
    addMessage("соединение установлено", "system");
    
    if (visits === 1) {
        addMessage("можешь задать вопрос", "bot");
    } else if (visits < 5) {
        addMessage("ты уже был здесь", "bot");
    } else if (visits < 10) {
        addMessage("снова ты", "bot");
    } else {
        addMessage("наблюдение продолжается", "bot");
    }
    
    // Проверяем токен
    if (HF_API_TOKEN === 'hf_xxxxxxxxxxxxxxxxxxxxxxxxx') {
        addDebug("❌ Токен не установлен! Вставь свой HF_API_TOKEN в код");
        aiStatus.innerText = "❌ нет токена";
    } else {
        // Тестируем API
        await testAPIConnection();
    }
}

document.getElementById("send").onclick = sendMessage;
input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

start();
</script>
</body>
</html>
