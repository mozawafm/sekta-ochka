<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>invite</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("garage.jpg") center center/cover no-repeat;
filter:brightness(.18) contrast(1.3) grayscale(.7);
transform:scale(1.04);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:.05;
mix-blend-mode:screen;
pointer-events:none;
}

#chat{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:900px;
height:calc(100vh - 140px);
overflow-y:auto;
padding-right:10px;
padding-bottom:20px;
box-sizing:border-box;
}

#chat::-webkit-scrollbar{
width:6px;
}

#chat::-webkit-scrollbar-track{
background:transparent;
}

#chat::-webkit-scrollbar-thumb{
background:rgba(255,255,255,.15);
}

#chat::-webkit-scrollbar-thumb:hover{
background:rgba(255,255,255,.25);
}

.msg{
padding:14px;
margin-bottom:14px;
line-height:1.7;
animation:fade .4s forwards;
word-wrap:break-word;
}

.bot{
max-width:70%;
background:rgba(255,255,255,.03);
border-left:1px solid rgba(255,255,255,.15);
margin-right:auto;
}

.you{
max-width:70%;
background:rgba(255,255,255,.08);
border-right:1px solid rgba(255,255,255,.35);
margin-left:auto;
text-align:right;
}

.system{
text-align:center;
opacity:.35;
font-size:12px;
letter-spacing:3px;
background:none;
}

.typing{
opacity:.35;
font-style:italic;
}

#inputWrap{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:900px;
display:flex;
gap:10px;
z-index:100;
}

#input{
flex:1;
background:black;
border:1px solid rgba(255,255,255,.15);
color:white;
padding:15px;
font-family:monospace;
font-size:14px;
outline:none;
}

#send{
width:140px;
background:black;
border:1px solid rgba(255,255,255,.15);
color:white;
font-family:monospace;
letter-spacing:2px;
cursor:pointer;
transition:.25s;
}

#send:hover{
background:white;
color:black;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>

<div id="chat"></div>

<div id="inputWrap">

<input
id="input"
autocomplete="off"
spellcheck="false"
placeholder="введите сообщение"
>

<button id="send">
ОТПРАВИТЬ
</button>

</div>

<script>

const chat =
document.getElementById("chat");

const input =
document.getElementById("input");

function add(text,type){

const div =
document.createElement("div");

div.className =
"msg " + type;

div.innerHTML =
text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

return div;

}

let trust =
parseInt(
localStorage.getItem("invite_trust")
|| "0"
);

let visits =
parseInt(
localStorage.getItem("invite_visits")
|| "0"
);

visits++;

localStorage.setItem(
"invite_visits",
visits
);

add(
"соединение установлено",
"system"
);

if(visits === 1){

add(
"можешь задать вопрос",
"bot"
);

}
else if(visits < 5){

add(
"ты уже был здесь",
"bot"
);

}
else if(visits < 10){

add(
"снова ты",
"bot"
);

}
else{

add(
"наблюдение продолжается",
"bot"
);

}

const genericReplies = [

"не уверен",

"наблюдение продолжается",

"данные неполные",

"совпадение подтверждено",

"не все движения случайны",

"источник не найден",

"оператора там не было",

"архив открыт частично",

"сигнал слабый",

"это уже происходило",

"спокойствие требует меньше энергии",

"216",

"запись повреждена"

];

function getReply(text){

const t =
text.toLowerCase();

const insults = [

"нахуй",
"хуй",
"ебан",
"сука",
"долбоеб",
"иди нах",
"пошел"

];

for(let word of insults){

if(t.includes(word)){

trust--;

localStorage.setItem(
"invite_trust",
trust
);

if(trust > -3)
return "это не вопрос";

if(trust > -6)
return "соединение нестабильно";

if(trust > -10)
return "доступ ограничен";

return "...";

}

}

const goodWords = [

"кто",
"что",
"почему",
"как",
"216",
"гараж",
"книга",
"озарения",
"сигнал",
"наблюдение",
"время"

];

for(let word of goodWords){

if(t.includes(word)){

trust++;

localStorage.setItem(
"invite_trust",
trust
);

break;

}

}

if(t.includes("216")){

let count =
parseInt(
localStorage.getItem("216_count")
|| "0"
);

count++;

localStorage.setItem(
"216_count",
count
);

if(count > 15)
return "оно не изменится";

if(count > 10)
return "хватит проверять число";

return "встречается чаще, чем должно";

}

if(t.includes("гараж"))
return "на записи кто-то стоял за камерой";

if(t.includes("кто ты"))
return "не уверен, что это важно";

if(t.includes("а4ко"))
return "название не имеет значения";

if(t.includes("тео"))
return "доступ уже был получен";

if(t.includes("мух")){

let flies =
parseInt(
localStorage.getItem("flies_count")
|| "0"
);

flies++;

localStorage.setItem(
"flies_count",
flies
);

if(flies > 8)
return "МУХОГЕНОЦИД";

if(flies > 4)
return "не будем об этом";

return "взаимодействие с мухами есть часть опыта";

}

if(
t.includes("книга")
||
t.includes("озарения")
){

const quotes = [

"не для чего, а почему",

"все случайности имеют значение",

"человек видит то, что может видеть",

"самое главное это ничего",

"гравитация есть время",

"люди разные. и я разный."

];

return quotes[
Math.floor(
Math.random()*quotes.length
)
];

}

if(
t.includes("диджей")
||
t.includes("сн")
){

return "запись была удалена";

}

if(trust > 8){

const deeper = [

"ты задаешь правильные вопросы",

"оператора действительно не было",

"архив постепенно восстанавливается",

"запись существует",

"ты уже близко",

"не все посетители доходят сюда"

];

return deeper[
Math.floor(
Math.random()*deeper.length
)
];

}

if(Math.random() > .985){

setTimeout(()=>{

window.location.href =
"address.html";

},1500);

return "обнаружен адрес";

}

if(Math.random() > .96){

return "[СООБЩЕНИЕ УТЕРЯНО]";

}

if(Math.random() > .93){

return "[АРХИВ ПОВРЕЖДЁН]";

}

return genericReplies[
Math.floor(
Math.random()*
genericReplies.length
)
];

}

function sendMessage(){

const value =
input.value.trim();

if(!value) return;

add(
value,
"you"
);

input.value = "";

const typing =
add(
"...",
"bot typing"
);

setTimeout(()=>{

typing.remove();

add(
getReply(value),
"bot"
);

},500 + Math.random()*1500);

}

document
.getElementById("send")
.onclick =
sendMessage;

input.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){

sendMessage();

}

}
);

</script>

<script src="audio.js"></script>

</body>
</html>
