<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>invite • сигнал</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: monospace;
}

#bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("garage.jpg") center center/cover no-repeat;
    filter: brightness(0.18) contrast(1.3) grayscale(0.7);
    transform: scale(1.04);
    transition: all 0.05s;
}

#noise {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity: 0.05;
    mix-blend-mode: screen;
    pointer-events: none;
    transition: opacity 0.05s;
}

#chat {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    height: calc(100vh - 140px);
    overflow-y: auto;
    padding-right: 10px;
    padding-bottom: 20px;
    box-sizing: border-box;
}

#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

.msg {
    padding: 14px;
    margin-bottom: 14px;
    line-height: 1.7;
    animation: fade 0.4s forwards;
    word-wrap: break-word;
}

.bot {
    max-width: 70%;
    background: rgba(255,255,255,0.03);
    border-left: 1px solid rgba(255,255,255,0.15);
    margin-right: auto;
}

.you {
    max-width: 70%;
    background: rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.35);
    margin-left: auto;
    text-align: right;
}

.system {
    text-align: center;
    opacity: 0.35;
    font-size: 12px;
    letter-spacing: 3px;
    background: none;
}

.choice {
    text-align: center;
    margin: 20px 0;
    padding: 15px;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
}

.choice:hover {
    background: white;
    color: black;
}

#inputWrap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 900px;
    display: flex;
    gap: 10px;
    z-index: 100;
}

#input {
    flex: 1;
    background: black;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
}

#input:focus { border-color: rgba(255,255,255,0.4); }

#send {
    width: 140px;
    background: black;
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    font-family: monospace;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.25s;
}

#send:hover { background: white; color: black; }

#stats {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    opacity: 0.4;
    z-index: 100;
    text-align: right;
    font-family: monospace;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
}

@keyframes fade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-8px, 2px); }
    75% { transform: translate(8px, -2px); }
    100% { transform: translate(0, 0); }
}

.shake-global {
    animation: shake 0.15s ease-in-out 0s 3;
}

.glitch-flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
}

.glitch-red {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: red;
    z-index: 9998;
    pointer-events: none;
    opacity: 0;
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="chat"></div>
<div id="stats">
    👁️ ДОВЕРИЕ: <span id="trustVal">0</span> &nbsp;|&nbsp;
    📼 ВИЗИТОВ: <span id="visitsVal">0</span> &nbsp;|&nbsp;
    ⚡ ГЛЮКОВ: <span id="glitchVal">0</span>
</div>
<div id="inputWrap">
    <input id="input" autocomplete="off" spellcheck="false" placeholder="введите сообщение">
    <button id="send">ОТПРАВИТЬ</button>
</div>
<div id="glitchFlash" class="glitch-flash"></div>
<div id="glitchRed" class="glitch-red"></div>

<script>
// ============================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const glitchFlash = document.getElementById("glitchFlash");
const glitchRed = document.getElementById("glitchRed");

let trust = parseInt(localStorage.getItem("invite_trust") || "3");
let visits = parseInt(localStorage.getItem("invite_visits") || "0");
let glitchCount = parseInt(localStorage.getItem("glitch_count") || "0");

visits++;
localStorage.setItem("invite_visits", visits);

document.getElementById("trustVal").innerText = trust;
document.getElementById("visitsVal").innerText = visits;
document.getElementById("glitchVal").innerText = glitchCount;

// ============================================
// ВИЗУАЛЬНЫЕ ГЛЮКИ (ЗАМЕТНЫЕ!)
// ============================================

function glitchWhite() {
    glitchFlash.style.opacity = "0.8";
    setTimeout(() => { glitchFlash.style.opacity = "0"; }, 80);
}

function glitchRedFull() {
    glitchRed.style.opacity = "0.6";
    setTimeout(() => { glitchRed.style.opacity = "0"; }, 120);
}

function shakeScreen() {
    document.body.classList.add("shake-global");
    setTimeout(() => { document.body.classList.remove("shake-global"); }, 450);
}

function noiseBlast() {
    const noise = document.getElementById("noise");
    noise.style.opacity = "0.3";
    setTimeout(() => { noise.style.opacity = "0.05"; }, 200);
}

function glitchComplex() {
    glitchWhite();
    shakeScreen();
    noiseBlast();
    
    glitchCount++;
    localStorage.setItem("glitch_count", glitchCount);
    document.getElementById("glitchVal").innerText = glitchCount;
    
    // При 5 глюках — повышаем доверие
    if (glitchCount === 5) {
        addMessage("[СИСТЕМА НЕСТАБИЛЬНА]", "system");
        trust += 3;
        localStorage.setItem("invite_trust", trust);
        document.getElementById("trustVal").innerText = trust;
    }
    
    // При 10 глюках — секрет
    if (glitchCount === 10) {
        addMessage("[АРХИВ ПОВРЕЖДЁН... ВОССТАНОВЛЕНИЕ...]", "system");
        addMessage("ты вызвал слишком много глюков. система тебя запомнила.", "bot");
    }
}

// ============================================
// СЕКРЕТНЫЕ СЛОВА
// ============================================
function getSecretReply(msg) {
    const t = msg.toLowerCase().trim();
    
    if (t === "help" || t === "помощь") {
        return "🔮 секретные слова: глюк, свет, тьма, зеркало, дверь, время, имя, огонь, код, архив, открой, 216, мухи, книга";
    }
    
    if (t.includes("глюк")) {
        glitchComplex();
        return "система дрожит. ты это видишь?";
    }
    
    if (t.includes("свет")) { trust++; return "его здесь никогда не было. или ты принёс его с собой?"; }
    if (t.includes("тьма")) return "она всегда была. и всегда будет. ты это чувствуешь?";
    if (t.includes("зеркало")) { glitchWhite(); return "посмотри на себя. узнаёшь? я не уверен, что это ты."; }
    if (t.includes("дверь")) return trust > 6 ? "заперта. но ты знаешь код. 216." : "заперта. и не откроется.";
    if (t.includes("время")) { noiseBlast(); return "оно идёт не так, как ты думаешь."; }
    if (t.includes("имя")) {
        const names = ["никто", "сигнал", "архив", "наблюдатель", "пустота"];
        return `твоё настоящее имя? ${names[Math.floor(Math.random() * names.length)]}. я точно не помню.`;
    }
    if (t.includes("огонь")) { glitchRedFull(); return "не играй с огнём. здесь и так слишком жарко."; }
    if (t.includes("код")) return `код? 216. попробуй.`;
    if (t.includes("архив")) return glitchCount > 8 ? "архив открыт. ты готов?" : "доступ закрыт. нужно больше глюков.";
    if (t.includes("открой") && trust > 8) { 
        setTimeout(() => { window.location.href = "secret.html"; }, 1500); 
        return "открываю..."; 
    }
    
    if (t.includes("216")) {
        let count = parseInt(localStorage.getItem("216_count") || "0");
        count++;
        localStorage.setItem("216_count", count);
        if (count > 10) return "хватит проверять число.";
        return "встречается чаще, чем должно.";
    }
    if (t.includes("гараж")) return "на записи кто-то стоял за камерой.";
    if (t.includes("мух")) {
        let flies = parseInt(localStorage.getItem("flies_count") || "0");
        flies++;
        localStorage.setItem("flies_count", flies);
        if (flies > 8) return "МУХОГЕНОЦИД.";
        return "взаимодействие с мухами есть часть опыта.";
    }
    if (t.includes("книга") || t.includes("озарения")) {
        const quotes = [
            "не для чего, а почему",
            "все случайности имеют значение",
            "человек видит то, что может видеть",
            "самое главное это ничего"
        ];
        return quotes[Math.floor(Math.random() * quotes.length)];
    }
    
    return null;
}

// ============================================
// ВЫБОР С ПОСЛЕДСТВИЯМИ
// ============================================
let choiceActive = false;

function showChoice() {
    if (choiceActive) return;
    choiceActive = true;
    
    const wrapper = document.createElement("div");
    wrapper.className = "system";
    wrapper.style.margin = "20px 0";
    wrapper.style.borderTop = "1px solid rgba(255,255,255,0.2)";
    wrapper.style.paddingTop = "15px";
    
    const text = document.createElement("div");
    text.style.textAlign = "center";
    text.style.marginBottom = "15px";
    text.style.opacity = "0.7";
    text.innerText = "══ СИСТЕМНЫЙ ЗАПРОС ══";
    wrapper.appendChild(text);
    
    const btn1 = document.createElement("div");
    btn1.className = "choice";
    btn1.innerText = "🔓 ОТКРЫТЬ АРХИВ";
    btn1.onclick = () => {
        wrapper.remove();
        addMessage("ты открыл архив. назад дороги нет.", "system");
        glitchComplex();
        setTimeout(() => { window.location.href = "secret.html"; }, 1500);
    };
    
    const btn2 = document.createElement("div");
    btn2.className = "choice";
    btn2.innerText = "🚪 ОСТАВИТЬ ЗАКРЫТЫМ";
    btn2.onclick = () => {
        wrapper.remove();
        addMessage("архив остался закрыт. но ты будешь думать о нём.", "system");
        trust -= 2;
        localStorage.setItem("invite_trust", trust);
        document.getElementById("trustVal").innerText = trust;
        choiceActive = false;
    };
    
    wrapper.appendChild(btn1);
    wrapper.appendChild(btn2);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
}

// ============================================
// ОСНОВНОЙ ОТВЕТ
// ============================================
function getReply(msg) {
    const secret = getSecretReply(msg);
    if (secret) return secret;
    
    // Выбор при доверии > 7 (теперь появляется часто!)
    if (trust > 7 && !choiceActive && Math.random() > 0.6 && visits > 1) {
        showChoice();
        return "перед тобой выбор. система ждёт.";
    }
    
    // Редкие глюки случайно
    if (Math.random() > 0.88) {
        glitchComplex();
        return "[СИГНАЛ ПРЕРВАН]";
    }
    
    // Фразы в зависимости от доверия
    if (trust > 12) {
        const high = ["ты уже близко", "почти. ещё немного.", "архив восстанавливается", "не все доходят сюда"];
        return high[Math.floor(Math.random() * high.length)];
    }
    if (trust > 6) {
        const mid = ["наблюдение продолжается", "совпадение подтверждено", "сигнал стабилен", "данные неполные"];
        return mid[Math.floor(Math.random() * mid.length)];
    }
    const low = ["не уверен", "сигнал слабый", "запись повреждена", "источник не найден"];
    return low[Math.floor(Math.random() * low.length)];
}

// ============================================
// ОТПРАВКА
// ============================================
function sendMessage() {
    const value = input.value.trim();
    if (!value) return;
    
    addMessage(value, "you");
    input.value = "";
    
    setTimeout(() => {
        let reply = getReply(value);
        
        // Обновляем доверие
        if (reply.includes("близко") || reply.includes("правильные")) trust += 2;
        if (reply.includes("слабый")) trust -= 1;
        if (trust < 0) trust = 0;
        if (trust > 20) trust = 20;
        localStorage.setItem("invite_trust", trust);
        document.getElementById("trustVal").innerText = trust;
        
        addMessage(reply, "bot");
    }, 500 + Math.random() * 800);
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function start() {
    addMessage("соединение установлено", "system");
    
    if (visits === 1) addMessage("можешь задать вопрос", "bot");
    else if (visits > 10) addMessage("снова ты. система устала.", "bot");
    else addMessage("я тебя помню", "bot");
    
    if (glitchCount > 5) addMessage("⚠️ нестабильность зафиксирована", "system");
    
    // Подсказка
    setTimeout(() => {
        addMessage("напиши 'помощь' чтобы увидеть секретные слова", "system");
    }, 3000);
}

document.getElementById("send").onclick = sendMessage;
input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

start();
</script>
</body>
</html>
