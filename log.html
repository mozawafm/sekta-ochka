<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>log</title>
</head>

<body style="background:black;color:white;font-family:monospace;">

<pre id="log">
[01:12] пользователь открыл страницу
[01:13] пользователь вернулся
[01:15] пользователь не понимает
</pre>

<script>

// STATE
let state = JSON.parse(localStorage.getItem("state"));

state.path += "L";
state.trust += 2;

localStorage.setItem("state", JSON.stringify(state));

let log = document.getElementById("log");

setTimeout(() => {
    log.innerText += "\n[01:16] пользователь продолжает";
}, 2500);

setTimeout(() => {
    log.innerText += "\n[01:17] пользователь игнорирует";
}, 5000);

setTimeout(() => {
    log.innerText += "\n[??:??] она пришла";
}, 7500);

setTimeout(() => {
    log.innerText += "\n[??:??] она нажала play";
}, 10000);

setTimeout(() => {
    log.innerText += "\n[??:??] запись началась";
}, 12500);

setTimeout(() => {
    log.innerText += "\n[??:??] она не помнит";
}, 15000);

setTimeout(() => {
    log.innerText += "\n[??:??] она смотрит на экран";
}, 17000);

setTimeout(() => {
    window.location.href = "invite.html";
}, 21000);

</script>

</body>
</html>
