<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>log</title>
</head>

<body style="background:black;color:white;font-family:monospace;">

<pre id="log">
[01:12] пользователь открыл страницу
</pre>

<script>

let state = JSON.parse(localStorage.getItem("state"));

state.path += "L";
state.trust += 2;

localStorage.setItem("state", JSON.stringify(state));

let log = document.getElementById("log");

setTimeout(() => {
    log.innerText += "\n[01:13] пользователь вернулся";
}, 2500);

setTimeout(() => {
    log.innerText += "\n[01:15] пользователь продолжает";
}, 5000);

setTimeout(() => {
    log.innerText += "\n[??:??] она пришла";
}, 8000);

setTimeout(() => {
    log.innerText += "\n[??:??] запись началась";
}, 12000);

// 🔥 ВОЗВРАТ В СИСТЕМУ
setTimeout(() => {
    window.location.href = "index.html";
}, 17000);

</script>

</body>
</html>
