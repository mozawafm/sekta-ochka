<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>glitch</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
color:white;
font-family:monospace;
cursor:none;
}

#text{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:34px;

letter-spacing:5px;

}

.glitch{

animation:glitch .15s infinite;

}

@keyframes glitch{

0%{transform:translate(-50%,-50%);}
20%{transform:translate(-48%,-50%);}
40%{transform:translate(-52%,-51%);}
60%{transform:translate(-49%,-48%);}
80%{transform:translate(-51%,-50%);}
100%{transform:translate(-50%,-50%);}

}

</style>
</head>

<body>

<div id="text" class="glitch">
СБОЙ
</div>

<script>

const msgs=[

"216",

"432",

"11:11",

"22:22",

"созерцатель",

"тишина заговорит",

"Наоми",

"обнаружен двойник",

"ошибка памяти",

"источник не найден"

];

const t=document.getElementById("text");

setInterval(()=>{

t.innerText=
msgs[Math.floor(Math.random()*msgs.length)];

},1000);

setTimeout(()=>{

window.location.href="hub.html";

},15000);

</script>

<script src="audio.js"></script>

</body>
</html>
