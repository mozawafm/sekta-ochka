<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>secret</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
cursor:none;
}

#center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#main{

font-size:28px;

letter-spacing:7px;

opacity:0;

transition:2s;

}

#sub{

margin-top:40px;

font-size:12px;

letter-spacing:3px;

opacity:0;

transition:2s;

}

</style>
</head>

<body>

<div id="center">

<div id="main">
ДОСТУП РАЗРЕШЕН
</div>

<div id="sub"></div>

</div>

<script>

const state=
JSON.parse(localStorage.getItem("state"))||{};

const sub=
document.getElementById("sub");

document.getElementById("main")
.style.opacity=".9";

setTimeout(()=>{

sub.style.opacity=".5";

if(state.memory==="garage"){

sub.innerText=
"место подтверждено";

}

else if(state.memory==="mask"){

sub.innerText=
"созерцатель подтвержден";

}

else if(state.memory==="face"){

sub.innerText=
"обнаружен второй экземпляр";

}

else if(state.memory==="nothing"){

sub.innerText=
"память отсутствует";

}

else{

sub.innerText=
"запись повреждена";

}

},3000);

setTimeout(()=>{

sub.innerText=
"тишина заговорит";

},9000);

setTimeout(()=>{

window.location.href="signal.html";

},18000);

</script>

<script src="audio.js"></script>

</body>
</html>
