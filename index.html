<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEKTA OCHKA</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#screen{
    position:absolute;
    width:100%;
    height:100%;
    background:url("garage.jpg") center center/cover no-repeat;
    filter:contrast(1.2) brightness(0.7);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.08;
    mix-blend-mode:screen;
    pointer-events:none;
}

#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
}

#rec{
    position:absolute;
    top:20px;
    left:20px;
    font-size:18px;
    letter-spacing:3px;
    animation:blink 1s infinite;
}

#time{
    position:absolute;
    top:20px;
    right:20px;
    font-size:18px;
}

#center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:80%;
}

#message{
    font-size:22px;
    letter-spacing:2px;
}

button{
    margin-top:25px;
    background:black;
    color:white;
    border:1px solid white;
    padding:12px 20px;
    font-family:monospace;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
}

#secretInput{
    margin-top:25px;
    background:black;
    border:1px solid #333;
    color:white;
    padding:10px;
    width:220px;
    text-align:center;
    display:none;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="screen"></div>
<div id="noise"></div>
<div id="overlay"></div>

<div id="rec">● REC</div>
<div id="time"></div>

<div id="center">

    <div id="message">
        восстановление записи...
    </div>

    <button id="playBtn">
        продолжить
    </button>

    <br>

    <input
        type="text"
        id="secretInput"
        placeholder="..."
        autocomplete="off"
    >

</div>

<script>

// STATE
let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {
        visits:0,
        trust:0,
        secrets:0,
        unlocked:false,
        codeUsed:false
    };

}

state.visits++;

localStorage.setItem("state", JSON.stringify(state));

const msg = document.getElementById("message");
const btn = document.getElementById("playBtn");
const input = document.getElementById("secretInput");
const time = document.getElementById("time");

// СЛУЧАЙНОЕ ВРЕМЯ
let h = Math.floor(Math.random()*24).toString().padStart(2,"0");
let m = Math.floor(Math.random()*60).toString().padStart(2,"0");
let s = Math.floor(Math.random()*60).toString().padStart(2,"0");

time.innerText = `${h}:${m}:${s}`;

// ТЕКСТЫ
if(state.unlocked){

    msg.innerText = "сигнал восстановлен";

}else if(state.visits > 4){

    msg.innerText = "обнаружены поврежденные фрагменты";

}else{

    msg.innerText = "восстановление записи...";

}

// 🔥 ПОЛЕ КОДА ТОЛЬКО ОДИН РАЗ
if(
    state.visits >= 3 &&
    !state.codeUsed &&
    !state.unlocked
){

    // появляется не всегда
    if(Math.random() > 0.45){

        input.style.display = "inline-block";

    }

}

// PLAY
btn.onclick = () => {

    btn.style.display = "none";

    msg.innerText = "загрузка...";

    setTimeout(()=>{

        let r = Math.random();

        // меньше возвратов в observe
        if(r > 0.82){

            window.location.href = "observe.html";

        }else if(r > 0.58){

            window.location.href = "log.html";

        }else if(r > 0.28){

            window.location.href = "invite.html";

        }else{

            window.location.href = "video.html";

        }

    },2000);

};

// КОД
input.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        let value = input.value.toLowerCase().trim();

        // ПРАВИЛЬНЫЙ КОД
        if(value === "teo867102"){

            state.trust += 30;

            state.unlocked = true;

            // 🔥 ГЛАВНОЕ
            state.codeUsed = true;

            localStorage.setItem("state", JSON.stringify(state));

            window.location.href = "secret.html";

        }else{

            msg.innerText = "код не распознан";

            setTimeout(()=>{

                msg.innerText = "восстановление записи...";

            },2000);

        }

    }

});

</script>

</body>
</html>
