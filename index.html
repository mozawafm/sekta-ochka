<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEKTA OCHKA</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#bg{
    position:absolute;
    width:100%;
    height:100%;
    background:url("garage.jpg") center center/cover no-repeat;
    filter:brightness(0.38) contrast(1.2) grayscale(0.3);
    transform:scale(1.04);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.05;
    mix-blend-mode:screen;
    pointer-events:none;
}

#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.28);
}

#center{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    width:80%;

}

#message{

    font-size:24px;
    letter-spacing:3px;
    margin-bottom:30px;

}

#play{

    display:inline-block;

    border:1px solid rgba(255,255,255,0.4);

    padding:14px 26px;

    cursor:pointer;

    transition:0.25s;

}

#play:hover{

    background:white;
    color:black;

}

#time{

    position:absolute;

    top:20px;
    right:20px;

    opacity:0.5;

}

#rec{

    position:absolute;

    top:20px;
    left:20px;

    color:red;

    animation:blink 1s infinite;

}

#code{

    position:absolute;

    bottom:14px;
    right:16px;

    opacity:0;

    transition:1s;

    background:none;

    border:none;

    color:white;

    font-family:monospace;

    outline:none;

    font-size:11px;

    width:90px;

}

.flash{

    animation:flash 0.12s;

}

@keyframes blink{

    50%{
        opacity:0;
    }

}

@keyframes flash{

    50%{
        opacity:0;
    }

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="overlay"></div>

<div id="rec">● REC</div>
<div id="time"></div>

<div id="center">

    <div id="message">
        восстановление записи...
    </div>

    <div id="play">
        продолжить
    </div>

</div>

<input
type="text"
id="code"
autocomplete="off"
>

<audio
id="music"
src="audio/ambient.mp3"
loop
></audio>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {

        visits:0,
        trust:0,
        infected:0,
        unlocked:false,
        codeUsed:false

    };

}

state.visits++;

localStorage.setItem("state", JSON.stringify(state));

const msg = document.getElementById("message");
const play = document.getElementById("play");
const time = document.getElementById("time");
const code = document.getElementById("code");
const music = document.getElementById("music");

// MUSIC

document.body.addEventListener("click",()=>{

    music.volume = 0.18;

    music.play();

},{once:true});

// TIME

const weirdTimes = [

"22:22",
"11:11",
"03:11",
"21:11"

];

if(Math.random() > 0.65){

    time.innerText =
    weirdTimes[Math.floor(Math.random()*weirdTimes.length)];

}else{

    let h = Math.floor(Math.random()*24).toString().padStart(2,"0");
    let m = Math.floor(Math.random()*60).toString().padStart(2,"0");

    time.innerText = `${h}:${m}`;

}

// MESSAGES

const texts = [

"восстановление записи...",
"обнаружены поврежденные фрагменты",
"загрузка сигнала",
"она уже была здесь",
"наблюдение продолжается"

];

msg.innerText =
texts[Math.floor(Math.random()*texts.length)];

// CODE APPEAR

if(
    state.visits >= 3 &&
    !state.codeUsed
){

    setTimeout(()=>{

        code.style.opacity = "0.08";

    },6000);

}

// PLAY

play.onclick = () => {

    state.infected++;

    localStorage.setItem("state", JSON.stringify(state));

    play.innerText = "ЗАГРУЗКА...";

    setTimeout(()=>{

        let r = Math.random();

        if(r > 0.88){

            window.location.href = "time.html";

        }else if(r > 0.72){

            window.location.href = "loop.html";

        }else if(r > 0.54){

            window.location.href = "observe.html";

        }else if(r > 0.34){

            window.location.href = "log.html";

        }else if(r > 0.16){

            window.location.href = "invite.html";

        }else{

            window.location.href = "video.html";

        }

    },1800);

};

// CODE

code.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        if(code.value.toLowerCase() === "teo867102"){

            state.unlocked = true;
            state.codeUsed = true;
            state.trust += 50;

            localStorage.setItem("state", JSON.stringify(state));

            document.body.classList.add("flash");

            setTimeout(()=>{

                window.location.href = "secret.html";

            },500);

        }else{

            msg.innerText = "код не распознан";

        }

    }

});

</script>

</body>
</html>
