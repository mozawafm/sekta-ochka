<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEKTA OCHKA</title>
</head>

<body>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {

        firstVisit:true,
        visits:0,
        trust:0,
        infected:0,
        unlocked:false,
        codeUsed:false

    };

}

// ПЕРВЫЙ ЗАХОД

if(state.firstVisit){

    state.firstVisit = false;

    localStorage.setItem("state", JSON.stringify(state));

    window.location.href = "enter.html";

}else{

    // ОБЫЧНЫЙ ЗАХОД

    window.location.href = "hub.html";

}

</script>

<script src="audio.js"></script>

</body>
</html>
