<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEKTA OCHKA</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#screen{
    position:absolute;
    width:100%;
    height:100%;
    background:url("garage.jpg") center center/cover no-repeat;
    filter:contrast(1.15) brightness(0.7) grayscale(0.2);
    transform:scale(1.03);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.06;
    mix-blend-mode:screen;
    pointer-events:none;
}

#dark{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
}

#rec{
    position:absolute;
    top:20px;
    left:20px;
    color:red;
    font-size:18px;
    letter-spacing:3px;
    animation:blink 1s infinite;
}

#time{
    position:absolute;
    top:20px;
    right:20px;
    opacity:0.7;
}

#center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:80%;
}

#message{
    font-size:22px;
    letter-spacing:2px;
    opacity:0.92;
}

button{
    margin-top:30px;
    background:black;
    color:white;
    border:1px solid rgba(255,255,255,0.5);
    padding:12px 24px;
    font-family:monospace;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:white;
    color:black;
}

#secretInput{

    position:absolute;
    bottom:18px;
    right:18px;

    width:90px;

    background:transparent;
    border:none;

    color:rgba(255,255,255,0.08);

    font-size:11px;
    font-family:monospace;

    outline:none;

    opacity:0;

    transition:0.5s;

}

#secretInput:focus{
    opacity:1;
    color:rgba(255,255,255,0.5);
}

.glitch{
    animation:glitch 0.12s;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

@keyframes glitch{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-2px);}
    100%{transform:translateX(0);}
}

</style>
</head>

<body>

<div id="screen"></div>
<div id="noise"></div>
<div id="dark"></div>

<div id="rec">● REC</div>
<div id="time"></div>

<div id="center">

    <div id="message">
        восстановление записи...
    </div>

    <button id="playBtn">
        продолжить
    </button>

</div>

<input
type="text"
id="secretInput"
autocomplete="off"
>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {

        visits:0,
        trust:0,
        unlocked:false,
        codeUsed:false,
        observed:0,
        watched:0,
        infected:0

    };

}

state.visits++;

localStorage.setItem("state", JSON.stringify(state));

const btn = document.getElementById("playBtn");
const msg = document.getElementById("message");
const input = document.getElementById("secretInput");
const time = document.getElementById("time");

// ВРЕМЯ

const strangeTimes = [

    "22:22",
    "11:11",
    "03:11",
    "21:11"

];

if(Math.random() > 0.72){

    time.innerText =
    strangeTimes[Math.floor(Math.random()*strangeTimes.length)];

}else{

    let h = Math.floor(Math.random()*24).toString().padStart(2,"0");
    let m = Math.floor(Math.random()*60).toString().padStart(2,"0");
    let s = Math.floor(Math.random()*60).toString().padStart(2,"0");

    time.innerText = `${h}:${m}:${s}`;

}

// СООБЩЕНИЯ

const normalMessages = [

    "восстановление записи...",
    "обнаружены поврежденные фрагменты",
    "загрузка сигнала",
    "видеофайл нестабилен"

];

const infectedMessages = [

    "она снова включила запись",
    "наблюдение продолжается",
    "сигнал восстановлен",
    "она уже была здесь"

];

if(state.infected >= 5){

    msg.innerText =
    infectedMessages[Math.floor(Math.random()*infectedMessages.length)];

}else{

    msg.innerText =
    normalMessages[Math.floor(Math.random()*normalMessages.length)];

}

// РЕДКИЙ ГЛИТЧ

if(Math.random() > 0.93){

    setTimeout(()=>{

        document.body.classList.add("glitch");

        msg.innerText = "не выключай";

    },3000);

}

// СКРЫТОЕ ПОЛЕ

if(
    state.visits > 2 &&
    !state.codeUsed &&
    !state.unlocked
){

    setTimeout(()=>{

        input.style.opacity = "0.06";

    },7000);

}

// PLAY

btn.onclick = () => {

    state.infected++;

    localStorage.setItem("state", JSON.stringify(state));

    btn.style.display = "none";

    msg.innerText = "загрузка...";

    setTimeout(()=>{

        let r = Math.random();

        // FINAL
        if(state.trust > 60 && r > 0.95){

            window.location.href = "final.html";

        // TIME
        }else if(r > 0.86){

            window.location.href = "time.html";

        // OBSERVE
        }else if(r > 0.66){

            window.location.href = "observe.html";

        // LOG
        }else if(r > 0.42){

            window.location.href = "log.html";

        // INVITE
        }else if(r > 0.22){

            window.location.href = "invite.html";

        // VIDEO
        }else{

            window.location.href = "video.html";

        }

    },1800);

};

// CODE

input.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        let value = input.value.toLowerCase().trim();

        if(value === "teo867102"){

            state.unlocked = true;
            state.codeUsed = true;
            state.trust += 50;

            localStorage.setItem("state", JSON.stringify(state));

            document.body.classList.add("glitch");

            setTimeout(()=>{

                window.location.href = "secret.html";

            },500);

        }else{

            msg.innerText = "код не распознан";

            setTimeout(()=>{

                msg.innerText = "восстановление записи...";

            },2000);

        }

    }

});

</script>

</body>
</html>
