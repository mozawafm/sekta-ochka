<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEKTA OCHKA</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#screen{
    position:absolute;
    width:100%;
    height:100%;
    background:url("garage.jpg") center center/cover no-repeat;
    filter:contrast(1.2) brightness(0.7);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.08;
    mix-blend-mode:screen;
    pointer-events:none;
}

#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
}

#rec{
    position:absolute;
    top:20px;
    left:20px;
    color:red;
    animation:blink 1s infinite;
}

#time{
    position:absolute;
    top:20px;
    right:20px;
}

#center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:80%;
}

#message{
    font-size:24px;
    letter-spacing:2px;
}

#phrase{
    margin-top:30px;
    opacity:0.45;
    font-size:14px;
}

button{
    margin-top:30px;
    background:black;
    color:white;
    border:1px solid white;
    padding:12px 22px;
    font-family:monospace;
    cursor:pointer;
}

button:hover{
    background:white;
    color:black;
}

#secretInput{
    margin-top:25px;
    background:black;
    border:1px solid #333;
    color:white;
    padding:10px;
    width:220px;
    text-align:center;
    display:none;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.flash{
    animation:flash 0.15s;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div id="screen"></div>
<div id="noise"></div>
<div id="overlay"></div>

<div id="rec">● REC</div>
<div id="time"></div>

<div id="center">

    <div id="message">
        восстановление записи...
    </div>

    <div id="phrase"></div>

    <button id="playBtn">
        продолжить
    </button>

    <br>

    <input
        type="text"
        id="secretInput"
        placeholder="..."
        autocomplete="off"
    >

</div>

<script src="phrases.js"></script>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {
        visits:0,
        trust:0,
        unlocked:false,
        codeUsed:false,
        observed:0,
        watched:0
    };

}

state.visits++;

localStorage.setItem("state", JSON.stringify(state));

const msg = document.getElementById("message");
const phrase = document.getElementById("phrase");
const btn = document.getElementById("playBtn");
const input = document.getElementById("secretInput");
const time = document.getElementById("time");

// ВРЕМЯ
const specialTimes = [

"22:22",
"11:11",
"21:11"

];

if(Math.random() > 0.7){

    time.innerText =
    specialTimes[Math.floor(Math.random()*specialTimes.length)];

}else{

    let h = Math.floor(Math.random()*24).toString().padStart(2,"0");
    let m = Math.floor(Math.random()*60).toString().padStart(2,"0");
    let s = Math.floor(Math.random()*60).toString().padStart(2,"0");

    time.innerText = `${h}:${m}:${s}`;

}

// ФРАЗА
phrase.innerText =
phrases[Math.floor(Math.random()*phrases.length)];

// СООБЩЕНИЯ
if(state.unlocked){

    msg.innerText = "сигнал восстановлен";

}else if(state.watched >= 3){

    msg.innerText = "она снова включила запись";

}else if(state.observed >= 4){

    msg.innerText = "наблюдение продолжается";

}else{

    msg.innerText = "восстановление записи...";

}

// КОД ТОЛЬКО ОДИН РАЗ
if(
    state.visits >= 3 &&
    !state.codeUsed &&
    !state.unlocked
){

    if(Math.random() > 0.55){

        input.style.display = "inline-block";

    }

}

// PLAY
btn.onclick = () => {

    btn.style.display = "none";

    msg.innerText = "загрузка...";

    setTimeout(()=>{

        let r = Math.random();

        // RARE FINAL
        if(state.trust > 60 && r > 0.94){

            window.location.href = "final.html";

        // OBSERVE
        }else if(r > 0.82){

            window.location.href = "observe.html";

        // LOG
        }else if(r > 0.52){

            window.location.href = "log.html";

        // INVITE
        }else if(r > 0.24){

            window.location.href = "invite.html";

        // VIDEO
        }else{

            window.location.href = "video.html";

        }

    },2000);

};

// КОД
input.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        let value = input.value.toLowerCase().trim();

        if(value === "teo867102"){

            state.unlocked = true;
            state.codeUsed = true;
            state.trust += 30;

            localStorage.setItem("state", JSON.stringify(state));

            document.body.classList.add("flash");

            setTimeout(()=>{

                window.location.href = "secret.html";

            },500);

        }else{

            msg.innerText = "код не распознан";

            setTimeout(()=>{

                msg.innerText = "восстановление записи...";

            },2000);

        }

    }

});

</script>

</body>
</html>
