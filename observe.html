<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>observe</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:monospace;">

<p id="text">не двигайся</p>

<script>

// STATE
let state = JSON.parse(localStorage.getItem("state"));

state.path += "O";
state.trust += 1;

localStorage.setItem("state", JSON.stringify(state));

// СЦЕНА
setTimeout(() => {
    document.getElementById("text").innerText = "мы проверяем";
}, 2500);

setTimeout(() => {
    document.getElementById("text").innerText = "мы видим тебя";
}, 5000);

setTimeout(() => {
    document.getElementById("text").innerText = "...";
}, 7500);

setTimeout(() => {
    document.getElementById("text").innerText = "что-то не так";
}, 10000);

setTimeout(() => {
    document.getElementById("text").innerText = "ты лишняя";
}, 12500);

setTimeout(() => {
    document.body.innerHTML = "<h1>исправляем</h1>";
}, 15000);

setTimeout(() => {
    window.location.href = "log.html";
}, 19000);

</script>

</body>
</html>
