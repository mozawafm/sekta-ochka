<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>observe</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#cam{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    filter:grayscale(1) contrast(1.4);
}

#dark{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.05;
    mix-blend-mode:screen;
}

#rec{
    position:absolute;
    top:20px;
    left:20px;
    color:red;
    animation:blink 1s infinite;
}

#time{
    position:absolute;
    top:20px;
    right:20px;
}

#status{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    opacity:0.6;
    letter-spacing:2px;
}

.flash{
    animation:flash 0.15s;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div id="cam"></div>
<div id="dark"></div>
<div id="noise"></div>

<div id="rec">● REC</div>
<div id="time"></div>

<div id="status">
    подключение...
</div>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {
        trust:0,
        observed:0
    };

}

state.observed = (state.observed || 0) + 1;
state.trust += 1;

localStorage.setItem("state", JSON.stringify(state));

const cam = document.getElementById("cam");
const status = document.getElementById("status");
const time = document.getElementById("time");

// СЛУЧАЙНЫЕ КАДРЫ
const scenes = [

    {
        img:"hall.jpg",
        text:"наблюдение активно"
    },

    {
        img:"garage.jpg",
        text:"сигнал нестабилен"
    },

    {
        img:"mask.png",
        text:"обнаружена фигура"
    }

];

// случайная сцена
let scene = scenes[Math.floor(Math.random() * scenes.length)];

cam.style.backgroundImage = `url(${scene.img})`;

status.innerText = scene.text;

// случайное время
let h = Math.floor(Math.random()*24).toString().padStart(2,"0");
let m = Math.floor(Math.random()*60).toString().padStart(2,"0");
let s = Math.floor(Math.random()*60).toString().padStart(2,"0");

time.innerText = `${h}:${m}:${s}`;

// редкие события
setTimeout(()=>{

    if(Math.random() > 0.65){

        document.body.classList.add("flash");

    }

},4000);

setTimeout(()=>{

    if(Math.random() > 0.7){

        status.innerText = "потеря сигнала";

    }

},7000);

setTimeout(()=>{

    if(Math.random() > 0.82){

        status.innerText = "она смотрит прямо сюда";

    }

},10000);

// ПЕРЕХОДЫ
setTimeout(()=>{

    let r = Math.random();

    // РЕДКИЙ TIME
    if(r > 0.93){

        window.location.href = "time.html";

    // GLITCH
    }else if(r > 0.75){

        window.location.href = "glitch.html";

    // LOG
    }else if(r > 0.45){

        window.location.href = "log.html";

    // INDEX
    }else{

        window.location.href = "index.html";

    }

},14000);

</script>

</body>
</html>
