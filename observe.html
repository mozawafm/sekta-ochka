<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>observe</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
    color:white;
    cursor:none;
}

#bg{

    position:absolute;
    width:100%;
    height:100%;

    background:url("garage.jpg") center center/cover no-repeat;

    filter:
    brightness(0.15)
    contrast(1.5)
    grayscale(1);

    transform:scale(1.06);

}

#noise{

    position:absolute;
    width:100%;
    height:100%;

    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

    opacity:0.08;

    mix-blend-mode:screen;

    pointer-events:none;

}

#scan{

    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );

    opacity:0.3;

    pointer-events:none;

}

#text{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:90%;

    text-align:center;

    font-size:26px;

    letter-spacing:5px;

    opacity:0.92;

}

#small{

    margin-top:25px;

    font-size:11px;

    opacity:0.25;

    letter-spacing:4px;

}

.flash{
    animation:flash 0.08s;
}

@keyframes flash{

    50%{
        opacity:0;
    }

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="scan"></div>

<div id="text">

    МЫ ВИДИМ ТЕБЯ

    <div id="small">
        observation active
    </div>

</div>

<script>

const text = document.getElementById("text");

const phrases = [

"МЫ ВИДИМ ТЕБЯ",
"ТЫ СНОВА ЗДЕСЬ",
"НАБЛЮДЕНИЕ ПРОДОЛЖАЕТСЯ",
"НЕ ВЫКЛЮЧАЙ ЗАПИСЬ",
"ОНА УЖЕ ПРИХОДИЛА",
"СИГНАЛ НЕ ПРЕРЫВАЛСЯ"

];

// МУТАЦИЯ

setInterval(()=>{

    text.childNodes[0].nodeValue =
    phrases[
        Math.floor(Math.random()*phrases.length)
    ];

},3200);

// ВСПЫШКИ

setInterval(()=>{

    if(Math.random() > 0.7){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

},2200);

// РЕДКИЙ КАДР

setInterval(()=>{

    if(Math.random() > 0.9){

        document.getElementById("bg").style.backgroundImage =
        'url("girl.jpg")';

        setTimeout(()=>{

            document.getElementById("bg").style.backgroundImage =
            'url("garage.jpg")';

        },120);

    }

},4000);

// ПЕРЕХОДЫ

setTimeout(()=>{

    let r = Math.random();

    if(r > 0.7){

        window.location.href = "glitch.html";

    }else if(r > 0.45){

        window.location.href = "log.html";

    }else{

        window.location.href = "hub.html";

    }

},18000);

</script>

<script src="audio.js"></script>

</body>
</html>
