<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>observe</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#cam{
    position:absolute;
    width:100%;
    height:100%;
    background:url("hall.jpg") center center/cover no-repeat;
    filter:grayscale(1) contrast(1.3);
}

#dark{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
}

#rec{
    position:absolute;
    top:20px;
    left:20px;
    color:red;
    animation:blink 1s infinite;
}

#time{
    position:absolute;
    top:20px;
    right:20px;
}

#status{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    opacity:0.7;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.flash{
    animation:flash 0.2s;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div id="cam"></div>
<div id="dark"></div>

<div id="rec">● REC</div>
<div id="time">03:12:08</div>

<div id="status">
    наблюдение активно
</div>

<script>

let state = JSON.parse(localStorage.getItem("state"));

state.path += "O";
state.trust += 1;

localStorage.setItem("state", JSON.stringify(state));

const status = document.getElementById("status");

// редкие события
setTimeout(()=>{

    status.innerText = "обнаружено движение";

},4000);

setTimeout(()=>{

    document.body.classList.add("flash");

},7000);

setTimeout(()=>{

    status.innerText = "сигнал нестабилен";

},9000);

// редкий глитч
setTimeout(()=>{

    let r = Math.random();

    if(r > 0.75){

        document.getElementById("cam").style.backgroundImage =
        'url("mask.png")';

    }

},11000);

// переход
setTimeout(()=>{

    let r = Math.random();

    if(r > 0.7){

        window.location.href = "glitch.html";

    }else{

        window.location.href = "index.html";

    }

},15000);

</script>

</body>
</html>
