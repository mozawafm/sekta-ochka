<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:monospace;">

<p id="t">...</p>

<script>

let t = document.getElementById("t");

// текущее время
let now = new Date();

// странное «время»
let fakeTime = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();

t.innerText = "время: " + fakeTime;

// через секунду — сбой
setTimeout(function() {
    t.innerText = "нет";
}, 1000);

// ещё через секунду
setTimeout(function() {
    t.innerText = "это уже было";
}, 2000);

// возврат
setTimeout(function() {
    window.location.href = "index.html";
}, 4000);

</script>

</body>
</html>
