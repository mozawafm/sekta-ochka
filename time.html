<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>time</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:monospace;
overflow:hidden;
cursor:none;
}

#container{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#question{

font-size:28px;

letter-spacing:4px;

margin-bottom:60px;

}

.choice{

margin:15px auto;

padding:15px;

width:320px;

border:1px solid rgba(255,255,255,.2);

cursor:pointer;

opacity:.5;

transition:.3s;

}

.choice:hover{

opacity:1;

background:white;

color:black;

}

#small{

margin-top:50px;

font-size:11px;

letter-spacing:3px;

opacity:.2;

}

</style>
</head>

<body>

<div id="container">

<div id="question">

что ты помнишь?

</div>

<div class="choice" onclick="go('garage')">

гараж

</div>

<div class="choice" onclick="go('mask')">

созерцателя

</div>

<div class="choice" onclick="go('naomi')">

черную кошку

</div>

<div class="choice" onclick="go('numbers')">

216 / 432

</div>

<div class="choice" onclick="go('nothing')">

ничего

</div>

<div id="small">

запись может быть повреждена

</div>

</div>

<script>

function go(choice){

localStorage.setItem(
"memory",
choice
);

switch(choice){

case "garage":
window.location.href =
"observe.html";
break;

case "mask":
window.location.href =
"signal.html";
break;

case "naomi":
window.location.href =
"loop.html";
break;

case "numbers":
window.location.href =
"glitch.html";
break;

case "nothing":
window.location.href =
"final.html";
break;

}

}

</script>

<script src="audio.js"></script>

</body>
</html>
