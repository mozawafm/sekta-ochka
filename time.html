<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>time</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:monospace;
    cursor:none;
}

#bg{

    position:absolute;
    width:100%;
    height:100%;

    background:url("garage.jpg") center center/cover no-repeat;

    filter:
    brightness(0.16)
    contrast(1.5)
    grayscale(1);

    transform:scale(1.05);

}

#noise{

    position:absolute;
    width:100%;
    height:100%;

    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");

    opacity:0.07;

    mix-blend-mode:screen;

    pointer-events:none;

}

#scan{

    position:absolute;
    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 4px
    );

    opacity:0.25;

    pointer-events:none;

}

#center{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    width:90%;

}

#question{

    font-size:28px;

    letter-spacing:6px;

    margin-bottom:60px;

    opacity:0.92;

}

.choice{

    margin:18px auto;

    width:320px;

    border:1px solid rgba(255,255,255,0.18);

    padding:16px;

    cursor:pointer;

    transition:0.25s;

    opacity:0.45;

}

.choice:hover{

    opacity:1;

    background:white;
    color:black;

}

#small{

    margin-top:50px;

    opacity:0.15;

    font-size:11px;

    letter-spacing:3px;

}

.flash{
    animation:flash 0.08s;
}

@keyframes flash{

    50%{
        opacity:0;
    }

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="scan"></div>

<div id="center">

    <div id="question">
        ЧТО ТЫ ПОМНИШЬ?
    </div>

    <div class="choice" id="c1">
        гараж
    </div>

    <div class="choice" id="c2">
        маску
    </div>

    <div class="choice" id="c3">
        свое лицо
    </div>

    <div class="choice" id="c4">
        ничего
    </div>

    <div id="small">
        выбор влияет на запись
    </div>

</div>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {};

}

function save(){

    localStorage.setItem(
        "state",
        JSON.stringify(state)
    );

}

// ГЛИТЧИ

setInterval(()=>{

    if(Math.random() > 0.78){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },80);

    }

},2600);

// ВЫБОРЫ

document.getElementById("c1").onclick = () => {

    state.memory = "garage";
    state.trust = (state.trust || 0) + 5;

    save();

    transition("observe.html");

};

document.getElementById("c2").onclick = () => {

    state.memory = "mask";
    state.trust = (state.trust || 0) + 10;

    save();

    transition("loop.html");

};

document.getElementById("c3").onclick = () => {

    state.memory = "face";
    state.trust = (state.trust || 0) + 20;

    save();

    transition("signal.html");

};

document.getElementById("c4").onclick = () => {

    state.memory = "nothing";

    save();

    transition("glitch.html");

};

// ПЕРЕХОД

function transition(page){

    document.body.classList.add("flash");

    setTimeout(()=>{

        window.location.href = page;

    },900);

}

// СКРЫТЫЙ ВАРИАНТ

let clicks = 0;

document.body.addEventListener("click",()=>{

    clicks++;

    if(clicks > 12){

        window.location.href = "secret.html";

    }

});

</script>

<script src="audio.js"></script>

</body>
</html>
