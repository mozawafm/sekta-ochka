<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>time</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#time{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:90px;
    letter-spacing:10px;
    opacity:0.9;
}

#phrase{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    opacity:0.35;
    font-size:14px;
}

.flash{
    animation:flash 0.08s;
}

@keyframes flash{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="time">
    22:22
</div>

<div id="phrase">
    время не имеет значения
</div>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {};

}

state.trust = (state.trust || 0) + 5;

localStorage.setItem("state", JSON.stringify(state));

const time = document.getElementById("time");

const times = [

"22:22",
"11:11",
"03:11",
"21:11",
"00:00"

];

let index = 0;

setInterval(()=>{

    index++;

    if(index >= times.length){

        index = 0;

    }

    time.innerText = times[index];

    if(Math.random() > 0.6){

        document.body.classList.add("flash");

        setTimeout(()=>{

            document.body.classList.remove("flash");

        },100);

    }

},2200);

setTimeout(()=>{

    let r = Math.random();

    if(r > 0.6){

        window.location.href = "loop.html";

    }else{

        window.location.href = "index.html";

    }

},17000);

</script>

</body>
</html>
