<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>time</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
cursor:none;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("garage.jpg") center center/cover no-repeat;
filter:
brightness(0.15)
contrast(1.5)
grayscale(1);
transform:scale(1.04);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:0.08;
mix-blend-mode:screen;
pointer-events:none;
}

#scan{
position:absolute;
width:100%;
height:100%;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 4px
);

opacity:0.25;
pointer-events:none;
}

#center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#question{

font-size:28px;

letter-spacing:6px;

margin-bottom:60px;

opacity:0.9;

transition:1s;

}

.choice{

width:320px;

margin:16px auto;

padding:16px;

border:1px solid rgba(255,255,255,0.15);

cursor:pointer;

opacity:0.45;

transition:0.3s;

}

.choice:hover{

opacity:1;

background:white;
color:black;

}

#analysis{

margin-top:50px;

font-size:12px;

letter-spacing:3px;

opacity:0;

transition:1s;

min-height:40px;

}

#secret{

position:absolute;

bottom:20px;
right:20px;

font-size:11px;

opacity:0;

letter-spacing:2px;

cursor:pointer;

transition:4s;

}

.flash{
animation:flash 0.08s;
}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="scan"></div>

<div id="center">

<div id="question">
ЧТО ТЫ ПОМНИШЬ?
</div>

<div class="choice" onclick="choose('garage')">
гараж
</div>

<div class="choice" onclick="choose('mask')">
маску
</div>

<div class="choice" onclick="choose('face')">
свое лицо
</div>

<div class="choice" onclick="choose('nothing')">
ничего
</div>

<div id="analysis"></div>

</div>

<div id="secret">
это было не со мной
</div>

<script>

let state =
JSON.parse(
localStorage.getItem("state")
);

if(!state){

state = {};

}

function saveState(){

localStorage.setItem(
"state",
JSON.stringify(state)
);

}

const analysis =
document.getElementById("analysis");

function choose(answer){

document
.querySelectorAll(".choice")
.forEach(el=>{

el.style.pointerEvents = "none";
el.style.opacity = "0.15";

});

state.memory = answer;

saveState();

analysis.style.opacity = "1";

analysis.innerText =
"обработка воспоминания...";

setTimeout(()=>{

analysis.innerText =
"сопоставление записи...";

},2000);

setTimeout(()=>{

if(answer==="garage"){

analysis.innerText =
"место найдено";

}

if(answer==="mask"){

analysis.innerText =
"наблюдатель подтвержден";

}

if(answer==="face"){

analysis.innerText =
"обнаружено совпадение";

}

if(answer==="nothing"){

analysis.innerText =
"ошибка памяти";

}

},4500);

setTimeout(()=>{

analysis.innerText =
"совпадение найдено";

},7000);

setTimeout(()=>{

go(answer);

},9000);

}

function go(answer){

document.body.classList.add("flash");

setTimeout(()=>{

if(answer==="garage"){

window.location.href =
"observe.html";

}

else if(answer==="mask"){

window.location.href =
"loop.html";

}

else if(answer==="face"){

window.location.href =
"signal.html";

}

else{

window.location.href =
"glitch.html";

}

},700);

}

setTimeout(()=>{

document
.getElementById("secret")
.style.opacity = "0.08";

},15000);

document
.getElementById("secret")
.onclick = ()=>{

analysis.style.opacity = "1";

analysis.innerText =
"запись повреждена";

state.memory = "not_me";

saveState();

setTimeout(()=>{

window.location.href =
"secret.html";

},2500);

};

setInterval(()=>{

if(Math.random()>0.82){

document.body.classList.add("flash");

setTimeout(()=>{

document.body.classList.remove("flash");

},80);

}

},3000);

</script>

<script src="audio.js"></script>

</body>
</html>
