<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>deeper</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        color: #b0b0b0;
        text-align: center;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: default;
        opacity: 0;
        animation: fadeInBody 3s ease forwards;
        overflow: hidden;
    }

    @keyframes fadeInBody {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    p {
        margin: 20px 0;
        font-size: 1.2em;
        letter-spacing: 2px;
        text-shadow: 0 0 5px rgba(255,255,255,0.2);
        opacity: 0;
        transform: translateY(15px);
        animation: fadeInUp 0.8s forwards;
    }

    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    p:nth-of-type(1) { animation-delay: 0.5s; }
    p:nth-of-type(2) { animation-delay: 2.5s; }
    p:nth-of-type(3) { animation-delay: 4.5s; }
    p:nth-of-type(4) { animation-delay: 6.5s; }

    .glitch {
        position: relative;
        display: inline-block;
    }

    .glitch:hover {
        animation: glitchText 0.3s infinite;
        color: #ff4d4d;
        cursor: help;
    }

    @keyframes glitchText {
        0% { text-shadow: -2px 0 red, 2px 0 blue; transform: skew(0deg); }
        25% { text-shadow: 2px 0 red, -2px 0 blue; transform: skew(2deg); }
        50% { text-shadow: -2px 0 blue, 2px 0 red; transform: skew(-2deg); }
        75% { text-shadow: 2px 0 blue, -2px 0 red; transform: skew(1deg); }
        100% { text-shadow: -2px 0 red, 2px 0 blue; transform: skew(0deg); }
    }

    .cursor {
        display: inline-block;
        width: 12px;
        height: 18px;
        background-color: #b0b0b0;
        vertical-align: middle;
        margin-left: 8px;
        animation: blink 1s step-end infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    .hint {
        position: fixed;
        bottom: 15px;
        left: 15px;
        font-size: 0.7em;
        opacity: 0.2;
        transition: 0.3s;
        cursor: pointer;
        z-index: 10;
    }

    .hint:hover {
        opacity: 0.8;
    }

    .noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif');
        opacity: 0.04;
        pointer-events: none;
        z-index: 20;
        mix-blend-mode: screen;
    }

    .flash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 30;
        transition: opacity 0.05s;
    }

    /* Секретное уведомление */
    .secret-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        border: 1px solid #d4c5a0;
        color: #d4c5a0;
        padding: 10px 20px;
        font-family: monospace;
        font-size: 0.8em;
        letter-spacing: 3px;
        z-index: 50;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        white-space: nowrap;
    }
</style>
</head>
<body>

<div class="noise"></div>
<div class="flash" id="flash"></div>
<div class="secret-toast" id="secretToast">🎭 216</div>

<p>она не должна была это <span class="glitch" title="оператор?">найти</span></p>
<p><span class="glitch" title="уже здесь">они</span> уже видят тебя</p>
<p>следующий шаг <span class="glitch" title="уже был. или нет.">уже был</span></p>
<p>смотри <span class="glitch" id="watchTrigger" title="нажми на меня">внимательно</span><span class="cursor"></span></p>

<div class="hint" id="hint">[тишина. нажми для сигнала]</div>

<script>
    // ============================================
    // ЭЛЕМЕНТЫ
    // ============================================
    const flashDiv = document.getElementById('flash');
    const watchSpan = document.getElementById('watchTrigger');
    const hintDiv = document.getElementById('hint');
    const secretToast = document.getElementById('secretToast');
    
    // ============================================
    // ВИЗУАЛЬНЫЕ ЭФФЕКТЫ
    // ============================================
    function doFlash() {
        flashDiv.style.opacity = '0.25';
        setTimeout(() => { flashDiv.style.opacity = '0'; }, 90);
    }
    
    function showToast(text, duration = 1500) {
        secretToast.innerText = text;
        secretToast.style.opacity = '1';
        setTimeout(() => {
            secretToast.style.opacity = '0';
        }, duration);
    }
    
    // Случайные вспышки
    setInterval(() => {
        if (Math.random() > 0.92) {
            doFlash();
            if (typeof playGlitch === 'function') playGlitch();
        }
    }, 3500);
    
    // ============================================
    // КЛИК ПО "ВНИМАТЕЛЬНО" -> КНИГА
    // ============================================
    watchSpan.addEventListener('click', () => {
        doFlash();
        watchSpan.innerHTML = 'УВИДЕЛ';
        watchSpan.style.color = '#ff8888';
        watchSpan.style.animation = 'glitchText 0.2s infinite';
        console.log('%cТЫ ОТКРЫЛ КНИГУ ОЗАРЕНИЯ', 'color: #d4c5a0; font-size: 14px;');
        showToast('📖 КНИГА ОТКРЫВАЕТСЯ...', 1200);
        setTimeout(() => {
            window.location.href = 'book.html';
        }, 1300);
    });
    
    // ============================================
    // КЛИК ПО ПОДСКАЗКЕ
    // ============================================
    hintDiv.addEventListener('click', () => {
        hintDiv.innerHTML = '[сигнал пойман. они ближе]';
        hintDiv.style.opacity = '0.8';
        doFlash();
        setTimeout(() => {
            window.location.href = 'signal.html';
        }, 1500);
    });
    
    // ============================================
    // 🔥 ГЛАВНАЯ ФИЧА: НАБОР 216 НА КЛАВИАТУРЕ
    // ============================================
    let keyBuffer = '';
    let lastKeyTime = 0;
    
    document.addEventListener('keydown', (e) => {
        // Игнорируем модификаторы и функциональные клавиши
        if (e.key.length > 1) return;
        
        const now = Date.now();
        // Если прошло больше 1.5 секунд — сбрасываем буфер
        if (now - lastKeyTime > 1500) {
            keyBuffer = '';
        }
        lastKeyTime = now;
        
        // Добавляем символ в буфер
        keyBuffer += e.key;
        // Оставляем только последние 6 символов (максимум)
        if (keyBuffer.length > 6) {
            keyBuffer = keyBuffer.slice(-6);
        }
        
        // Проверяем, содержит ли буфер "216"
        if (keyBuffer.includes('216')) {
            console.log('%c🔮 КОД 216 ВВЕДЁН', 'color: #d4c5a0; font-size: 14px;');
            showToast('🎭 216', 800);
            
            // Эффект: три вспышки
            for (let i = 0; i < 3; i++) {
                setTimeout(() => { doFlash(); }, i * 150);
            }
            
            // Небольшая задержка для атмосферы
            setTimeout(() => {
                window.location.href = 'book.html';
            }, 800);
            
            // Очищаем буфер, чтобы не сработало повторно
            keyBuffer = '';
        }
        
        // Дополнительно: на Escape — дёргаем экран
        if (e.key === 'Escape') {
            document.body.style.transform = 'translateX(4px)';
            setTimeout(() => { document.body.style.transform = ''; }, 100);
            doFlash();
        }
    });
    
    // ============================================
    // ПРОИГРЫВАНИЕ ГЛИТЧ-ЗВУКА
    // ============================================
    function playGlitch() {
        if (typeof playSound === 'function') {
            playSound('glitch');
        } else {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                gain.gain.value = 0.1;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                osc.stop(ctx.currentTime + 0.3);
                ctx.resume();
            } catch(e) { console.log(e); }
        }
    }
    
    // ============================================
    // LOCALSTORAGE
    // ============================================
    let state = JSON.parse(localStorage.getItem('state') || '{}');
    if (!state.deeper) {
        state.deeper = { visited: 1 };
        localStorage.setItem('state', JSON.stringify(state));
    } else {
        state.deeper.visited++;
        localStorage.setItem('state', JSON.stringify(state));
    }
</script>

<script src="audio.js"></script>
</body>
</html>
