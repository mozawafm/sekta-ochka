<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>final</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: 'Courier New', monospace;
        cursor: default;
    }

    #bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("garage.jpg") center center/cover no-repeat;
        filter: brightness(0.06) contrast(1.8) grayscale(1);
        transform: scale(1.08);
        transition: all 0.5s ease;
    }

    #noise {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
        opacity: 0.08;
        mix-blend-mode: screen;
        pointer-events: none;
    }

    #center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 800px;
        text-align: center;
        z-index: 20;
    }

    .line {
        font-size: 28px;
        letter-spacing: 6px;
        margin: 20px 0;
        opacity: 0;
        transition: all 0.8s ease;
    }

    .line-main {
        font-size: 36px;
        letter-spacing: 8px;
        text-shadow: 0 0 20px rgba(212,197,160,0.5);
    }

    .line-small {
        font-size: 14px;
        letter-spacing: 4px;
        color: #b0a0a0;
    }

    .line-final {
        font-size: 18px;
        letter-spacing: 6px;
        color: #d4c5a0;
        margin-top: 50px;
        border-top: 1px dashed rgba(212,197,160,0.3);
        padding-top: 30px;
        display: inline-block;
    }

    #progressContainer {
        position: fixed;
        bottom: 30px;
        left: 10%;
        width: 80%;
        height: 2px;
        background: rgba(255,255,255,0.1);
        z-index: 100;
    }

    #progressBar {
        width: 0%;
        height: 100%;
        background: #d4c5a0;
        transition: width 0.1s linear;
        box-shadow: 0 0 5px #d4c5a0;
    }

    #counter {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font-size: 9px;
        opacity: 0.2;
        z-index: 100;
        letter-spacing: 2px;
    }

    #skip {
        position: fixed;
        bottom: 20px;
        left: 20px;
        font-size: 9px;
        opacity: 0.15;
        cursor: pointer;
        transition: 0.2s;
        z-index: 100;
        letter-spacing: 2px;
    }

    #skip:hover {
        opacity: 0.6;
    }

    @keyframes flashAnim {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }

    @keyframes glitch {
        0% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
        25% { transform: translate(-2px, 1px); text-shadow: 2px 0 red, -2px 0 blue; }
        50% { transform: translate(2px, -1px); text-shadow: -2px 0 blue, 2px 0 red; }
        75% { transform: translate(-1px, 2px); text-shadow: 2px 0 blue, -2px 0 red; }
        100% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
    }

    @keyframes pulse {
        0% { opacity: 0.3; filter: brightness(0.06); }
        50% { opacity: 0.8; filter: brightness(0.15); }
        100% { opacity: 0.3; filter: brightness(0.06); }
    }

    .glitch-active {
        animation: glitch 0.2s infinite;
        color: #d4c5a0;
    }

    .pulse-active {
        animation: pulse 0.3s ease-out;
    }

    .flash-active {
        animation: flashAnim 0.08s;
    }
</style>
</head>
<body>

<div id="bg"></div>
<div id="noise"></div>

<div id="center">
    <div id="line1" class="line line-main"></div>
    <div id="line2" class="line line-small"></div>
    <div id="line3" class="line line-small"></div>
    <div id="line4" class="line line-final"></div>
</div>

<div id="progressContainer">
    <div id="progressBar"></div>
</div>

<div id="counter">◉ ЗАПИСЬ ЗАВЕРШАЕТСЯ</div>
<div id="skip">[пропустить →]</div>

<script>
    // ============================================
    // ПРОВЕРКА: ЗАЩИТА ОТ ПРЯМОГО ДОСТУПА
    // ============================================
    (function() {
        // Разрешённые страницы-источники (откуда можно прийти на final.html)
        const allowedReferrers = [
            'signal.html',
            'video.html',
            'address.html',
            'garage.html',
            'naomi.html',
            'loop.html',
            'secret.html',
            'deeper.html',
            'hub.html'
        ];
        
        const referrer = document.referrer;
        
        // Если нет referrer (прямой переход) или referrer не содержит разрешённую страницу
        if (referrer === "") {
            window.location.href = "enter.html";
            return;
        }
        
        let isAllowed = false;
        for (let i = 0; i < allowedReferrers.length; i++) {
            if (referrer.includes(allowedReferrers[i])) {
                isAllowed = true;
                break;
            }
        }
        
        if (!isAllowed) {
            window.location.href = "enter.html";
            return;
        }
    })();

    // ============================================
    // ОСНОВНОЙ КОД
    // ============================================
    const mainPhrases = [
        "216",
        "432",
        "СОВПАДЕНИЕ ПОДТВЕРЖДЕНО",
        "СИГНАЛ ОБНАРУЖЕН",
        "ДОСТУП РАЗРЕШЁН"
    ];
    
    const secondaryPhrases = [
        "созерцатель молчит",
        "запись продолжается",
        "тишина заговорит",
        "источник неизвестен",
        "наблюдение активно",
        "Наоми смотрит на дверь",
        "обнаружен второй экземпляр",
        "цикл замкнулся",
        "216 секунд тишины",
        "лазеры погасли",
        "гараж дышит",
        "3:36"
    ];
    
    const finalPhrases = [
        "ЭТО НИКОГДА НЕ ЗАКОНЧИТСЯ",
        "ОНА УЖЕ БЫЛА ЗДЕСЬ",
        "ФИНАЛ — ЭТО ИЛЛЮЗИЯ",
        "ВЫБОРА НЕ СУЩЕСТВУЕТ",
        "ДОБРО ПОЖАЛОВАТЬ ДОМОЙ",
        "216 → 0x216 ← 216"
    ];
    
    const line1 = document.getElementById("line1");
    const line2 = document.getElementById("line2");
    const line3 = document.getElementById("line3");
    const line4 = document.getElementById("line4");
    const bg = document.getElementById("bg");
    const noise = document.getElementById("noise");
    const progressBar = document.getElementById("progressBar");
    
    let startTime = Date.now();
    let totalDuration = 26000;
    let intervalId = null;
    
    function doFlash() {
        document.body.classList.add("flash-active");
        setTimeout(() => {
            document.body.classList.remove("flash-active");
        }, 80);
    }
    
    function doPulse() {
        bg.classList.add("pulse-active");
        setTimeout(() => {
            bg.classList.remove("pulse-active");
        }, 300);
    }
    
    function randomFrom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }
    
    function updateProgress() {
        const elapsed = Date.now() - startTime;
        let percent = Math.min(100, (elapsed / totalDuration) * 100);
        progressBar.style.width = percent + "%";
        
        if (percent < 100) {
            requestAnimationFrame(updateProgress);
        }
    }
    
    function glitchElement(element, duration = 500) {
        element.classList.add("glitch-active");
        setTimeout(() => {
            element.classList.remove("glitch-active");
        }, duration);
    }
    
    function finalGlitch() {
        line4.classList.add("glitch-active");
    }
    
    setTimeout(() => {
        line1.innerText = randomFrom(mainPhrases);
        line1.style.opacity = "0.95";
        doFlash();
        doPulse();
    }, 500);
    
    setTimeout(() => {
        line2.innerText = randomFrom(secondaryPhrases);
        line2.style.opacity = "0.7";
        doFlash();
        doPulse();
    }, 4000);
    
    setTimeout(() => {
        line3.innerText = randomFrom(secondaryPhrases);
        line3.style.opacity = "0.5";
        doFlash();
        doPulse();
    }, 8000);
    
    setTimeout(() => {
        line4.innerText = randomFrom(finalPhrases);
        line4.style.opacity = "0.85";
        finalGlitch();
        doFlash();
        doPulse();
        
        setTimeout(() => doFlash(), 150);
        setTimeout(() => doFlash(), 300);
        setTimeout(() => doFlash(), 450);
    }, 13000);
    
    intervalId = setInterval(() => {
        if (Math.random() > 0.75) {
            doFlash();
        }
        if (Math.random() > 0.85) {
            doPulse();
        }
        if (Math.random() > 0.9) {
            const tempNoise = noise.style.opacity;
            noise.style.opacity = "0.2";
            setTimeout(() => {
                noise.style.opacity = tempNoise;
            }, 200);
        }
        if (Math.random() > 0.92) {
            const lines = [line1, line2, line3];
            const randomLine = randomFrom(lines);
            if (randomLine.style.opacity > 0) {
                glitchElement(randomLine, 200);
            }
        }
    }, 2500);
    
    setTimeout(() => {
        noise.style.opacity = "0.18";
        bg.style.filter = "brightness(0.1) contrast(1.8) grayscale(0.8)";
        doFlash();
        doPulse();
    }, 12000);
    
    setTimeout(() => {
        noise.style.opacity = "0.08";
        bg.style.filter = "brightness(0.06) contrast(1.8) grayscale(1)";
    }, 16000);
    
    updateProgress();
    
    setTimeout(() => {
        for (let i = 0; i < 6; i++) {
            setTimeout(() => doFlash(), i * 120);
        }
        setTimeout(() => doPulse(), 300);
        setTimeout(() => {
            noise.style.opacity = "0.25";
        }, 400);
    }, 25000);
    
    setTimeout(() => {
        window.location.href = "hub.html";
    }, totalDuration);
    
    document.getElementById("skip").addEventListener("click", () => {
        if (intervalId) clearInterval(intervalId);
        for (let i = 0; i < 5; i++) {
            setTimeout(() => doFlash(), i * 80);
        }
        setTimeout(() => {
            window.location.href = "hub.html";
        }, 400);
    });
    
    let state = JSON.parse(localStorage.getItem('state') || '{}');
    if (!state.final) {
        state.final = { completed: 1, timestamp: Date.now() };
    } else {
        state.final.completed++;
    }
    localStorage.setItem('state', JSON.stringify(state));
    
    console.log("%c▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓", "color: #d4c5a0");
    console.log("%cФИНАЛ", "color: #d4c5a0; font-size: 24px; font-family: monospace;");
    console.log("%c216 → 0x216 ← 216", "color: #8a7a5a; font-size: 14px;");
    console.log("%cОна уже была здесь", "color: #6a5a4a; font-size: 11px;");
    console.log("%c▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓", "color: #d4c5a0");
</script>

<script src="audio.js"></script>
</body>
</html>
