<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>final</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
cursor:none;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("garage.jpg") center center/cover no-repeat;
filter:brightness(0.06) contrast(1.8) grayscale(1);
transform:scale(1.08);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:.1;
mix-blend-mode:screen;
pointer-events:none;
}

#center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#line{

font-size:26px;

letter-spacing:6px;

opacity:0;

transition:2s;

}

.small{

margin-top:30px;

font-size:12px;

letter-spacing:4px;

opacity:0;

transition:2s;

}

.flash{

animation:flash .08s;

}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>

<div id="center">

<div id="line"></div>

<div id="s1" class="small"></div>
<div id="s2" class="small"></div>

</div>

<script>

const phrases=[

"216",

"432",

"созерцатель молчит",

"запись продолжается",

"совпадение найдено",

"тишина заговорит",

"источник неизвестен",

"наблюдение активно",

"Наоми смотрит на дверь",

"обнаружен второй экземпляр"

];

const line=document.getElementById("line");
const s1=document.getElementById("s1");
const s2=document.getElementById("s2");

line.innerText=
phrases[Math.floor(Math.random()*phrases.length)];

setTimeout(()=>{

line.style.opacity=".9";

},1000);

setTimeout(()=>{

s1.innerText=
phrases[Math.floor(Math.random()*phrases.length)];

s1.style.opacity=".5";

},5000);

setTimeout(()=>{

s2.innerText=
phrases[Math.floor(Math.random()*phrases.length)];

s2.style.opacity=".3";

},9000);

setInterval(()=>{

if(Math.random()>.85){

document.body.classList.add("flash");

setTimeout(()=>{

document.body.classList.remove("flash");

},80);

}

},3000);

setTimeout(()=>{

window.location.href="hub.html";

},25000);

</script>

<script src="audio.js"></script>

</body>
</html>
