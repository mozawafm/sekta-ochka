<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>video</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:white;
}

#video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:contrast(1.1) brightness(0.8);
}

#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
    pointer-events:none;
}

#noise{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
    opacity:0.05;
    mix-blend-mode:screen;
    pointer-events:none;
}

#rec{
    position:absolute;
    top:20px;
    left:20px;
    color:red;
    font-size:18px;
    letter-spacing:3px;
    animation:blink 1s infinite;
}

#time{
    position:absolute;
    top:20px;
    right:20px;
    font-size:18px;
}

#text{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    opacity:0.5;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

.flash{
    animation:flash 0.2s;
}

@keyframes flash{
    0%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<video 
    id="video"
    autoplay
    muted
    playsinline
>

    <source src="video.mp4" type="video/mp4">

</video>

<div id="overlay"></div>
<div id="noise"></div>

<div id="rec">● REC</div>
<div id="time">00:01:12</div>

<div id="text">
    воспроизведение
</div>

<script>

let state = JSON.parse(localStorage.getItem("state"));

if(!state){

    state = {
        trust:0,
        watched:0,
        unlocked:false
    };

}

state.watched = (state.watched || 0) + 1;
state.trust += 5;

localStorage.setItem("state", JSON.stringify(state));

const video = document.getElementById("video");
const text = document.getElementById("text");

// СТРАННЫЕ ФРАЗЫ ВО ВРЕМЯ ПРОСМОТРА
setTimeout(()=>{

    text.innerText = "не выключай";

},5000);

setTimeout(()=>{

    text.innerText = "...";

},10000);

setTimeout(()=>{

    document.body.classList.add("flash");

},13000);

// 🔥 ГЛАВНОЕ
// КОНЕЦ ВИДЕО
video.onended = () => {

    text.innerText = "запись завершена";

    setTimeout(()=>{

        let current = JSON.parse(localStorage.getItem("state"));

        let r = Math.random();

        // если открыта система
        if(current.unlocked && r > 0.7){

            window.location.href = "enter.html";
            return;

        }

        // редкий final
        if(current.watched >= 3 && r > 0.82){

            window.location.href = "final.html";
            return;

        }

        // loop
        if(r > 0.55){

            window.location.href = "loop.html";

        }else{

            window.location.href = "index.html";

        }

    },3000);

};

</script>

</body>
</html>
