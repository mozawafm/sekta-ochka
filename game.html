<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DJ Son - Moonwalker Style</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: white; user-select: none;
        }

        #arcade-cabinet {
            position: relative;
            width: 960px; height: 540px; /* 16:9 aspect ratio */
            background: #000;
            border: 10px solid #222;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated; /* CRITICAL for retro look */
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-top {
            display: flex; justify-content: space-between;
            padding: 20px 40px;
            text-shadow: 2px 2px 0 #000;
            font-size: 20px;
            color: #fff;
        }

        .health-bar-container {
            width: 200px; height: 20px;
            background: #333; border: 2px solid #fff;
            position: relative;
        }
        .health-fill {
            height: 100%; background: linear-gradient(90deg, #ff0055, #ff5500);
            width: 100%; transition: width 0.2s;
        }

        .score-box { color: #ffd700; }

        /* Screens */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
        }
        .hidden { display: none !important; }

        h1 { 
            font-size: 50px; margin-bottom: 10px;
            color: #fff; text-shadow: 4px 4px 0 #ff0055;
            letter-spacing: -2px;
        }
        
        button {
            margin-top: 40px;
            padding: 15px 40px;
            font-family: inherit; font-size: 24px;
            background: #ff0055; color: #fff;
            border: 4px solid #fff;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            transition: transform 0.1s;
        }
        button:hover { transform: scale(1.05); background: #ff3377; }
        button:active { transform: translate(2px, 2px); box-shadow: 3px 3px 0 #000; }

        .controls-hint {
            margin-top: 20px; font-size: 12px; color: #aaa; line-height: 1.6;
        }
        .key { color: #fff; border: 1px solid #666; padding: 2px 6px; border-radius: 4px; background: #222; }
    </style>
</head>
<body>

<div id="arcade-cabinet">
    <canvas id="gameCanvas" width="480" height="270"></canvas> <!-- Native resolution 480x270 scaled up -->
    
    <div id="ui-layer">
        <div class="hud-top">
            <div>
                <div style="font-size:12px; color:#aaa; margin-bottom:5px;">DJ SON LIFE</div>
                <div class="health-bar-container"><div id="hp-bar" class="health-fill"></div></div>
            </div>
            <div class="score-box">SCORE: <span id="score-val">000000</span></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1>DJ SON<br><span style="font-size:24px; color:#ccc;">CLUB WALKER</span></h1>
        <button id="btn-start">INSERT COIN</button>
        <div class="controls-hint">
            <span class="key">←</span> <span class="key">→</span> Движение <br>
            <span class="key">↑</span> <span class="key">↓</span> Глубина сцены <br>
            <span class="key">SPACE</span> Удар / Прыжок
        </div>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 id="end-title">GAME OVER</h1>
        <p id="end-msg" style="color:#ccc; margin-bottom:20px;">The party is over...</p>
        <button id="btn-restart">TRY AGAIN</button>
    </div>
</div>

<script>
/**
 * ENGINE: SEGA GENESIS STYLE BEAT 'EM UP
 * Особенности: Z-sorting (глубина), тени, большие спрайты, параллакс
 */

const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
// Нативное разрешение для пиксель-арта (растягивается CSS до 960x540)
const GW = 480; 
const GH = 270; 

// --- GRAPHICS ASSETS (Procedural Pixel Art) ---
// Рисуем сложные спрайты программно, чтобы не грузить картинки

const PALETTE = {
    white: '#FFFFFF', grey: '#BDBDBD', darkGrey: '#616161', black: '#111111',
    skin: '#FFCCBC', skinShadow: '#D89F90',
    red: '#D32F2F', gold: '#FFD700',
    enemyBlue: '#1A237E', enemySkin: '#8D6E63',
    bossPurple: '#4A148C'
};

// Функция рисования "Майкла Джексона" (Диджея Сна)
function drawHero(ctx, x, y, facingRight, state, frame) {
    ctx.save();
    // Отражение по горизонтали
    if (!facingRight) {
        ctx.translate(x, 0);
        ctx.scale(-1, 1);
        x = 0; // Локальные координаты после трансформации
    } else {
        ctx.translate(x - GW/2, 0); // Центрируем относительно камеры
    }
    
    // Y - это позиция ног на "полу". Рисуем вверх от Y.
    const groundY = y;
    
    // Анимация дыхания/ходьбы
    let bounce = 0;
    if (state === 'walk') bounce = Math.sin(frame * 0.5) * 2;
    if (state === 'idle') bounce = Math.sin(Date.now() * 0.005) * 1;

    // ТЕНЬ (Критично для 2.5D)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, groundY, 14, 5, 0, 0, Math.PI*2);
    ctx.fill();

    const bodyY = groundY - 55 + bounce; // Высота тела

    // --- НОГИ (Белые брюки) ---
    ctx.fillStyle = PALETTE.white;
    // Левая нога
    ctx.fillRect(-8, groundY - 25, 7, 25);
    // Правая нога (анимация шага)
    let legR offset = (state === 'walk') ? Math.sin(frame * 0.5) * 5 : 0;
    ctx.fillRect(1, groundY - 25 + legRoffset, 7, 25 - legRoffset);
    
    // Туфли (Черные)
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(-9, groundY - 4, 9, 4);
    ctx.fillRect(0, groundY - 4 + legRoffset, 9, 4);

    // --- ТОРС (Белый пиджак с красной рубашкой) ---
    ctx.fillStyle = PALETTE.white;
    ctx.fillRect(-12, bodyY, 24, 30); // Пиджак
    
    // Красная рубашка/галстук (V-образный вырез)
    ctx.fillStyle = PALETTE.red;
    ctx.beginPath();
    ctx.moveTo(-4, bodyY); ctx.lineTo(4, bodyY); ctx.lineTo(0, bodyY + 15);
    ctx.fill();

    // Пояс (Золотой)
    ctx.fillStyle = PALETTE.gold;
    ctx.fillRect(-12, bodyY + 28, 24, 3);

    // Руки
    ctx.fillStyle = PALETTE.white;
    if (state === 'attack') {
        // Удар рукой вперед
        ctx.fillRect(10, bodyY + 5, 15, 6); // Предплечье
        ctx.fillStyle = PALETTE.skin;
        ctx.fillRect(25, bodyY + 5, 6, 6); // Кулак
    } else {
        // Обычные руки
        ctx.fillRect(-16, bodyY + 2, 5, 20); // Левая
        ctx.fillRect(11, bodyY + 2, 5, 20);  // Правая
        // Кисти
        ctx.fillStyle = PALETTE.skin;
        ctx.fillRect(-16, bodyY + 22, 5, 5);
        ctx.fillRect(11, bodyY + 22, 5, 5);
    }

    // --- ГОЛОВА ---
    // Шея
    ctx.fillStyle = PALETTE.skinShadow;
    ctx.fillRect(-3, bodyY - 5, 6, 5);

    // Лицо
    ctx.fillStyle = PALETTE.skin;
    ctx.fillRect(-7, bodyY - 20, 14, 16);
    
    // Волосы (Черные, кудрявые силуэт)
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(-8, bodyY - 24, 16, 8); // Верх
    ctx.fillRect(-9, bodyY - 20, 3, 10); // Бакенбарды
    ctx.fillRect(6, bodyY - 20, 3, 10);

    // Наушники (Золотые/Черные) - Отсылка к первому запросу
    ctx.fillStyle = PALETTE.gold;
    ctx.fillRect(-10, bodyY - 18, 3, 10); // Левая чашка
    ctx.fillRect(7, bodyY - 18, 3, 10);  // Правая чашка
    ctx.fillStyle = PALETTE.black;
    ctx.fillRect(-10, bodyY - 22, 20, 3); // Оголовье

    ctx.restore();
}

// Враг: Алкаш/Панк в синем
function drawEnemy(ctx, x, y, facingRight, frame) {
    ctx.save();
    if (!facingRight) { ctx.translate(x, 0); ctx.scale(-1, 1); x = 0; }
    else { ctx.translate(x - GW/2, 0); }

    const groundY = y;
    const bounce = Math.sin(frame * 0.3) * 1;
    const bodyY = groundY - 50 + bounce;

    // Тень
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(0, groundY, 12, 4, 0, 0, Math.PI*2); ctx.fill();

    // Ноги (Синие джинсы)
    ctx.fillStyle = PALETTE.enemyBlue;
    ctx.fillRect(-7, groundY - 22, 6, 22);
    ctx.fillRect(1, groundY - 22, 6, 22);
    
    // Торс (Рваная майка)
    ctx.fillStyle = '#5C6BC0';
    ctx.fillRect(-10, bodyY, 20, 25);
    
    // Голова
    ctx.fillStyle = PALETTE.enemySkin;
    ctx.fillRect(-6, bodyY - 18, 12, 14);
    // Волосы (Ирокез или лохматые)
    ctx.fillStyle = '#2E7D32'; // Зеленые волосы
    ctx.fillRect(-7, bodyY - 22, 14, 6);
    ctx.fillRect(-5, bodyY - 26, 10, 4);

    ctx.restore();
}

// --- GAME LOGIC ---

let gameState = 'MENU';
let score = 0;
let cameraX = 0;
let frameCount = 0;

// Игрок
const player = {
    x: 100, y: 200, // X - горизонталь, Y - глубина (0 - дальний план, GH - ближний)
    hp: 100, maxHp: 100,
    speed: 2,
    facingRight: true,
    state: 'idle', // idle, walk, attack
    attackTimer: 0,
    invincible: 0
};

// Враги
let enemies = [];
class Enemy {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.hp = 30;
        this.state = 'chase';
        this.speed = 1.2;
        this.dead = false;
        this.flash = 0;
    }
    update() {
        if (this.dead) return;
        if (this.flash > 0) this.flash--;

        // AI: Идти к игроку
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist > 30) {
            this.x += (dx / dist) * this.speed;
            this.y += (dy / dist) * this.speed;
        } else {
            // Атака игрока
            if (player.invincible === 0 && Math.random() < 0.02) {
                player.hp -= 5;
                player.invincible = 30;
                updateUI();
                if (player.hp <= 0) endGame(false);
            }
        }

        // Коллизия с атакой игрока
        if (player.state === 'attack' && player.attackTimer > 10 && player.attackTimer < 15) {
            // Простая проверка хитбокса
            if (Math.abs(this.x - player.x) < 40 && Math.abs(this.y - player.y) < 20) {
                if (this.flash === 0) {
                    this.hp -= 10;
                    this.flash = 10;
                    this.x += (this.x > player.x) ? 10 : -10; // Отталкивание
                    score += 100;
                    updateUI();
                    if (this.hp <= 0) {
                        this.dead = true;
                        score += 500;
                    }
                }
            }
        }
    }
}

function initLevel() {
    player.x = 100; player.y = 200; player.hp = 100;
    enemies = [];
    // Создаем врагов на разной глубине
    for(let i=0; i<5; i++) {
        enemies.push(new Enemy(300 + i*150, 150 + Math.random()*80));
    }
    updateUI();
}

// Управление
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

document.getElementById('btn-start').onclick = () => {
    document.getElementById('start-screen').classList.add('hidden');
    gameState = 'PLAY';
    initLevel();
    loop();
};
document.getElementById('btn-restart').onclick = () => {
    document.getElementById('end-screen').classList.add('hidden');
    gameState = 'PLAY';
    initLevel();
    loop();
};

function updateUI() {
    document.getElementById('hp-bar').style.width = Math.max(0, player.hp) + '%';
    document.getElementById('score-val').innerText = score.toString().padStart(6, '0');
}

function endGame(win) {
    gameState = 'OVER';
    const s = document.getElementById('end-screen');
    s.classList.remove('hidden');
    document.getElementById('end-title').innerText = win ? "STAGE CLEAR!" : "GAME OVER";
    document.getElementById('end-title').style.color = win ? "#00e5ff" : "#ff0055";
}

// --- MAIN LOOP ---

function loop() {
    if (gameState !== 'PLAY') return;

    // 1. Логика игрока
    let moving = false;
    if (keys['ArrowLeft']) { player.x -= player.speed; player.facingRight = false; moving = true; }
    if (keys['ArrowRight']) { player.x += player.speed; player.facingRight = true; moving = true; }
    if (keys['ArrowUp']) { player.y -= player.speed * 0.7; moving = true; } // Медленнее по диагонали
    if (keys['ArrowDown']) { player.y += player.speed * 0.7; moving = true; }

    // Ограничения пола/стен
    if (player.y < 130) player.y = 130; // Горизонт
    if (player.y > GH - 10) player.y = GH - 10;
    if (player.x < cameraX) player.x = cameraX;
    if (player.x > cameraX + GW) player.x = cameraX + GW; // Не даем уйти за экран слишком далеко

    // Атака
    if (keys['Space'] && player.attackTimer === 0) {
        player.state = 'attack';
        player.attackTimer = 20;
    }
    if (player.attackTimer > 0) {
        player.attackTimer--;
        if (player.attackTimer === 0) player.state = moving ? 'walk' : 'idle';
    } else {
        player.state = moving ? 'walk' : 'idle';
    }
    if (player.invincible > 0) player.invincible--;

    // Камера (следит за игроком плавно)
    let targetCamX = player.x - GW / 2;
    if (targetCamX < 0) targetCamX = 0;
    cameraX += (targetCamX - cameraX) * 0.1;

    // Обновление врагов
    enemies.forEach(e => e.update());

    // 2. Рендеринг (Отрисовка)
    ctx.fillStyle = '#1a1a2e'; // Темно-синий фон клуба
    ctx.fillRect(0, 0, GW, GH);

    // Параллакс заднего плана (Кирпичная стена)
    ctx.fillStyle = '#111';
    for(let i=0; i<GW/40 + 2; i++) {
        let brickX = (i * 40 - cameraX * 0.5) % (GW + 40);
        if (brickX < -40) brickX += GW + 40;
        ctx.fillRect(brickX, 100, 38, 20);
        ctx.fillRect(brickX + 20, 122, 38, 20);
    }

    // Пол (Сцена)
    let grad = ctx.createLinearGradient(0, 130, 0, GH);
    grad.addColorStop(0, '#2a1b3d');
    grad.addColorStop(1, '#4a148c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 130, GW, GH - 130);

    // Сетка на полу (для ощущения перспективы)
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    for(let i=0; i<GW; i+=40) {
        let x = i - (cameraX % 40);
        ctx.moveTo(x, 130); ctx.lineTo(x - (x-GW/2)*0.8, GH);
    }
    ctx.stroke();

    // --- Z-SORTING (Сортировка по глубине Y) ---
    // Собираем все объекты в список
    let renderList = [];
    
    // Добавляем игрока
    renderList.push({
        type: 'player',
        y: player.y,
        draw: () => {
            if (player.invincible > 0 && Math.floor(Date.now()/50)%2===0) return;
            drawHero(ctx, player.x - cameraX + GW/2, player.y, player.facingRight, player.state, frameCount);
        }
    });

    // Добавляем врагов
    enemies.forEach(e => {
        if (!e.dead) {
            renderList.push({
                type: 'enemy',
                y: e.y,
                draw: () => {
                    if (e.flash > 0 && Math.floor(Date.now()/50)%2===0) ctx.globalAlpha = 0.5;
                    drawEnemy(ctx, e.x - cameraX + GW/2, e.y, e.x > player.x, frameCount);
                    ctx.globalAlpha = 1.0;
                }
            });
        }
    });

    // Сортируем: кто ниже (больше Y), тот рисуется последним (перекрывает других)
    renderList.sort((a, b) => a.y - b.y);

    // Рисуем всё
    renderList.forEach(obj => obj.draw());

    frameCount++;
    requestAnimationFrame(loop);
}

</script>
</body>
</html>
