<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DJ SON — CLUB BATTLE</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
    }

    body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        position: relative;
        overflow: hidden;
    }

    .noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
        opacity: 0.04;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 100;
    }

    .game-container {
        position: relative;
        z-index: 10;
        background: #000;
        padding: 15px;
        border: 2px solid #ff3366;
        box-shadow: 0 0 30px rgba(255,51,102,0.2);
    }

    canvas {
        display: block;
        margin: 0 auto;
        border: 1px solid #ff3366;
        cursor: none;
    }

    .info-panel {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 30px;
        font-size: 12px;
        letter-spacing: 2px;
        color: #ff6699;
    }

    .info-panel span {
        color: #ff3366;
    }

    #status {
        margin-top: 10px;
        font-size: 10px;
        opacity: 0.7;
        text-align: center;
        color: #ff6699;
    }

    #restart {
        margin-top: 12px;
        padding: 6px 20px;
        background: #000;
        border: 1px solid #ff3366;
        color: #ff3366;
        font-family: monospace;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
    }

    #restart:hover {
        background: #ff3366;
        color: #000;
    }

    .controls-hint {
        margin-top: 8px;
        font-size: 8px;
        text-align: center;
        opacity: 0.3;
    }
</style>
</head>
<body>

<div class="noise"></div>

<div class="game-container">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div class="info-panel">
        <div>❤️ <span id="hp">5</span></div>
        <div>🎵 <span id="score">0</span></div>
        <div>⚡ <span id="level">КЛУБ "ХАЙХЭТ"</span></div>
    </div>
    <div id="status">▶ ДОБРО ПОЖАЛОВАТЬ В КЛУБ. СОБИРАЙ ТРЕКИ, ДОБЕРИСЬ ДО БОССА</div>
    <button id="restart">RESTART</button>
    <div class="controls-hint">← → | ПРОБЕЛ — АТАКА | ↑ — ПРЫЖОК</div>
</div>

<script>
    (function() {
        // ============================================
        // НАСТРОЙКИ
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Размер мира (огромный уровень)
        const WORLD_WIDTH = 3500;
        const WORLD_HEIGHT = 550;
        let cameraX = 0;
        
        let gameRunning = true;
        let hp = 5;
        let score = 0;
        let invincibleFrames = 0;
        let bossDefeated = false;
        
        const hpSpan = document.getElementById('hp');
        const scoreSpan = document.getElementById('score');
        const levelSpan = document.getElementById('level');
        const statusDiv = document.getElementById('status');
        
        // ============================================
        // ИГРОК
        // ============================================
        let player = {
            x: 100,
            y: 0,
            width: 28,
            height: 36,
            vx: 0,
            vy: 0,
            onGround: true,
            facingRight: true,
            frame: 0,
            frameTimer: 0
        };
        
        const GRAVITY = 0.7;
        const JUMP_POWER = -10;
        const WALK_SPEED = 4.5;
        
        // Управление
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, Space: false };
        let canJump = true;
        let attackTimer = 0;
        let attackActive = false;
        const ATTACK_DURATION = 7;
        
        // ============================================
        // ПЛАТФОРМЫ И ДЕКОР
        // ============================================
        let platforms = [];
        let decorations = [];
        
        function initWorld() {
            // Пол
            platforms.push({ x: 0, y: 480, width: WORLD_WIDTH, height: 40 });
            
            // Барная стойка (слева)
            platforms.push({ x: 80, y: 430, width: 120, height: 50 });
            // Столики и стулья (декор)
            for (let i = 0; i < 12; i++) {
                const tableX = 300 + i * 220;
                if (tableX < WORLD_WIDTH - 500) {
                    platforms.push({ x: tableX, y: 450, width: 60, height: 30 });
                    decorations.push({ type: 'table', x: tableX, y: 440 });
                    decorations.push({ type: 'chair', x: tableX - 25, y: 455 });
                    decorations.push({ type: 'chair', x: tableX + 60, y: 455 });
                }
            }
            
            // Балконы
            platforms.push({ x: 600, y: 380, width: 100, height: 20 });
            platforms.push({ x: 900, y: 340, width: 100, height: 20 });
            platforms.push({ x: 1300, y: 300, width: 100, height: 20 });
            platforms.push({ x: 1800, y: 340, width: 100, height: 20 });
            platforms.push({ x: 2200, y: 380, width: 100, height: 20 });
            platforms.push({ x: 2700, y: 350, width: 100, height: 20 });
            
            // Сцена босса
            platforms.push({ x: WORLD_WIDTH - 450, y: 400, width: 400, height: 80 });
            platforms.push({ x: WORLD_WIDTH - 400, y: 350, width: 300, height: 50 });
        }
        
        // ============================================
        // ВРАГИ
        // ============================================
        let enemies = [];
        
        function initEnemies() {
            enemies = [];
            // Алкаши (медленные, много хп)
            enemies.push({ type: 'alkash', x: 350, y: 450, width: 24, height: 32, hp: 3, maxHp: 3, dir: 1, speed: 1.2, frame: 0 });
            enemies.push({ type: 'alkash', x: 1200, y: 450, width: 24, height: 32, hp: 3, maxHp: 3, dir: -1, speed: 1.2, frame: 0 });
            enemies.push({ type: 'alkash', x: 2300, y: 350, width: 24, height: 32, hp: 3, maxHp: 3, dir: 1, speed: 1.2, frame: 0 });
            
            // Тусовщики (быстрые, мало хп)
            enemies.push({ type: 'tusovshik', x: 550, y: 450, width: 22, height: 30, hp: 1, maxHp: 1, dir: -1, speed: 2.2, frame: 0 });
            enemies.push({ type: 'tusovshik', x: 1000, y: 310, width: 22, height: 30, hp: 1, maxHp: 1, dir: 1, speed: 2.2, frame: 0 });
            enemies.push({ type: 'tusovshik', x: 1500, y: 270, width: 22, height: 30, hp: 1, maxHp: 1, dir: -1, speed: 2.2, frame: 0 });
            enemies.push({ type: 'tusovshik', x: 2500, y: 320, width: 22, height: 30, hp: 1, maxHp: 1, dir: 1, speed: 2.2, frame: 0 });
            
            // Педовки (летающие)
            enemies.push({ type: 'pedovka', x: 750, y: 350, width: 20, height: 28, hp: 2, maxHp: 2, dir: 1, speed: 1.5, flyY: 0, flyDir: 1, frame: 0 });
            enemies.push({ type: 'pedovka', x: 1600, y: 300, width: 20, height: 28, hp: 2, maxHp: 2, dir: -1, speed: 1.5, flyY: 0, flyDir: 1, frame: 0 });
            enemies.push({ type: 'pedovka', x: 2800, y: 320, width: 20, height: 28, hp: 2, maxHp: 2, dir: 1, speed: 1.5, flyY: 0, flyDir: 1, frame: 0 });
        }
        
        // ============================================
        // ПРЕДМЕТЫ (ТРЕКИ)
        // ============================================
        let items = [];
        
        function initItems() {
            items = [];
            const itemPositions = [200, 450, 680, 950, 1150, 1380, 1650, 1920, 2150, 2420, 2680, 2950, 3200];
            for (let i = 0; i < itemPositions.length; i++) {
                items.push({
                    x: itemPositions[i],
                    y: 440,
                    width: 12,
                    height: 12,
                    collected: false
                });
            }
        }
        
        // ============================================
        // БОСС
        // ============================================
        let boss = null;
        let bossProjectiles = [];
        
        function initBoss() {
            boss = {
                x: WORLD_WIDTH - 350,
                y: 340,
                width: 70,
                height: 70,
                hp: 20,
                maxHp: 20,
                vx: 2,
                dir: -1,
                shootTimer: 0
            };
            bossProjectiles = [];
        }
        
        // ============================================
        // ФИЗИКА
        // ============================================
        function applyGravity() {
            player.vy += GRAVITY;
            player.y += player.vy;
            
            player.onGround = false;
            for (let p of platforms) {
                if (player.vy >= 0 && 
                    player.y + player.height <= p.y + 15 &&
                    player.y + player.height + player.vy >= p.y &&
                    player.x + player.width > p.x &&
                    player.x < p.x + p.width) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    canJump = true;
                }
            }
            
            if (player.y > WORLD_HEIGHT) {
                if (invincibleFrames <= 0) {
                    hp--;
                    updateUI();
                    invincibleFrames = 50;
                    if (hp <= 0) gameOver();
                    else playerRespawn();
                }
            }
            
            player.vx = 0;
            if (keys.ArrowLeft && player.x > 0) player.vx = -WALK_SPEED;
            if (keys.ArrowRight && player.x < WORLD_WIDTH - player.width) player.vx = WALK_SPEED;
            player.x += player.vx;
            
            if (player.vx !== 0) {
                player.facingRight = player.vx > 0;
                player.frameTimer++;
                if (player.frameTimer > 8) {
                    player.frame = (player.frame + 1) % 4;
                    player.frameTimer = 0;
                }
            } else {
                player.frame = 0;
            }
            
            // Камера
            let targetCamera = player.x - canvas.width / 2;
            targetCamera = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, targetCamera));
            cameraX = targetCamera;
        }
        
        function playerRespawn() {
            player.x = 100;
            player.y = 0;
            player.vy = 0;
            player.vx = 0;
        }
        
        function jump() {
            if (player.onGround && canJump && gameRunning) {
                player.vy = JUMP_POWER;
                player.onGround = false;
                canJump = false;
            }
        }
        
        function attack() {
            if (attackTimer > 0) return;
            attackActive = true;
            attackTimer = ATTACK_DURATION;
            
            const attackX = player.x + (player.facingRight ? player.width : -25);
            const attackW = 30;
            const attackY = player.y;
            const attackH = player.height;
            
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (attackX < e.x + e.width && attackX + attackW > e.x &&
                    attackY < e.y + e.height && attackY + attackH > e.y) {
                    e.hp--;
                    if (e.hp <= 0) {
                        enemies.splice(i,1);
                        score += 10;
                        updateUI();
                    }
                }
            }
            
            if (boss && !bossDefeated) {
                if (attackX < boss.x + boss.width && attackX + attackW > boss.x &&
                    attackY < boss.y + boss.height && attackY + attackH > boss.y) {
                    boss.hp--;
                    if (boss.hp <= 0) {
                        bossDefeated = true;
                        statusDiv.innerText = "✅ БОСС ПОБЕЖДЁН! КЛУБ СПАСЁН! ПЕРЕХОД...";
                        setTimeout(() => {
                            window.location.href = "final.html";
                        }, 2500);
                    }
                }
            }
        }
        
        // ============================================
        // ЛОГИКА ВРАГОВ
        // ============================================
        function updateEnemies() {
            for (let e of enemies) {
                if (e.type === 'pedovka') {
                    e.x += e.speed * e.dir;
                    e.flyY += e.flyDir * 2;
                    if (e.flyY > 15 || e.flyY < -15) e.flyDir *= -1;
                } else {
                    e.x += e.speed * e.dir;
                }
                if (e.x <= 0 || e.x + e.width >= WORLD_WIDTH) e.dir *= -1;
                
                e.frame = (e.frame + 0.1) % 4;
                
                if (player.x < e.x + e.width && player.x + player.width > e.x &&
                    player.y < e.y + e.height && player.y + player.height > e.y) {
                    if (invincibleFrames <= 0) {
                        hp--;
                        updateUI();
                        invincibleFrames = 50;
                        if (hp <= 0) gameOver();
                        else playerRespawn();
                    }
                }
            }
        }
        
        // ============================================
        // ПРЕДМЕТЫ
        // ============================================
        function updateItems() {
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.collected) continue;
                if (player.x < item.x + item.width && player.x + player.width > item.x &&
                    player.y < item.y + item.height && player.y + player.height > item.y) {
                    item.collected = true;
                    score += 5;
                    updateUI();
                }
            }
        }
        
        // ============================================
        // БОСС
        // ============================================
        function updateBoss() {
            if (!boss || bossDefeated) return;
            
            boss.x += boss.vx * boss.dir;
            if (boss.x <= WORLD_WIDTH - 550 || boss.x + boss.width >= WORLD_WIDTH - 150) {
                boss.dir *= -1;
            }
            
            boss.shootTimer++;
            if (boss.shootTimer > 40) {
                boss.shootTimer = 0;
                bossProjectiles.push({
                    x: boss.x + boss.width/2 - 10,
                    y: boss.y + boss.height,
                    width: 16,
                    height: 16,
                    vy: 4,
                    vx: (Math.random() - 0.5) * 3
                });
            }
            
            for (let i = 0; i < bossProjectiles.length; i++) {
                bossProjectiles[i].x += bossProjectiles[i].vx;
                bossProjectiles[i].y += bossProjectiles[i].vy;
                if (bossProjectiles[i].y > WORLD_HEIGHT || bossProjectiles[i].x < -50 || bossProjectiles[i].x > WORLD_WIDTH + 50) {
                    bossProjectiles.splice(i,1);
                    i--;
                    continue;
                }
                
                if (player.x < bossProjectiles[i].x + bossProjectiles[i].width &&
                    player.x + player.width > bossProjectiles[i].x &&
                    player.y < bossProjectiles[i].y + bossProjectiles[i].height &&
                    player.y + player.height > bossProjectiles[i].y) {
                    bossProjectiles.splice(i,1);
                    if (invincibleFrames <= 0) {
                        hp--;
                        updateUI();
                        invincibleFrames = 50;
                        if (hp <= 0) gameOver();
                        else playerRespawn();
                    }
                    i--;
                }
            }
        }
        
        // ============================================
        // UI
        // ============================================
        function updateUI() {
            hpSpan.innerText = hp;
            scoreSpan.innerText = score;
        }
        
        function gameOver() {
            gameRunning = false;
            statusDiv.innerText = "💀 ПОРАЖЕНИЕ 💀 НАЖМИТЕ RESTART";
        }
        
        // ============================================
        // ОТРИСОВКА
        // ============================================
        function drawBackground() {
            // Стены клуба
            ctx.fillStyle = "#1a0000";
            ctx.fillRect(0, 0, canvas.width, 480);
            
            // Дискошар
            ctx.beginPath();
            ctx.arc(cameraX + canvas.width - 100, 80, 30, 0, Math.PI*2);
            ctx.fillStyle = "#C0C0C0";
            ctx.fill();
            for (let i = 0; i < 20; i++) {
                ctx.fillStyle = i % 2 === 0 ? "#FFD700" : "#FF69B4";
                ctx.beginPath();
                ctx.arc(cameraX + canvas.width - 100 + (Math.random() - 0.5)*25, 80 + (Math.random() - 0.5)*25, 3, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Бар
            ctx.fillStyle = "#8B4513";
            ctx.fillRect(cameraX + 80, 420, 120, 60);
            ctx.fillStyle = "#D2691E";
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(cameraX + 90 + i*20, 430, 8, 40);
            }
            
            // Столики и стулья
            for (let d of decorations) {
                if (d.type === 'table') {
                    ctx.fillStyle = "#8B4513";
                    ctx.fillRect(d.x - cameraX, d.y, 50, 10);
                } else if (d.type === 'chair') {
                    ctx.fillStyle = "#654321";
                    ctx.fillRect(d.x - cameraX, d.y, 15, 20);
                }
            }
        }
        
        function drawPlayer() {
            let x = player.x - cameraX;
            let y = player.y;
            
            // Олимпийка
            ctx.fillStyle = "#CC0000";
            ctx.fillRect(x, y, player.width, player.height);
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(x + 6, y + 10, 6, 10);
            ctx.fillRect(x + 16, y + 10, 6, 10);
            // Голова
            ctx.fillStyle = "#FFDAB9";
            ctx.fillRect(x + 6, y + 2, 16, 18);
            // Наушники
            ctx.fillStyle = "#222";
            ctx.fillRect(x + 4, y - 2, 20, 8);
            ctx.fillStyle = "#555";
            ctx.fillRect(x + 8, y, 12, 4);
            // Глаза
            ctx.fillStyle = "#000";
            ctx.fillRect(x + 10, y + 8, 3, 4);
            ctx.fillRect(x + 18, y + 8, 3, 4);
            
            // Атака
            if (attackTimer > 0) {
                const attackX = x + (player.facingRight ? player.width : -25);
                ctx.fillStyle = "#FF6600";
                ctx.fillRect(attackX, y, 25, player.height);
            }
            
            // Ноги (ходьба)
            ctx.fillStyle = "#222";
            if (player.frame % 2 === 0) {
                ctx.fillRect(x + 5, y + player.height - 6, 8, 8);
                ctx.fillRect(x + 15, y + player.height - 10, 8, 12);
            } else {
                ctx.fillRect(x + 5, y + player.height - 10, 8, 12);
                ctx.fillRect(x + 15, y + player.height - 6, 8, 8);
            }
        }
        
        function drawEnemies() {
            for (let e of enemies) {
                let x = e.x - cameraX;
                let y = e.y;
                if (e.type === 'alkash') {
                    ctx.fillStyle = "#8860A0";
                    ctx.fillRect(x, y, e.width, e.height);
                    ctx.fillStyle = "#604080";
                    ctx.fillRect(x + 4, y + 5, e.width - 8, 8);
                    ctx.fillStyle = "#FFF";
                    ctx.fillRect(x + 5, y + 12, 5, 5);
                    ctx.fillRect(x + e.width - 10, y + 12, 5, 5);
                    ctx.fillStyle = "#000";
                    ctx.fillRect(x + 6, y + 13, 3, 3);
                    ctx.fillRect(x + e.width - 9, y + 13, 3, 3);
                } else if (e.type === 'tusovshik') {
                    ctx.fillStyle = "#FF69B4";
                    ctx.fillRect(x, y, e.width, e.height);
                    ctx.fillStyle = "#FF1493";
                    ctx.fillRect(x + 4, y + 5, e.width - 8, 8);
                    ctx.fillStyle = "#FFF";
                    ctx.fillRect(x + 4, y + 12, 5, 5);
                    ctx.fillRect(x + e.width - 9, y + 12, 5, 5);
                } else if (e.type === 'pedovka') {
                    ctx.fillStyle = "#FFD700";
                    ctx.fillRect(x, y + e.flyY, e.width, e.height);
                    ctx.fillStyle = "#FFA500";
                    ctx.fillRect(x + 4, y + 5 + e.flyY, e.width - 8, 8);
                    ctx.fillStyle = "#FFF";
                    ctx.fillRect(x + 4, y + 12 + e.flyY, 5, 5);
                    ctx.fillRect(x + e.width - 9, y + 12 + e.flyY, 5, 5);
                }
                // Полоска здоровья
                ctx.fillStyle = "#FF0000";
                ctx.fillRect(x, y - 6, e.width * (e.hp / e.maxHp), 3);
            }
        }
        
        function drawBoss() {
            if (!boss || bossDefeated) return;
            let x = boss.x - cameraX;
            let y = boss.y;
            ctx.fillStyle = "#8B0000";
            ctx.fillRect(x, y, boss.width, boss.height);
            ctx.fillStyle = "#FF4444";
            ctx.fillRect(x + 15, y + 10, 15, 15);
            ctx.fillRect(x + 40, y + 10, 15, 15);
            ctx.fillStyle = "#FF6666";
            ctx.fillRect(x + 25, y + 40, 20, 15);
            ctx.fillStyle = "#FF0000";
            ctx.fillRect(x, y - 8, boss.width * (boss.hp / boss.maxHp), 4);
            
            // Диджейский пульт
            ctx.fillStyle = "#333";
            ctx.fillRect(x + 10, y + boss.height - 15, boss.width - 20, 15);
            for (let i = 0; i < 5; i++) {
                ctx.fillStyle = i % 2 === 0 ? "#0F0" : "#F00";
                ctx.fillRect(x + 20 + i*8, y + boss.height - 10, 4, 8);
            }
            
            // Пластинки
            for (let p of bossProjectiles) {
                ctx.fillStyle = "#222";
                ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
                ctx.fillStyle = "#666";
                ctx.fillRect(p.x - cameraX + 4, p.y + 4, p.width - 8, p.height - 8);
            }
        }
        
        function drawItems() {
            for (let item of items) {
                if (item.collected) continue;
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(item.x - cameraX, item.y, item.width, item.height);
                ctx.fillStyle = "#FFA500";
                ctx.fillRect(item.x - cameraX + 3, item.y + 3, item.width - 6, item.height - 6);
            }
        }
        
        function drawPlatforms() {
            for (let p of platforms) {
                ctx.fillStyle = "#3a3a3a";
                ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
                ctx.fillStyle = "#5a5a5a";
                ctx.fillRect(p.x - cameraX, p.y, p.width, 4);
            }
        }
        
        function draw() {
            drawBackground();
            drawPlatforms();
            drawItems();
            drawEnemies();
            drawBoss();
            drawPlayer();
            
            if (invincibleFrames > 0) {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = "#FFF";
                ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
                ctx.globalAlpha = 1;
                invincibleFrames--;
            }
            
            if (attackTimer > 0) attackTimer--;
        }
        
        // ============================================
        // УПРАВЛЕНИЕ
        // ============================================
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.key === 'ArrowRight') keys.ArrowRight = true;
            if (e.key === 'ArrowUp') jump();
            if (e.key === ' ') { attack(); e.preventDefault(); }
            if (e.key === 'ArrowUp') e.preventDefault();
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.key === 'ArrowRight') keys.ArrowRight = false;
        });
        
        // ============================================
        // ИГРОВОЙ ЦИКЛ
        // ============================================
        function gameLoop() {
            if (gameRunning) {
                applyGravity();
                updateEnemies();
                updateItems();
                updateBoss();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ============================================
        // ПЕРЕЗАПУСК
        // ============================================
        document.getElementById('restart').addEventListener('click', () => {
            gameRunning = true;
            hp = 5;
            score = 0;
            invincibleFrames = 0;
            bossDefeated = false;
            updateUI();
            initWorld();
            initEnemies();
            initItems();
            initBoss();
            player.x = 100;
            player.y = 0;
            player.vy = 0;
            player.vx = 0;
            statusDiv.innerText = "▶ ДОБРО ПОЖАЛОВАТЬ В КЛУБ. СОБИРАЙ ТРЕКИ, ДОБЕРИСЬ ДО БОССА";
        });
        
        // ============================================
        // ЗАПУСК
        // ============================================
        initWorld();
        initEnemies();
        initItems();
        initBoss();
        gameLoop();
        
        console.log("🎧 DJ SON — CLUB BATTLE | Sega Mega Drive Style");
    })();
</script>

</body>
</html>
