<!DOCTYPE html>

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Почти черный фон страницы */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', 'Courier New', monospace; /* Фолбэк шрифт */
            color: white;
            user-select: none; /* Запрет выделения текста */
        }

        #game-wrapper {
            position: relative;
            width: 900px;
            height: 500px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
            border: 4px solid #222;
            background-color: #000;
            overflow: hidden; /* Важно: обрезаем всё, что выходит за рамки */
        }

        canvas {
            display: block;
            image-rendering: pixelated; /* Четкие пиксели */
            width: 100%;
            height: 100%;
        }

        /* Эффекты экрана */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 11;
        }

        /* Интерфейс */
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 20;
            text-shadow: 2px 2px 0 #000;
            font-size: 14px;
            pointer-events: none;
        }

        #status-bar {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffeb3b;
            font-size: 12px;
            z-index: 20;
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
        }

        /* Экраны меню */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            text-align: center;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 { 
            color: #ff0055; 
            text-shadow: 4px 4px 0 #fff; 
            margin-bottom: 20px; 
            font-size: 36px; 
            line-height: 1.2;
        }
        
        p { 
            line-height: 1.6; 
            color: #aaa; 
            font-size: 12px; 
            max-width: 600px; 
            margin: 0 auto 20px auto;
        }
        
        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-family: inherit;
            font-size: 16px;
            background: #ff0055;
            color: white;
            border: 4px solid white;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
        }
        button:hover { 
            transform: scale(1.05); 
            background: #ff3377; 
            box-shadow: 0 0 15px #ff0055;
        }
        button:active { transform: scale(0.95); }

    </style>
</head>

function drawPixelSprite(ctx, x, y, map, scale = 2, flip = false) {
    const rows = map.length;
    const cols = map[0].length;
    ctx.save();
    if (flip) {
        ctx.translate(x + cols * scale, y);
        ctx.scale(-1, 1);
        x = 0; y = 0;
    } else {
        ctx.translate(x, y);
    }
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const color = map[r][c];
            if (color !== C.T && color !== ' ') {
                ctx.fillStyle = color;
                ctx.fillRect(c * scale, r * scale, scale, scale);
            }
        }
    }
    ctx.restore();
}

// --- КЛАССЫ ---

class Entity {
    constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.vx = 0; this.vy = 0;
        this.grounded = false;
        this.facingRight = true;
        this.dead = false;
        this.hp = 1; this.maxHp = 1;
        this.flashTime = 0;
    }
    update() {
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        // Пол
        if (this.y + this.h > GAME_HEIGHT - 50) {
            this.y = GAME_HEIGHT - 50 - this.h;
            this.vy = 0;
            this.grounded = true;
        } else {
            this.grounded = false;
        }
        // Границы
        if (this.x < 0) this.x = 0;
        if (this.x > WORLD_WIDTH - this.w) this.x = WORLD_WIDTH - this.w;
        if (this.flashTime > 0) this.flashTime--;
    }
    takeDamage(amount) {
        this.hp -= amount;
        this.flashTime = 10;
        if (this.hp <= 0) this.dead = true;
    }
}

class Player extends Entity {
    constructor() {
        super(100, 300, 32, 40);
        this.hp = 5; this.maxHp = 5;
        this.attackCooldown = 0;
        this.isAttacking = false;
        this.invincibleTime = 0;
    }
    update() {
        if (keys.ArrowRight) { this.vx = SPEED; this.facingRight = true; }
        else if (keys.ArrowLeft) { this.vx = -SPEED; this.facingRight = false; }
        else { this.vx *= FRICTION; }

        if (keys.ArrowUp && this.grounded) {
            this.vy = JUMP_FORCE;
            this.grounded = false;
        }

        if (keys.Space && this.attackCooldown === 0) {
            this.isAttacking = true;
            this.attackCooldown = 20;
            checkPlayerAttack(this);
        }

        if (this.attackCooldown > 0) {
            this.attackCooldown--;
            if (this.attackCooldown < 10) this.isAttacking = false;
        }
        if (this.invincibleTime > 0) this.invincibleTime--;
        super.update();
    }
    draw(ctx, camX) {
        if (this.invincibleTime > 0 && Math.floor(frameCount / 4) % 2 === 0) return;
        let sprite = this.isAttacking ? SPRITE_DJ_ATTACK : SPRITE_DJ_IDLE;
        drawPixelSprite(ctx, this.x - camX, this.y, sprite, 2, !this.facingRight);
    }
}

class Enemy extends Entity {
    constructor(x, y, type) {
        super(x, y, 30, 30);
        this.type = type;
        this.patrolStart = x;
        this.patrolDist = 150;
        this.dir = 1;
        if (type === 'alkash') { this.hp = 3; this.speed = 1; this.scoreValue = 10; }
        else if (type === 'tusovshik') { this.hp = 1; this.speed = 3; this.scoreValue = 20; }
        else if (type === 'pedovka') { this.hp = 2; this.speed = 2; this.yBase = y; this.angle = 0; }
    }
    update() {
        if (this.dead) return;
        if (this.type === 'pedovka') {
            this.angle += 0.05;
            this.x += Math.sin(this.angle) * 2;
            this.y = this.yBase + Math.cos(this.angle * 2) * 30;
        } else {
            this.x += this.speed * this.dir;
            if (Math.abs(this.x - this.patrolStart) > this.patrolDist) {
                this.dir *= -1;
                this.facingRight = this.dir > 0;
            }
        }

        if (!player.dead && checkCollision(this, player)) {
            if (player.invincibleTime === 0) {
                player.takeDamage(1);
                player.invincibleTime = 60;
                player.vy = -5;
                player.vx = (player.x < this.x) ? -5 : 5;
                updateUI();
                if (player.hp <= 0) gameOver();
            }
        }
        super.update();
    }
    draw(ctx, camX) {
        if (this.dead) return;
        if (this.flashTime > 0 && Math.floor(frameCount / 2) % 2 === 0) return;
        
        if (this.type === 'pedovka') {
             ctx.fillStyle = '#9C27B0';
             ctx.fillRect(this.x - camX, this.y, this.w, this.h);
             ctx.fillStyle = '#FFF';
             ctx.fillRect(this.x - camX + 5, this.y + 5, 5, 5);
             ctx.fillRect(this.x - camX + 20, this.y + 5, 5, 5);
        } else {
            let sprite = this.type === 'alkash' ? SPRITE_ALKASH : SPRITE_TUSOVSHIK;
            drawPixelSprite(ctx, this.x - camX, this.y, sprite, 2, !this.facingRight);
        }
    }
}

class Boss extends Entity {
    constructor() {
        super(WORLD_WIDTH - 200, GAME_HEIGHT - 150, 60, 80);
        this.hp = 20; this.maxHp = 20;
        this.state = 'IDLE'; this.timer = 0; this.dir = -1;
        this.projectiles = [];
    }
    update() {
        if (this.dead) return;
        this.timer++;
        if (this.state === 'IDLE') {
            if (this.timer > 60) {
                this.state = Math.random() > 0.5 ? 'MOVE_LEFT' : 'MOVE_RIGHT';
                this.timer = 0;
            }
        } else if (this.state.startsWith('MOVE')) {
            this.x += this.dir * 2;
            if (this.x < WORLD_WIDTH - 400 || this.x > WORLD_WIDTH - 100) {
                this.dir *= -1;
                this.state = 'THROW';
                this.timer = 0;
            }
        } else if (this.state === 'THROW') {
            if (this.timer % 40 === 0) this.throwVinyl();
            if (this.timer > 120) { this.state = 'IDLE'; this.timer = 0; }
        }

        for (let i = this.projectiles.length - 1; i >= 0; i--) {
            let p = this.projectiles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.2;
            if (checkCollision({x: p.x, y: p.y, w: 20, h: 20}, player)) {
                if (player.invincibleTime === 0) {
                    player.takeDamage(1);
                    player.invincibleTime = 60;
                    updateUI();
                    if (player.hp <= 0) gameOver();
                }
                this.projectiles.splice(i, 1);
            } else if (p.y > GAME_HEIGHT) {
                this.projectiles.splice(i, 1);
            }
        }

        if (!player.dead && checkCollision(this, player)) {
             if (player.invincibleTime === 0) {
                player.takeDamage(1);
                player.invincibleTime = 60;
                updateUI();
                if (player.hp <= 0) gameOver();
            }
        }
    }
    throwVinyl() {
        this.projectiles.push({ x: this.x + (this.dir > 0 ? this.w : -20), y: this.y + 20, vx: this.dir * 6, vy: -4 });
    }
    draw(ctx, camX) {
        if (this.dead) return;
        if (this.flashTime > 0 && Math.floor(frameCount / 2) % 2 === 0) return;
        drawPixelSprite(ctx, this.x - camX, this.y, SPRITE_BOSS, 3, this.dir < 0);
        
        ctx.fillStyle = 'red';
        ctx.fillRect(this.x - camX, this.y - 20, 60, 5);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(this.x - camX, this.y - 20, 60 * (this.hp / this.maxHp), 5);

        ctx.fillStyle = '#111';
        for (let p of this.projectiles) {
            ctx.beginPath(); ctx.arc(p.x - camX + 10, p.y + 10, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(p.x - camX + 10, p.y + 10, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#111';
        }
    }
}

class Item extends Entity {
    constructor(x, y) {
        super(x, y, 20, 20);
        this.collected = false;
        this.floatOffset = 0;
    }
    update() {
        if (this.collected) return;
        this.floatOffset += 0.1;
        this.y += Math.sin(this.floatOffset) * 0.5;
        if (checkCollision(this, player)) {
            this.collected = true;
            score += 5;
            updateUI();
        }
    }
    draw(ctx, camX) {
        if (this.collected) return;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(this.x - camX + 10, this.y + 10, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(this.x - camX + 7, this.y + 7, 3, 0, Math.PI*2); ctx.fill();
    }
}

// --- ЛОГИКА ИГРЫ ---

let player, enemies, items, boss, particles;

function checkCollision(r1, r2) {
    return (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y);
}

function checkPlayerAttack(p) {
    let ab = { x: p.facingRight ? p.x + p.w : p.x - 30, y: p.y, w: 30, h: p.h };
    for (let e of enemies) {
        if (!e.dead && checkCollision(ab, e)) {
            e.takeDamage(1);
            createParticles(e.x + e.w/2, e.y + e.h/2, '#fff');
            if (e.dead) score += e.scoreValue;
            updateUI();
        }
    }
    if (boss && !boss.dead && checkCollision(ab, boss)) {
        boss.takeDamage(1);
        createParticles(boss.x + boss.w/2, boss.y + boss.h/2, '#f00');
        updateUI();
        if (boss.dead) winGame();
    }
}

function createParticles(x, y, color) {
    for(let i=0; i<5; i++) particles.push({ x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 20, color });
}

function initLevel() {
    console.log("Initializing Level...");
    player = new Player();
    enemies = []; items = []; particles = []; boss = null; score = 0; cameraX = 0;
    
    for (let i = 0; i < 15; i++) {
        let x = 400 + i * 200;
        let type = Math.random() > 0.6 ? 'tusovshik' : (Math.random() > 0.5 ? 'alkash' : 'pedovka');
        let y = type === 'pedovka' ? 200 : GAME_HEIGHT - 80;
        enemies.push(new Enemy(x, y, type));
    }
    for (let i = 0; i < 10; i++) items.push(new Item(300 + i * 300, 250 + Math.random() * 100));
    boss = new Boss();
    updateUI();
}

function gameLoop() {
    if (gameState !== 'PLAYING' && gameState !== 'BOSS_FIGHT') return;

    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    // Фон
    let grad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
    grad.addColorStop(0, '#1a0b2e'); grad.addColorStop(1, '#4a148c');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    // Камера
    cameraX = player.x - GAME_WIDTH / 3;
    if (cameraX < 0) cameraX = 0;
    if (cameraX > WORLD_WIDTH - GAME_WIDTH) cameraX = WORLD_WIDTH - GAME_WIDTH;

    // Босс-триггер
    if (player.x > WORLD_WIDTH - 600 && !boss.dead) {
        gameState = 'BOSS_FIGHT';
        document.getElementById('level-name').innerText = "БОСС: МЕРЗКИЙ ДИДЖЕЙ";
        document.getElementById('level-name').style.color = "red";
    }

    items.forEach(i => { i.update(); i.draw(ctx, cameraX); });
    enemies.forEach(e => { e.update(); e.draw(ctx, cameraX); });
    if (boss) { boss.update(); boss.draw(ctx, cameraX); }
    player.update(); player.draw(ctx, cameraX);

    // Частицы
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle = p.color; ctx.fillRect(p.x - cameraX, p.y, 4, 4);
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Пол
    ctx.fillStyle = '#222'; ctx.fillRect(0, GAME_HEIGHT - 50, GAME_WIDTH, 50);
    ctx.strokeStyle = '#444'; ctx.beginPath();
    for(let i=0; i<GAME_WIDTH; i+=50) { ctx.moveTo(i, GAME_HEIGHT-50); ctx.lineTo(i-20, GAME_HEIGHT); }
    ctx.stroke();

    frameCount++;
    animationId = requestAnimationFrame(gameLoop);
}

function updateUI() {
    let hearts = ''; for(let i=0; i<player.hp; i++) hearts += '❤️';
    document.getElementById('health-display').innerText = hearts;
    document.getElementById('score-display').innerText = `🎵 ТРЕКИ: ${score}`;
}

function startGame() {
    console.log("Game Started!");
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('end-screen').classList.add('hidden');
    gameState = 'PLAYING';
    document.getElementById('level-name').innerText = 'КЛУБ "ХАЙХЭТ"';
    document.getElementById('level-name').style.color = "white";
    initLevel();
    if (animationId) cancelAnimationFrame(animationId);
    gameLoop();
}

function gameOver() {
    gameState = 'GAME_OVER';
    document.getElementById('end-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = "GAME OVER";
    document.getElementById('end-msg').innerText = "Рейв провален... Попробуй еще раз!";
}

function winGame() {
    gameState = 'WIN';
    setTimeout(() => {
        alert("ПОБЕДА! Ты спас рейв!");
        // window.location.href = 'final.html'; // Раскомментируйте для перехода
        resetGame();
    }, 1000);
}

function resetGame() { startGame(); }

// Обработчики
window.addEventListener('keydown', e => {
    if (e.code === 'ArrowRight') keys.ArrowRight = true;
    if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
    if (e.code === 'ArrowUp') keys.ArrowUp = true;
    if (e.code === 'Space') keys.Space = true;
});
window.addEventListener('keyup', e => {
    if (e.code === 'ArrowRight') keys.ArrowRight = false;
    if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
    if (e.code === 'ArrowUp') keys.ArrowUp = false;
    if (e.code === 'Space') keys.Space = false;
});

// Привязка кнопок
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', resetGame);

console.log("Event listeners attached.");
</script>
