<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DJ SON — RAVE RESCUE</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
    }

    body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        position: relative;
        overflow: hidden;
    }

    /* Шум */
    .noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
        opacity: 0.05;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 100;
    }

    .game-container {
        position: relative;
        z-index: 10;
        background: #000;
        padding: 20px;
        border: 2px solid #ff3366;
        box-shadow: 0 0 30px rgba(255,51,102,0.2);
    }

    canvas {
        display: block;
        margin: 0 auto;
        border: 1px solid #ff3366;
        cursor: none;
    }

    .info-panel {
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 40px;
        font-size: 12px;
        letter-spacing: 2px;
        color: #ff6699;
    }

    .info-panel span {
        color: #ff3366;
    }

    #status {
        margin-top: 12px;
        font-size: 10px;
        opacity: 0.7;
        text-align: center;
        color: #ff6699;
    }

    #restart {
        margin-top: 15px;
        padding: 8px 25px;
        background: #000;
        border: 1px solid #ff3366;
        color: #ff3366;
        font-family: monospace;
        cursor: pointer;
        transition: 0.2s;
        width: 100%;
    }

    #restart:hover {
        background: #ff3366;
        color: #000;
    }

    .controls-hint {
        margin-top: 10px;
        font-size: 8px;
        text-align: center;
        opacity: 0.3;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="noise"></div>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div class="info-panel">
        <div>❤️ <span id="hp">3</span></div>
        <div>🎵 <span id="score">0</span></div>
        <div>⚡ <span id="level">УРОВЕНЬ 1</span></div>
    </div>
    <div id="status">▶ ПРОЙДИ УРОВЕНЬ, СОБИРАЙ ТРЕКИ, ПОБЕДИ БОССА</div>
    <button id="restart">RESTART</button>
    <div class="controls-hint">← → | ПРОБЕЛ — АТАКА | ↑ — ПРЫЖОК</div>
</div>

<script>
    (function() {
        // ============================================
        // НАСТРОЙКИ
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = true;
        let currentLevel = 1;
        let hp = 3;
        let score = 0;
        let invincibleFrames = 0;
        
        // Элементы UI
        const hpSpan = document.getElementById('hp');
        const scoreSpan = document.getElementById('score');
        const levelSpan = document.getElementById('level');
        const statusDiv = document.getElementById('status');
        
        // ============================================
        // ИГРОК (платформер)
        // ============================================
        let player = {
            x: 50,
            y: 0,
            width: 24,
            height: 28,
            vx: 0,
            vy: 0,
            onGround: false,
            facingRight: true
        };
        
        const GRAVITY = 0.8;
        const JUMP_POWER = -11;
        const WALK_SPEED = 3.5;
        
        // Управление
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            Space: false
        };
        
        let canJump = true;
        let attackTimer = 0;
        let attackActive = false;
        const ATTACK_DURATION = 8;
        
        // ГРУНТ (платформы)
        let platforms = [];
        
        // ============================================
        // УРОВЕНЬ 1 — КЛУБ
        // ============================================
        let level1Enemies = [];
        let level1Items = [];
        let level1Boss = null;
        let bossAttackTimer = 0;
        let bossProjectiles = [];
        
        // Враги
        const ENEMY_TYPES = {
            ALKASH: { name: 'Алкаш', color1: '#8860A0', color2: '#604080', speed: 1.2, hp: 2, damage: 1, width: 20, height: 26 },
            TUSOVSHIK: { name: 'Тусовщик', color1: '#FF69B4', color2: '#FF1493', speed: 1.8, hp: 1, damage: 1, width: 18, height: 24 },
            PEDOVKA: { name: 'Педовка', color1: '#FFD700', color2: '#FFA500', speed: 1.0, hp: 1, damage: 1, width: 18, height: 24 }
        };
        
        // ============================================
        // ИНИЦИАЛИЗАЦИЯ УРОВНЕЙ
        // ============================================
        function initLevel1() {
            currentLevel = 1;
            levelSpan.innerText = "УРОВЕНЬ 1: КЛУБ";
            
            // Платформы
            platforms = [
                { x: 0, y: 420, width: 800, height: 30 },           // земля
                { x: 100, y: 360, width: 80, height: 20 },
                { x: 250, y: 310, width: 70, height: 20 },
                { x: 400, y: 260, width: 70, height: 20 },
                { x: 550, y: 320, width: 80, height: 20 },
                { x: 680, y: 370, width: 70, height: 20 }
            ];
            
            // Враги
            level1Enemies = [];
            // Алкаш
            level1Enemies.push({
                ...ENEMY_TYPES.ALKASH,
                x: 150, y: 394, hp: 2, direction: 1, type: 'ALKASH'
            });
            // Тусовщик
            level1Enemies.push({
                ...ENEMY_TYPES.TUSOVSHIK,
                x: 300, y: 284, hp: 1, direction: -1, type: 'TUSOVSHIK'
            });
            // Педовка
            level1Enemies.push({
                ...ENEMY_TYPES.PEDOVKA,
                x: 500, y: 294, hp: 1, direction: 1, type: 'PEDOVKA'
            });
            // Алкаш
            level1Enemies.push({
                ...ENEMY_TYPES.ALKASH,
                x: 620, y: 354, hp: 2, direction: -1, type: 'ALKASH'
            });
            
            // Предметы (треки)
            level1Items = [
                { x: 130, y: 335, width: 10, height: 10, collected: false },
                { x: 280, y: 285, width: 10, height: 10, collected: false },
                { x: 430, y: 235, width: 10, height: 10, collected: false },
                { x: 580, y: 295, width: 10, height: 10, collected: false },
                { x: 710, y: 345, width: 10, height: 10, collected: false },
                { x: 200, y: 395, width: 10, height: 10, collected: false }
            ];
            
            // Босс
            level1Boss = null;
            bossAttackTimer = 0;
            bossProjectiles = [];
            
            // Игрок
            player.x = 50;
            player.y = 0;
            player.vx = 0;
            player.vy = 0;
            player.onGround = true;
            hp = 3;
            score = 0;
            invincibleFrames = 0;
            updateUI();
            applyGravity();
        }
        
        function spawnBoss() {
            level1Boss = {
                x: 700,
                y: 350,
                width: 60,
                height: 60,
                hp: 12,
                maxHp: 12,
                direction: -1,
                vx: 1.5,
                shootCooldown: 0
            };
            statusDiv.innerText = "⚠️ МЕРЗКИЙ ДИДЖЕЙ ПОЯВИЛСЯ! АТАКУЙ ПРОБЕЛОМ! ⚠️";
        }
        
        // ============================================
        // ФИЗИКА
        // ============================================
        function applyGravity() {
            if (!gameRunning) return;
            player.vy += GRAVITY;
            player.y += player.vy;
            
            // Проверка платформ
            player.onGround = false;
            for (let p of platforms) {
                if (player.vy >= 0 && 
                    player.y + player.height <= p.y + 10 &&
                    player.y + player.height + player.vy >= p.y &&
                    player.x + player.width > p.x &&
                    player.x < p.x + p.width) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    canJump = true;
                }
            }
            
            // Падение в бездну
            if (player.y > canvas.height) {
                if (invincibleFrames <= 0) {
                    hp--;
                    updateUI();
                    invincibleFrames = 40;
                    if (hp <= 0) gameOver();
                    else resetPlayerPosition();
                }
            }
            
            // Движение по горизонтали
            player.vx = 0;
            if (keys.ArrowLeft) player.vx = -WALK_SPEED;
            if (keys.ArrowRight) player.vx = WALK_SPEED;
            player.x += player.vx;
            
            // Границы
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        }
        
        function resetPlayerPosition() {
            player.x = 50;
            player.y = 0;
            player.vy = 0;
            applyGravity();
        }
        
        function jump() {
            if (player.onGround && canJump && gameRunning) {
                player.vy = JUMP_POWER;
                player.onGround = false;
                canJump = false;
            }
        }
        
        // ============================================
        // АТАКА
        // ============================================
        function attack() {
            if (attackTimer > 0) return;
            attackActive = true;
            attackTimer = ATTACK_DURATION;
            
            // Атака по врагам
            const attackX = player.x + (player.facingRight ? player.width : -20);
            const attackW = 25;
            
            for (let i = 0; i < level1Enemies.length; i++) {
                const e = level1Enemies[i];
                if (attackX < e.x + e.width && attackX + attackW > e.x &&
                    player.y < e.y + e.height && player.y + player.height > e.y) {
                    e.hp--;
                    if (e.hp <= 0) {
                        level1Enemies.splice(i,1);
                        i--;
                        score += 10;
                        updateUI();
                    }
                }
            }
            
            // Атака по боссу
            if (level1Boss) {
                if (attackX < level1Boss.x + level1Boss.width && attackX + attackW > level1Boss.x &&
                    player.y < level1Boss.y + level1Boss.height && player.y + player.height > level1Boss.y) {
                    level1Boss.hp--;
                    if (level1Boss.hp <= 0) {
                        level1Boss = null;
                        statusDiv.innerText = "✅ БОСС ПОБЕЖДЁН! УРОВЕНЬ ПРОЙДЕН!";
                        setTimeout(() => {
                            window.location.href = "final.html";
                        }, 2500);
                    }
                }
            }
        }
        
        // ============================================
        // ЛОГИКА ВРАГОВ
        // ============================================
        function updateEnemies() {
            for (let e of level1Enemies) {
                e.x += e.speed * e.direction;
                if (e.x <= 0 || e.x + e.width >= canvas.width) {
                    e.direction *= -1;
                }
                
                // Столкновение с игроком
                if (player.x < e.x + e.width && player.x + player.width > e.x &&
                    player.y < e.y + e.height && player.y + player.height > e.y) {
                    if (invincibleFrames <= 0) {
                        hp--;
                        updateUI();
                        invincibleFrames = 40;
                        if (hp <= 0) gameOver();
                        else resetPlayerPosition();
                    }
                }
            }
        }
        
        // ============================================
        // ПРЕДМЕТЫ
        // ============================================
        function updateItems() {
            for (let i = 0; i < level1Items.length; i++) {
                const item = level1Items[i];
                if (item.collected) continue;
                if (player.x < item.x + item.width && player.x + player.width > item.x &&
                    player.y < item.y + item.height && player.y + player.height > item.y) {
                    item.collected = true;
                    score += 5;
                    updateUI();
                }
            }
            
            // Спавн босса после сбора 3 предметов
            const collectedCount = level1Items.filter(i => i.collected).length;
            if (collectedCount >= 3 && !level1Boss && gameRunning) {
                spawnBoss();
            }
        }
        
        // ============================================
        // БОСС
        // ============================================
        function updateBoss() {
            if (!level1Boss) return;
            
            // Движение
            level1Boss.x += level1Boss.vx * level1Boss.direction;
            if (level1Boss.x <= 50 || level1Boss.x + level1Boss.width >= canvas.width - 50) {
                level1Boss.direction *= -1;
            }
            
            // Стрельба
            if (level1Boss.shootCooldown <= 0) {
                bossProjectiles.push({
                    x: level1Boss.x + level1Boss.width/2 - 8,
                    y: level1Boss.y + level1Boss.height,
                    width: 12,
                    height: 12,
                    vy: 5
                });
                level1Boss.shootCooldown = 45;
            } else {
                level1Boss.shootCooldown--;
            }
            
            // Движение снарядов
            for (let i = 0; i < bossProjectiles.length; i++) {
                bossProjectiles[i].y += bossProjectiles[i].vy;
                if (bossProjectiles[i].y > canvas.height) {
                    bossProjectiles.splice(i,1);
                    i--;
                    continue;
                }
                
                // Столкновение с игроком
                if (player.x < bossProjectiles[i].x + bossProjectiles[i].width &&
                    player.x + player.width > bossProjectiles[i].x &&
                    player.y < bossProjectiles[i].y + bossProjectiles[i].height &&
                    player.y + player.height > bossProjectiles[i].y) {
                    bossProjectiles.splice(i,1);
                    if (invincibleFrames <= 0) {
                        hp--;
                        updateUI();
                        invincibleFrames = 40;
                        if (hp <= 0) gameOver();
                        else resetPlayerPosition();
                    }
                    i--;
                }
            }
        }
        
        // ============================================
        // UI
        // ============================================
        function updateUI() {
            hpSpan.innerText = hp;
            scoreSpan.innerText = score;
        }
        
        function gameOver() {
            gameRunning = false;
            statusDiv.innerText = "💀 ПОРАЖЕНИЕ 💀 НАЖМИТЕ RESTART";
            statusDiv.style.color = "#ff3366";
        }
        
        // ============================================
        // ОТРИСОВКА
        // ============================================
        function drawPlayer() {
            // Диджей Сон
            ctx.fillStyle = "#CC0000";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Олимпийка белые полосы
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(player.x + 6, player.y + 8, 5, 8);
            ctx.fillRect(player.x + 13, player.y + 8, 5, 8);
            // Лицо
            ctx.fillStyle = "#FFDAB9";
            ctx.fillRect(player.x + 4, player.y + 4, 6, 6);
            ctx.fillRect(player.x + 14, player.y + 4, 6, 6);
            // Наушники
            ctx.fillStyle = "#222";
            ctx.fillRect(player.x + 2, player.y - 3, 20, 6);
            ctx.fillStyle = "#555";
            ctx.fillRect(player.x + 4, player.y - 1, 16, 3);
            
            // Атака
            if (attackTimer > 0) {
                const attackX = player.x + (player.facingRight ? player.width : -20);
                ctx.fillStyle = "#FF6600";
                ctx.fillRect(attackX, player.y, 20, player.height);
            }
        }
        
        function drawEnemies() {
            for (let e of level1Enemies) {
                ctx.fillStyle = e.color1;
                ctx.fillRect(e.x, e.y, e.width, e.height);
                ctx.fillStyle = e.color2;
                ctx.fillRect(e.x + 3, e.y + 5, e.width - 6, 8);
                // Глаза
                ctx.fillStyle = "#FFF";
                ctx.fillRect(e.x + 4, e.y + 12, 5, 5);
                ctx.fillRect(e.x + e.width - 9, e.y + 12, 5, 5);
                ctx.fillStyle = "#000";
                ctx.fillRect(e.x + 5, e.y + 13, 3, 3);
                ctx.fillRect(e.x + e.width - 8, e.y + 13, 3, 3);
            }
        }
        
        function drawBoss() {
            if (!level1Boss) return;
            ctx.fillStyle = "#8B0000";
            ctx.fillRect(level1Boss.x, level1Boss.y, level1Boss.width, level1Boss.height);
            ctx.fillStyle = "#FF4444";
            ctx.fillRect(level1Boss.x + 10, level1Boss.y + 10, 15, 12);
            ctx.fillRect(level1Boss.x + 35, level1Boss.y + 10, 15, 12);
            ctx.fillStyle = "#FF6666";
            ctx.fillRect(level1Boss.x + 20, level1Boss.y + 35, 20, 15);
            // Полоска здоровья
            ctx.fillStyle = "#FF0000";
            ctx.fillRect(level1Boss.x, level1Boss.y - 8, level1Boss.width * (level1Boss.hp / level1Boss.maxHp), 4);
            
            // Пластинки
            for (let p of bossProjectiles) {
                ctx.fillStyle = "#333";
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#888";
                ctx.fillRect(p.x + 3, p.y + 3, p.width - 6, p.height - 6);
            }
        }
        
        function drawItems() {
            for (let item of level1Items) {
                if (item.collected) continue;
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(item.x, item.y, item.width, item.height);
                ctx.fillStyle = "#FFA500";
                ctx.fillRect(item.x + 2, item.y + 2, item.width - 4, item.height - 4);
            }
        }
        
        function drawPlatforms() {
            ctx.fillStyle = "#2a2a2a";
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#3a3a3a";
                ctx.fillRect(p.x, p.y, p.width, 3);
                ctx.fillStyle = "#2a2a2a";
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Фон (клуб)
            if (currentLevel === 1) {
                ctx.fillStyle = "#1a0000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Сетка
                ctx.strokeStyle = "#330000";
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
            }
            
            drawPlatforms();
            drawItems();
            drawEnemies();
            drawBoss();
            drawPlayer();
            
            // Индикатор неуязвимости
            if (invincibleFrames > 0) {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = "#FFF";
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.globalAlpha = 1;
                invincibleFrames--;
            }
            
            if (attackTimer > 0) attackTimer--;
        }
        
        // ============================================
        // УПРАВЛЕНИЕ
        // ============================================
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.key === 'ArrowRight') keys.ArrowRight = true;
            if (e.key === 'ArrowUp') jump();
            if (e.key === ' ') {
                attack();
                e.preventDefault();
            }
            if (e.key === ' ' || e.key === 'ArrowUp') e.preventDefault();
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.key === 'ArrowRight') keys.ArrowRight = false;
        });
        
        // ============================================
        // ИГРОВОЙ ЦИКЛ
        // ============================================
        function gameLoop() {
            if (gameRunning) {
                applyGravity();
                updateEnemies();
                updateItems();
                updateBoss();
                
                // Обновление направления взгляда игрока
                if (keys.ArrowRight) player.facingRight = true;
                if (keys.ArrowLeft) player.facingRight = false;
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ============================================
        // ПЕРЕЗАПУСК
        // ============================================
        document.getElementById('restart').addEventListener('click', () => {
            initLevel1();
            gameRunning = true;
            statusDiv.innerText = "▶ ПРОЙДИ УРОВЕНЬ, СОБИРАЙ ТРЕКИ, ПОБЕДИ БОССА";
            statusDiv.style.color = "#ff6699";
        });
        
        // ============================================
        // ЗАПУСК
        // ============================================
        initLevel1();
        gameLoop();
        
        console.log("🎮 DJ SON — RAVE RESCUE | Famicom Style");
    })();
</script>

</body>
</html>
