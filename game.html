<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sega Style 16-Bit Racing</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050515;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        canvas {
            border: 4px solid #3a3a50;
            background: #000;
            image-rendering: pixelated; /* Сохраняет четкость пикселей */
        }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="segaCanvas" width="320" height="224"></canvas> <!-- Разрешение Sega MD -->
        <div class="hud">
            <div>SCORE: <span id="score">000000</span></div>
            <div>SPD: <span id="speedUi">0</span> KM/H</div>
        </div>
    </div>
    <div style="margin-top: 15px; text-align: center; color: #8a8ab0; font-size: 13px;">
        Управление: ◄ ► (Стрелки) — Поворот | ▲ (Вверх) — Газ | ▼ (Вниз) — Тормоз
    </div>

    <script>
        const canvas = document.getElementById('segaCanvas');
        const ctx = canvas.getContext('2d');
        
        // Отключаем сглаживание для создания пиксель-арта
        ctx.imageSmoothingEnabled = false;

        // Состояние игры
        let playerX = 0; // Позиция игрока на дороге (-1 до 1)
        let position = 0; // Прогресс движения по трассе
        let speed = 0;
        const maxSpeed = 200;
        let score = 0;
        let gameOver = false;
        let skyOffset = 0; // Для параллакса неба

        // Настройки дороги
        const roadWidth = 2000;
        const segmentLength = 200;
        const cameraHeight = 1000;
        const drawDistance = 40; // Сколько сегментов вперед рисовать
        
        // Генерация трассы (изгибы)
        const segments = [];
        for (let i = 0; i < 500; i++) {
            segments.push({
                curve: Math.sin(i / 10) * 2 * (i > 50 ? 1 : 0), // Плавные повороты
                sprites: Math.random() > 0.7 ? (Math.random() > 0.5 ? 1 : -1) : 0 // 1 - пальма справа, -1 - слева
            });
        }

        // Встречные машины
        const cars = [
            { pos: 1000, x: -0.5, speed: 60, color: '#e69100' },
            { pos: 3000, x: 0.3, speed: 80, color: '#0094e6' },
            { pos: 5000, x: -0.2, speed: 70, color: '#11a300' }
        ];

        // Кнопки управления
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
        window.addEventListener('keydown', e => { if (e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if (e.key in keys) keys[e.key] = false; });

        // Проекция 3D точек на 2D экран (математика псевдо-3D гонок 90-х)
        function project(p, cameraX, cameraZ, width, height) {
            const scale = cameraHeight / (p.z - cameraZ);
            const x = Math.round((width / 2) + (scale * (p.x - cameraX) * width / 2));
            const y = Math.round((height / 2) - (scale * p.y * height / 2));
            const w = Math.round(scale * roadWidth * width / 2);
            return { x, y, w };
        }

        // Отрисовка кастомных пиксельных спрайтов 16-бит
        function drawPalm(ctx, x, y, scale) {
            const w = 40 * scale;
            const h = 80 * scale;
            if (w < 2 || h < 2) return;
            
            ctx.save();
            ctx.translate(x - w/2, y - h);
            // Ствол
            ctx.fillStyle = '#65350f';
            ctx.fillRect(w * 0.45, h * 0.3, w * 0.1, h * 0.7);
            // Листья (Слоеная ретро-текстура)
            ctx.fillStyle = '#005e1a';
            ctx.fillRect(w * 0.1, h * 0.1, w * 0.8, h * 0.25);
            ctx.fillStyle = '#009e2d';
            ctx.fillRect(w * 0.2, h * 0.15, w * 0.6, h * 0.15);
            ctx.fillStyle = '#39e66b';
            ctx.fillRect(w * 0.3, h * 0.18, w * 0.4, h * 0.07);
            ctx.restore();
        }

        function drawCarSprite(ctx, x, y, scale, color, isPlayer = false) {
            const w = 55 * scale;
            const h = 30 * scale;
            if (w < 4 || h < 2) return;

            ctx.save();
            ctx.translate(x - w/2, y - h);

            // Тень под машиной
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(-w*0.1, h*0.8, w * 1.2, h*0.3);

            // Корпус
            ctx.fillStyle = color;
            ctx.fillRect(0, h * 0.4, w, h * 0.45); // Основная часть
            ctx.fillRect(w * 0.1, h * 0.2, w * 0.8, h * 0.25); // Кабина

            // Детали (Стиль Сега: контрастные обводки и неоновые цвета)
            ctx.fillStyle = '#111'; // Колеса
            ctx.fillRect(0, h * 0.7, w * 0.18, h * 0.25);
            ctx.fillRect(w * 0.82, h * 0.7, w * 0.18, h * 0.25);

            ctx.fillStyle = '#00d0ff'; // Стекло заднее/лобовое
            ctx.fillRect(w * 0.18, h * 0.25, w * 0.64, h * 0.15);

            // Спойлер гоночный
            ctx.fillStyle = '#222';
            ctx.fillRect(-w * 0.05, h * 0.3, w * 1.1, h * 0.08);

            // Огни фар/Стоп-сигналы
            ctx.fillStyle = isPlayer ? '#ff0033' : '#ffea00'; 
            ctx.fillRect(w * 0.05, h * 0.45, w * 0.12, h * 0.1);
            ctx.fillRect(w * 0.83, h * 0.45, w * 0.12, h * 0.1);

            ctx.restore();
        }

        // Основной движок обновления
        function update() {
            if (gameOver) return;

            // Логика скорости
            if (keys.ArrowUp) speed = Math.min(speed + 2, maxSpeed);
            else if (keys.ArrowDown) speed = Math.max(speed - 4, 0);
            else speed = Math.max(speed - 1, 0); // Трение

            // Поворот руля
            const currentSegment = segments[Math.floor(position / segmentLength) % segments.length];
            if (keys.ArrowLeft && speed > 0) {
                playerX -= 0.04 * (speed / maxSpeed);
                skyOffset += 2;
            }
            if (keys.ArrowRight && speed > 0) {
                playerX += 0.04 * (speed / maxSpeed);
                skyOffset -= 2;
            }

            // Центробежная сила на поворотах
            playerX -= (speed / maxSpeed) * currentSegment.curve * 0.015;

            // Движение вперед
            position += speed;
            if (speed > 0) {
                score += Math.round(speed / 10);
                document.getElementById('score').innerText = String(score).padStart(6, '0');
            }
            document.getElementById('speedUi').innerText = Math.round(speed);

            // Ограничение игрока пределами обочины
            if (playerX < -2 || playerX > 2) {
                speed = Math.max(speed - 5, 10); // Замедление по грязи
            }

            // Обновление трафика ИИ
            cars.forEach(car => {
                car.pos += car.speed;
                // Зацикливание машин вокруг трассы
                if (car.pos > position + 20000) car.pos -= 30000;
                if (car.pos < position - 5000) car.pos += 30000;

                // Хитбокс коллизии (Проверка столкновения)
                if (Math.abs(position - car.pos) < 150 && Math.abs(playerX - car.x) < 0.35) {
                    gameOver = true;
                }
            });

            render();
            requestAnimationFrame(update);
        }

        // Рендеринг кадра
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. НЕБО (Параллакс градиент в стиле Synthwave/Sega)
            skyOffset = skyOffset % canvas.width;
            ctx.fillStyle = '#0d001a';
            ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
            
            // Фиолетовые полосы заката
            ctx.fillStyle = '#26004d';
            ctx.fillRect(0, canvas.height * 0.25, canvas.width, canvas.height * 0.15);
            ctx.fillStyle = '#590099';
            ctx.fillRect(0, canvas.height * 0.37, canvas.width, canvas.height * 0.08);

            // Горы на горизонте с параллаксом
            ctx.fillStyle = '#120024';
            for (let i = -1; i < 3; i++) {
                let gx = (i * 150) + (skyOffset * 0.5);
                ctx.beginPath();
                ctx.moveTo(gx, canvas.height / 2);
                ctx.lineTo(gx + 75, canvas.height / 2 - 30);
                ctx.lineTo(gx + 150, canvas.height / 2);
                ctx.fill();
            }

            // 2. ОТРИСОВКА ДОРОГИ (Псевдо-3D сканирование линий)
            const startSegment = Math.floor(position / segmentLength);
            let percent = (position % segmentLength) / segmentLength;
            
            let dx = -(segments[startSegment].curve * percent);
            let sumX = 0;

            let maxAnkerY = canvas.height;

            // Отрисовка сзади наперед (художественный алгоритм)
            const drawQueue = [];

            for (let n = 0; n < drawDistance; n++) {
                const i = (startSegment + n) % segments.length;
                const segment = segments[i];
                
                const p1 = { x: sumX, y: 0, z: (startSegment + n) * segmentLength };
                const p2 = { x: sumX + segment.curve, y: 0, z: (startSegment + n + 1) * segmentLength };
                
Используйте код с осторожностью.sumX += segment.curve;const proj1 = project(p1, playerX * roadWidth - dx * roadWidth, position, canvas.width, canvas.height);const proj2 = project(p2, playerX * roadWidth - (dx + segment.curve) * roadWidth, position, canvas.width, canvas.height);dx += segment.curve;// Отсечение невидимогоif (proj1.y >= canvas.height || proj2.y >= proj1.y || proj2.y < canvas.height / 2) continue;// Цвета классической «зебры» Sega (чередование полос)const isEven = Math.floor((startSegment + n) / 3) % 2 === 0;const grassColor = isEven ? '#128033' : '#005e1a';const roadColor  = isEven ? '#424254' : '#30303e';const rumbleColor = isEven ? '#e60000' : '#ffffff';// Зелень по бокамctx.fillStyle = grassColor;ctx.fillRect(0, proj2.y, canvas.width, proj1.y - proj2.y);// Обочина (Rumble strips)ctx.fillStyle = rumbleColor;ctx.beginPath();ctx.moveTo(proj1.x - proj1.w * 1.06, proj1.y);ctx.lineTo(proj1.x + proj1.w * 1.06, proj1.y);ctx.lineTo(proj2.x + proj2.w * 1.06, proj2.y);ctx.lineTo(proj2.x - proj2.w * 1.06, proj2.y);ctx.fill();// Полотно дорогиctx.fillStyle = roadColor;ctx.beginPath();ctx.moveTo(proj1.x - proj1.w, proj1.y);ctx.lineTo(proj1.x + proj1.w, proj1.y);ctx.lineTo(proj2.x + proj2.w, proj2.y);ctx.lineTo(proj2.x - proj2.w, proj2.y);ctx.fill();// Разделительная прерывистая линияif (isEven) {ctx.fillStyle = '#ffffff';ctx.beginPath();ctx.moveTo(proj1.x - proj1.w0.02, proj1.y);ctx.lineTo(proj1.x + proj1.w0.02, proj1.y);ctx.lineTo(proj2.x + proj2.w0.02, proj2.y);ctx.lineTo(proj2.x - proj2.w0.02, proj2.y);ctx.fill();}// Сохраняем элементы окружения для отрисовки поверх дорогиconst scale = cameraHeight / (p1.z - position);if (segment.sprites !== 0) {const side = segment.sprites;const spriteX = proj1.x + side * proj1.w * 1.4;drawQueue.push({ type: 'palm', x: spriteX, y: proj1.y, s: scale });}}// 3. ТРАФИК (Машины ИИ)cars.forEach(car => {if (car.pos > position && car.pos < position + drawDistance * segmentLength) {const p = { x: car.x * roadWidth, y: 0, z: car.pos };const proj = project(p, playerX * roadWidth, position, canvas.width, canvas.height);const scale = cameraHeight / (car.pos - position);drawQueue.push({ type: 'car', x: proj.x, y: proj.y, s: scale, color: car.color, isPlayer: false });}});// Отрисовка объектов с правильной глубиной (от дальних к ближним)for (let i = drawQueue.length - 1; i >= 0; i--) {const item = drawQueue[i];if (item.type === 'palm') drawPalm(ctx, item.x, item.y, item.s * 12);if (item.type === 'car') drawCarSprite(ctx, item.x, item.y, item.s * 10, item.color, false);}// 4. ИГРОК (Отрисовывается всегда на переднем плане по центру снизу)const playerScale = cameraHeight / (cameraHeight);// Визуальный наклон машины при поворотеlet pX = canvas.width / 2;if (keys.ArrowLeft) pX -= 3;if (keys.ArrowRight) pX += 3;drawCarSprite(ctx, pX, canvas.height - 10, playerScale * 18, '#ff0044', true);// Экран Game Overif (gameOver) {ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';ctx.fillRect(0, 0, canvas.width, canvas.height);ctx.fillStyle = '#ff3333';ctx.font = 'bold 20px Courier New';ctx.textAlign = 'center';ctx.fillText('CRASH GAME OVER', canvas.width / 2, canvas.height / 2 - 10);ctx.fillStyle = '#00ffff';ctx.font = '12px Courier New';ctx.fillText('Нажмите F5 для рестарта', canvas.width / 2, canvas.height / 2 + 15);}}// Запуск движкаupdate();
### Что здесь воссоздает атмосферу Sega Mega Drive:
1. **Разрешение экрана 320x224:** Настоящий стандарт большинства хитов Sega (NTSC режим).
2. **Псевдо-3D скроллинг линий:** Код делит экран горизонтально на линии и вычисляет перспективу, сужая и расширяя полотно. Точно так же работала легендарная *Lotus Turbo Challenge* на МегаДрайве.
3. **Параллакс:** Небо и горы движутся с разной скоростью относительно машины, давая иллюзию объема ландшафта.
4. **Пиксельный рендеринг:** Стилизованный ретро-шейдинг деталей машин и пальм.
