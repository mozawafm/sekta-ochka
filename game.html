<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DJ Son — Club Battle (Moonwalker Style)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: white; user-select: none;
        }

        #game-wrapper {
            position: relative;
            width: 900px; height: 500px;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.4);
            border: 2px solid #333;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated; /* Четкие пиксели */
        }

        /* CRT Эффекты */
        .scanlines {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none; z-index: 10; opacity: 0.6;
        }
        .vignette {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 50%, black 120%);
            pointer-events: none; z-index: 11;
        }

        /* UI */
        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            z-index: 20; text-shadow: 3px 3px 0 #000;
            font-size: 16px; letter-spacing: 1px;
            pointer-events: none;
        }
        
        #status-bar {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: #ffeb3b; font-size: 14px;
            z-index: 20; text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }

        /* Экраны */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 30; text-align: center;
            backdrop-filter: blur(4px);
        }
        .hidden { display: none !important; }

        h1 { 
            font-size: 48px; margin: 0 0 10px 0;
            background: linear-gradient(to bottom, #fff, #ff0055);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px rgba(255,255,255,0.2));
        }
        h2 { font-size: 20px; color: #ccc; margin-bottom: 30px; font-weight: normal; }
        
        button {
            padding: 20px 40px; font-family: inherit; font-size: 18px;
            background: linear-gradient(to bottom, #ff0055, #cc0044);
            color: white; border: 4px solid #fff;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        button:active { transform: scale(0.95); }

    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="c" width="900" height="500"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="ui-layer">
        <div id="hp">❤️❤️❤️❤️❤️</div>
        <div id="lvl">КЛУБ "ХАЙХЭТ"</div>
        <div id="scr">🎵 0</div>
    </div>
    <div id="status-bar">СТРЕЛКИ: Движение | ПРОБЕЛ: Атака</div>

    <div id="start-scr" class="screen">
        <h1>DJ SON</h1>
        <h2>CLUB BATTLE EDITION</h2>
        <button id="btn-start">НАЧАТЬ РЕЙВ</button>
    </div>

    <div id="end-scr" class="screen hidden">
        <h1 id="end-title">GAME OVER</h1>
        <p id="end-msg" style="color:#aaa; margin-bottom:30px; line-height:1.5;">Рейв провален...</p>
        <button id="btn-restart">RESTART</button>
    </div>
</div>

<script>
/**
 * ENGINE: MOONWALKER STYLE RENDERER
 * Процедурная генерация сложных спрайтов и параллакс
 */

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const W = 900, H = 500;

// --- ПАЛИТРА И НАСТРОЙКИ ---
const P = {
    skin: '#FFCCBC', skinShadow: '#E0A996',
    hair: '#3E2723', hairHighlight: '#5D4037',
    jacketRed: '#D32F2F', jacketDark: '#B71C1C', jacketWhite: '#FFFFFF',
    pants: '#111111', pantsHighlight: '#263238',
    headphones: '#212121', hpMetal: '#616161', hpRed: '#D32F2F',
    enemyGreen: '#33691E', enemyGrey: '#455A64',
    bossLeather: '#1B1B1B', bossLeatherHi: '#333333'
};

// --- ГЕНЕРАТОР СПРАЙТОВ (Процедурный рендер) ---
// Вместо массивов символов используем функции рисования для детализации
function drawDJ(ctx, x, y, frame, facingRight, isAttacking) {
    ctx.save();
    if (!facingRight) {
        ctx.translate(x + 48, y);
        ctx.scale(-1, 1);
        x = 0; y = 0;
    } else {
        ctx.translate(x, y);
    }

    // Анимация дыхания (Idle)
    let breath = Math.sin(Date.now() / 200) * 1;
    let legOffset = 0;
    
    if (frame === 'walk') {
        legOffset = Math.sin(Date.now() / 100) * 3;
    }

    // --- ТЕЛО ---
    // Ноги (Черные штаны с объемом)
    ctx.fillStyle = P.pants;
    ctx.fillRect(12, 36 + legOffset, 10, 24 - legOffset); // Левая нога
    ctx.fillRect(26, 36 - legOffset, 10, 24 + legOffset); // Правая нога
    
    // Блик на штанах
    ctx.fillStyle = P.pantsHighlight;
    ctx.fillRect(14, 38 + legOffset, 2, 10);
    ctx.fillRect(28, 38 - legOffset, 2, 10);

    // Кроссовки (Белые с красным)
    ctx.fillStyle = '#FFF';
    ctx.fillRect(10, 58 + legOffset, 14, 6);
    ctx.fillRect(24, 58 - legOffset, 14, 6);
    ctx.fillStyle = P.jacketRed; // Полоска на кроссовке
    ctx.fillRect(12, 60 + legOffset, 10, 2);
    ctx.fillRect(26, 60 - legOffset, 10, 2);

    // Торс (Олимпийка)
    ctx.fillStyle = P.jacketRed;
    ctx.fillRect(8, 16 + breath, 32, 22);
    
    // Белые полосы на олимпийке
    ctx.fillStyle = P.jacketWhite;
    ctx.fillRect(8, 22 + breath, 32, 4); // Грудь
    ctx.fillRect(8, 34 + breath, 32, 2); // Низ
    
    // Тень на куртке
    ctx.fillStyle = P.jacketDark;
    ctx.fillRect(8, 30 + breath, 4, 8); // Левый бок тень
    ctx.fillRect(36, 30 + breath, 4, 8); // Правый бок тень

    // Руки
    if (isAttacking) {
        // Атака: рука вытянута
        ctx.fillStyle = P.jacketRed;
        ctx.fillRect(38, 18 + breath, 16, 6); // Предплечье
        ctx.fillStyle = P.skin;
        ctx.fillRect(52, 18 + breath, 6, 6); // Кулак
        
        // Эффект удара (след)
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillRect(40, 16 + breath, 12, 10);
    } else {
        // Обычная стойка
        ctx.fillStyle = P.jacketRed;
        ctx.fillRect(6, 18 + breath, 6, 14); // Левая рука
        ctx.fillRect(36, 18 + breath, 6, 14); // Правая рука
        ctx.fillStyle = P.jacketWhite;
        ctx.fillRect(6, 24 + breath, 6, 2); // Полоса на рукаве
        ctx.fillRect(36, 24 + breath, 6, 2);
    }

    // --- ГОЛОВА ---
    // Шея
    ctx.fillStyle = P.skinShadow;
    ctx.fillRect(18, 12 + breath, 12, 6);

    // Лицо (База)
    ctx.fillStyle = P.skin;
    ctx.fillRect(14, 0 + breath, 20, 16);
    
    // Борода/Щетина
    ctx.fillStyle = P.hair;
    ctx.fillRect(14, 10 + breath, 20, 6);
    ctx.fillRect(12, 8 + breath, 4, 6); // Бакенбарды

    // Глаза (Пиксельные)
    ctx.fillStyle = '#FFF';
    ctx.fillRect(24, 4 + breath, 6, 4); // Белок
    ctx.fillStyle = '#000';
    ctx.fillRect(26, 5 + breath, 2, 2); // Зрачок
    
    // Бровь (Серьезное выражение)
    ctx.fillStyle = P.hair;
    ctx.fillRect(24, 2 + breath, 6, 2);

    // Волосы (Объем)
    ctx.fillStyle = P.hair;
    ctx.fillRect(12, -2 + breath, 24, 6);
    ctx.fillStyle = P.hairHighlight;
    ctx.fillRect(14, 0 + breath, 4, 2); // Блик

    // --- НАУШНИКИ (Детализированные) ---
    // Оголовье
    ctx.fillStyle = P.headphones;
    ctx.fillRect(10, -4 + breath, 28, 4);
    ctx.fillStyle = P.hpMetal;
    ctx.fillRect(12, -2 + breath, 24, 2); // Металлический блеск

    // Чашки
    ctx.fillStyle = P.headphones;
    ctx.fillRect(8, 0 + breath, 6, 14); // Левая
    ctx.fillRect(34, 0 + breath, 6, 14); // Правая
    
    // Детали чашек
    ctx.fillStyle = P.hpRed;
    ctx.fillRect(9, 4 + breath, 4, 6); // Красная полоса
    ctx.fillStyle = P.hpMetal;
    ctx.fillRect(10, 6 + breath, 2, 2); // Кнопка/Блик

    ctx.restore();
}

function drawEnemyAlkash(ctx, x, y, fR) {
    ctx.save();
    if(!fR) { ctx.translate(x+30,y); ctx.scale(-1,1); x=0;y=0; } else ctx.translate(x,y);
    
    // Тело (Грязно-зеленое)
    ctx.fillStyle = P.enemyGreen;
    ctx.fillRect(6, 10, 18, 20);
    ctx.fillStyle = '#1B5E20'; // Тень
    ctx.fillRect(6, 20, 18, 10);
    
    // Голова (Небритая)
    ctx.fillStyle = P.skinShadow;
    ctx.fillRect(8, 0, 14, 12);
    ctx.fillStyle = '#5D4037'; // Щетина
    ctx.fillRect(8, 6, 14, 6);
    
    // Шапка ушанка
    ctx.fillStyle = '#4E342E';
    ctx.fillRect(6, -2, 18, 6);
    ctx.fillRect(4, 0, 4, 8); // Уши шапки
    ctx.fillRect(22, 0, 4, 8);

    // Бутылка в руке
    ctx.fillStyle = '#1976D2';
    ctx.fillRect(24, 14, 6, 10);
    ctx.fillStyle = '#FFF'; // Этикетка
    ctx.fillRect(24, 16, 6, 4);

    // Ноги
    ctx.fillStyle = '#37474F';
    ctx.fillRect(8, 30, 6, 10);
    ctx.fillRect(16, 30, 6, 10);
    ctx.restore();
}

function drawBoss(ctx, x, y, dir) {
    ctx.save();
    ctx.translate(x, y);
    if (dir < 0) { ctx.scale(-1, 1); ctx.translate(-60, 0); }

    // Огромное тело
    ctx.fillStyle = P.bossLeather;
    ctx.fillRect(0, 20, 60, 60);
    
    // Блики на коже
    ctx.fillStyle = P.bossLeatherHi;
    ctx.fillRect(5, 25, 10, 50);
    ctx.fillRect(45, 25, 10, 50);

    // Молнии на куртке
    ctx.fillStyle = '#9E9E9E';
    ctx.fillRect(28, 20, 4, 60);

    // Голова
    ctx.fillStyle = P.skin;
    ctx.fillRect(10, 0, 40, 25);
    
    // Очки
    ctx.fillStyle = '#000';
    ctx.fillRect(15, 8, 30, 8);
    ctx.fillStyle = '#333'; // Блик на очках
    ctx.fillRect(17, 10, 5, 2);
    ctx.fillRect(35, 10, 5, 2);

    // Наушники-мониторы
    ctx.fillStyle = '#111';
    ctx.fillRect(5, -5, 10, 30);
    ctx.fillRect(45, -5, 10, 30);
    ctx.fillStyle = '#D32F2F'; // Индикатор
    ctx.fillRect(7, 5, 6, 4);

    ctx.restore();
}

// --- ИГРОВАЯ ЛОГИКА ---

let state = 'MENU';
let score = 0, camX = 0, frame = 0;
let keys = {};
let player, enemies, items, boss, particles, lights;

class Player {
    constructor() {
        this.x = 100; this.y = 300; this.w = 48; this.h = 64;
        this.vx = 0; this.vy = 0;
        this.hp = 5; this.facingRight = true;
        this.attacking = false; this.atkTimer = 0;
        this.invincible = 0;
    }
    update() {
        // Движение с инерцией
        if (keys['ArrowRight']) { this.vx += 0.8; this.facingRight = true; }
        if (keys['ArrowLeft']) { this.vx -= 0.8; this.facingRight = false; }
        this.vx *= 0.85; // Трение
        
        if (Math.abs(this.vx) > 4.5) this.vx = 4.5 * Math.sign(this.vx);
        if (Math.abs(this.vx) < 0.1) this.vx = 0;

        if (keys['ArrowUp'] && this.grounded) { this.vy = -13; this.grounded = false; }

        // Атака
        if (keys[' '] && this.atkTimer === 0) {
            this.attacking = true; this.atkTimer = 25;
            checkAttack(this);
        }
        if (this.atkTimer > 0) {
            this.atkTimer--;
            if (this.atkTimer < 15) this.attacking = false;
        }

        this.vy += 0.7;
        this.x += this.vx; this.y += this.vy;

        // Коллизия с полом
        if (this.y + this.h > H - 50) {
            this.y = H - 50 - this.h;
            this.vy = 0; this.grounded = true;
        } else this.grounded = false;

        if (this.x < 0) this.x = 0;
        if (this.x > 3500 - this.w) this.x = 3500 - this.w;
        if (this.invincible > 0) this.invincible--;
    }
    draw() {
        if (this.invincible > 0 && Math.floor(Date.now()/50)%2===0) return;
        let f = Math.abs(this.vx) > 0.5 ? 'walk' : 'idle';
        drawDJ(ctx, this.x - camX, this.y, f, this.facingRight, this.attacking);
    }
}

class Enemy {
    constructor(x, type) {
        this.x = x; this.y = type==='fly'?150:H-80; 
        this.w = 30; this.h = 40;
        this.type = type; this.hp = type==='alkash'?3:1;
        this.dir = 1; this.startX = x;
        this.dead = false; this.flash = 0;
    }
    update() {
        if (this.dead) return;
        if (this.type === 'fly') {
            this.x += Math.sin(Date.now()/300)*2;
            this.y += Math.cos(Date.now()/200);
        } else {
            this.x += this.dir * (this.type==='fast'?3:1);
            if (Math.abs(this.x - this.startX) > 100) this.dir *= -1;
        }
        if (this.flash > 0) this.flash--;

        // Урон игроку
        if (!player.dead && rectIntersect(this, player) && player.invincible===0) {
            player.hp--; player.invincible=60; player.vy=-5;
            spawnParts(player.x+24, player.y+32, '#f00', 10);
            updateUI();
            if (player.hp<=0) endGame(false);
        }
    }
    draw() {
        if (this.dead || (this.flash>0 && Math.floor(Date.now()/50)%2===0)) return;
        if (this.type==='alkash') drawEnemyAlkash(ctx, this.x-camX, this.y, this.dir>0);
        else if (this.type==='fly') {
            ctx.fillStyle='#9C27B0'; ctx.fillRect(this.x-camX, this.y, 30, 30);
            ctx.fillStyle='#FFF'; ctx.fillRect(this.x-camX+5, this.y+5, 8, 8);
        } else {
            // Fast guy placeholder with style
            ctx.fillStyle='#FFEB3B'; ctx.fillRect(this.x-camX, this.y, 30, 40);
            ctx.fillStyle='#E91E63'; ctx.fillRect(this.x-camX, this.y+20, 30, 20);
        }
    }
}

class BossEntity {
    constructor() {
        this.x = 3300; this.y = H-130; this.w=60; this.h=80;
        this.hp = 20; this.maxHp = 20;
        this.dir = -1; this.state = 'idle'; this.timer = 0;
        this.projs = []; this.dead = false; this.flash = 0;
    }
    update() {
        if (this.dead) return;
        this.timer++;
        if (this.state==='idle' && this.timer>60) {
            this.state = 'move'; this.timer=0;
        } else if (this.state==='move') {
            this.x += this.dir * 2;
            if (this.x<3100 || this.x>3400) { this.dir*=-1; this.state='throw'; this.timer=0; }
        } else if (this.state==='throw') {
            if (this.timer%30===0) this.projs.push({x:this.x+(this.dir>0?60:-20), y:this.y+30, vx:this.dir*7, vy:-3});
            if (this.timer>90) { this.state='idle'; this.timer=0; }
        }

        // Снаряды
        for(let i=this.projs.length-1; i>=0; i--) {
            let p = this.projs[i];
            p.x+=p.vx; p.y+=p.vy; p.vy+=0.2;
            if (rectIntersect({x:p.x,y:p.y,w:20,h:20}, player) && player.invincible===0) {
                player.hp--; player.invincible=60;
                spawnParts(player.x, player.y, '#f00', 10);
                updateUI();
                if (player.hp<=0) endGame(false);
                this.projs.splice(i,1);
            } else if (p.y>H) this.projs.splice(i,1);
        }

        if (this.flash>0) this.flash--;
        if (rectIntersect(this, player) && player.invincible===0) {
             player.hp--; player.invincible=60; updateUI();
             if (player.hp<=0) endGame(false);
        }
    }
    draw() {
        if (this.dead || (this.flash>0 && Math.floor(Date.now()/50)%2===0)) return;
        drawBoss(ctx, this.x-camX, this.y, this.dir);
        
        // HP Bar
        ctx.fillStyle='#333'; ctx.fillRect(this.x-camX, this.y-20, 60, 6);
        ctx.fillStyle='#0f0'; ctx.fillRect(this.x-camX, this.y-20, 60*(this.hp/this.maxHp), 6);

        // Vinyls
        ctx.fillStyle='#111';
        for(let p of this.projs) {
            ctx.beginPath(); ctx.arc(p.x-camX+10, p.y+10, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p.x-camX+10, p.y+10, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle='#111';
        }
    }
}

// --- СИСТЕМЫ ---

function rectIntersect(r1, r2) {
    return !(r2.x > r1.x+r1.w || r2.x+r2.w < r1.x || r2.y > r1.y+r1.h || r2.y+r2.h < r1.y);
}

function checkAttack(p) {
    let ab = { x: p.facingRight?p.x+p.w:p.x-30, y:p.y+10, w:30, h:40 };
    enemies.forEach(e => {
        if (!e.dead && rectIntersect(ab, e)) {
            e.hp--; e.flash=10;
            spawnParts(e.x+15, e.y+20, '#fff', 8);
            if (e.hp<=0) { e.dead=true; score+=10; updateUI(); }
        }
    });
    if (boss && !boss.dead && rectIntersect(ab, boss)) {
        boss.hp--; boss.flash=10;
        spawnParts(boss.x+30, boss.y+40, '#f00', 15);
        updateUI();
        if (boss.hp<=0) { boss.dead=true; setTimeout(()=>endGame(true), 1000); }
    }
}

function spawnParts(x, y, col, n) {
    for(let i=0; i<n; i++) particles.push({
        x, y, vx:(Math.random()-.5)*8, vy:(Math.random()-.5)*8,
        life:20+Math.random()*10, col, size:2+Math.random()*3
    });
}

function init() {
    player = new Player();
    enemies = []; items = []; particles = []; lights = [];
    boss = null; score = 0; camX = 0;
    
    for(let i=0; i<12; i++) {
        let t = Math.random()>0.6?'fast':(Math.random()>0.5?'alkash':'fly');
        enemies.push(new Enemy(400+i*220, t));
    }
    for(let i=0; i<8; i++) items.push({x:300+i*350, y:250+Math.random()*100, w:20, h:20, got:false});
    
    // Световые пятна
    for(let i=0; i<5; i++) lights.push({x:i*700, c:['#ff0055','#00e5ff','#d500f9'][i%3], phase:Math.random()*6});
    
    updateUI();
}

function loop() {
    if (state!=='PLAY') return requestAnimationFrame(loop);
    
    // Очистка и фон
    ctx.fillStyle = '#0a0510'; ctx.fillRect(0,0,W,H);
    
    // Параллакс задний план
    ctx.fillStyle = '#1a0b2e';
    for(let i=0; i<10; i++) ctx.fillRect((i*400 - camX*0.2)%4000, 50, 100, H);
    
    // Свет софитов
    lights.forEach(l => {
        l.phase += 0.05;
        let alpha = 0.1 + Math.sin(l.phase)*0.05;
        ctx.fillStyle = l.c; ctx.globalAlpha = alpha;
        ctx.beginPath(); ctx.moveTo(l.x-camX*0.5, 0); 
        ctx.lineTo(l.x-camX*0.5-100, H); ctx.lineTo(l.x-camX*0.5+100, H); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Камера
    camX = player.x - W/3;
    if (camX<0) camX=0; if (camX>3500-W) camX=3500-W;

    // Триггер босса
    if (player.x > 3000 && !boss) {
        boss = new BossEntity();
        document.getElementById('lvl').innerText = "️ МЕРЗКИЙ ДИДЖЕЙ";
        document.getElementById('lvl').style.color = "#ff0055";
    }

    // Отрисовка объектов
    items.forEach(it => {
        if (it.got) return;
        it.y += Math.sin(Date.now()/200)*0.5;
        if (rectIntersect(it, player)) { it.got=true; score+=5; updateUI(); }
        ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(it.x-camX+10, it.y+10, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(it.x-camX+7, it.y+7, 3, 0, Math.PI*2); ctx.fill();
    });

    enemies.forEach(e => { e.update(); e.draw(); });
    if (boss) { boss.update(); boss.draw(); }
    player.update(); player.draw();

    // Частицы
    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; p.vy+=0.2;
        ctx.fillStyle=p.col; ctx.globalAlpha=p.life/30;
        ctx.fillRect(p.x-camX, p.y, p.size, p.size);
        if (p.life<=0) particles.splice(i,1);
    }
    ctx.globalAlpha = 1;

    // Пол
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, H-50, W, 50);
    ctx.strokeStyle = '#333'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0; i<W; i+=60) { ctx.moveTo(i, H-50); ctx.lineTo(i-30, H); }
    ctx.stroke();

    frame++;
    requestAnimationFrame(loop);
}

function updateUI() {
    document.getElementById('hp').innerText = '❤️'.repeat(Math.max(0, player.hp));
    document.getElementById('scr').innerText = '🎵 ' + score;
}

function startGame() {
    document.getElementById('start-scr').classList.add('hidden');
    document.getElementById('end-scr').classList.add('hidden');
    state = 'PLAY';
    document.getElementById('lvl').innerText = 'КЛУБ "ХАЙХЭТ"';
    document.getElementById('lvl').style.color = "#fff";
    init();
    loop();
}

function endGame(win) {
    state = 'OVER';
    let s = document.getElementById('end-scr');
    s.classList.remove('hidden');
    document.getElementById('end-title').innerText = win ? "ПОБЕДА!" : "GAME OVER";
    document.getElementById('end-title').style.color = win ? "#00e5ff" : "#ff0055";
    document.getElementById('end-msg').innerText = win ? "Рейв спасен! Музыка вечна!" : "Тусовка окончена...";
}

// Ввод
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);
document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-restart').onclick = startGame;

console.log("Moonwalker Engine Ready");
</script>
