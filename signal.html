<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>signal</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
cursor:none;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("mask.jpg") center center/cover no-repeat;
filter:
brightness(0.12)
contrast(1.6)
grayscale(1);
transform:scale(1.05);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:0.08;
mix-blend-mode:screen;
pointer-events:none;
}

#center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#title{

font-size:28px;

letter-spacing:7px;

margin-bottom:50px;

opacity:0;

transition:2s;

}

.choice{

margin:15px auto;

padding:15px;

width:320px;

border:1px solid rgba(255,255,255,.15);

opacity:.35;

cursor:pointer;

transition:.25s;

letter-spacing:3px;

}

.choice:hover{

opacity:1;

background:white;

color:black;

}

#small{

margin-top:40px;

font-size:11px;

letter-spacing:4px;

opacity:.2;

}

.flash{

animation:flash .08s;

}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>

<div id="center">

<div id="title">

ОБНАРУЖЕН СИГНАЛ

</div>

<div class="choice" onclick="go('observe.html')">
ГАРАЖ 216
</div>

<div class="choice" onclick="go('loop.html')">
НАОМИ
</div>

<div class="choice" onclick="go('glitch.html')">
432
</div>

<div class="choice" onclick="go('video.html')">
ЗАПИСЬ
</div>

<div class="choice" onclick="go('address.html')">
АДРЕС
</div>

<div id="small">

выберите источник

</div>

</div>

<script>

setTimeout(()=>{

document
.getElementById("title")
.style.opacity=".9";

},500);

function go(page){

localStorage.setItem(
"lastSignal",
page
);

document.body.style.opacity=".2";

setTimeout(()=>{

window.location.href = page;

},600);

}

setInterval(()=>{

if(Math.random()>.87){

document.body.classList.add("flash");

setTimeout(()=>{

document.body.classList.remove("flash");

},80);

}

},2500);

</script>

<script src="audio.js"></script>

</body>
</html>
