<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>signal</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:monospace;
cursor:none;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:url("mask.jpg") center center/cover no-repeat;
filter:
brightness(0.12)
contrast(1.5)
grayscale(1);
transform:scale(1.04);
}

#noise{
position:absolute;
width:100%;
height:100%;
background-image:url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
opacity:0.08;
mix-blend-mode:screen;
pointer-events:none;
}

#scan{
position:absolute;
width:100%;
height:100%;
background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 1px,
transparent 4px
);
opacity:0.25;
pointer-events:none;
}

#center{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:90%;

text-align:center;

}

#text{

font-size:26px;

letter-spacing:5px;

opacity:0.9;

min-height:60px;

}

.answer{

display:inline-block;

margin:40px 15px 0;

padding:12px 25px;

border:1px solid rgba(255,255,255,0.2);

cursor:pointer;

opacity:0.4;

transition:0.3s;

}

.answer:hover{

opacity:1;

background:white;
color:black;

}

.hidden{

display:none;

}

.flash{
animation:flash 0.08s;
}

@keyframes flash{

50%{
opacity:0;
}

}

</style>
</head>

<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="scan"></div>

<div id="center">

<div id="text">
СИГНАЛ ОБНАРУЖЕН
</div>

<div id="answers" class="hidden">

<div class="answer" onclick="reply()">
да
</div>

<div class="answer" onclick="reply()">
нет
</div>

</div>

</div>

<script>

const text =
document.getElementById("text");

const answers =
document.getElementById("answers");

let step = 0;

const questions = [

"ты пришла сюда случайно?",

"ты кого-то ищешь?",

"ты уже была здесь?",

"ты уверена?"

];

setTimeout(()=>{

text.innerText =
"идет поиск источника...";

},2000);

setTimeout(()=>{

text.innerText =
"источник найден";

},5000);

setTimeout(()=>{

text.innerText =
questions[0];

answers.classList.remove("hidden");

},8000);

function reply(){

step++;

answers.classList.add("hidden");

text.innerText =
"неверный ответ";

setTimeout(()=>{

if(step < questions.length){

text.innerText =
questions[step];

answers.classList.remove("hidden");

}

else{

finish();

}

},2200);

}

function finish(){

text.innerText =
"проверка завершена";

setTimeout(()=>{

text.innerText =
"мы искали не тебя";

},3000);

setTimeout(()=>{

document.body.classList.add("flash");

},6000);

setTimeout(()=>{

let r = Math.random();

if(r > 0.66){

window.location.href =
"secret.html";

}

else if(r > 0.33){

window.location.href =
"final.html";

}

else{

window.location.href =
"hub.html";

}

},9000);

}

setInterval(()=>{

if(Math.random() > 0.84){

document.body.classList.add("flash");

setTimeout(()=>{

document.body.classList.remove("flash");

},80);

}

},3000);

</script>

<script src="audio.js"></script>

</body>
</html>
