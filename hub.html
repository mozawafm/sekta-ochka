<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>hub — центр сигнала</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
    }

    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: 'Courier New', monospace;
        height: 100vh;
        position: relative;
        cursor: default;
    }

    /* Фон с градиентом и пульсацией */
    #bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("garage.jpg") center center/cover no-repeat;
        filter: brightness(0.25) contrast(1.3) grayscale(0.5);
        transform: scale(1.05);
        transition: filter 0.5s ease;
    }

    /* Шум */
    #noise {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: url("https://media.tenor.com/oEIh4sO8jKAAAAAC/static.gif");
        opacity: 0.06;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 1;
    }

    /* Затемнение */
    #overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
        z-index: 2;
    }

    /* Центральный контейнер */
    #center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 85%;
        max-width: 650px;
        z-index: 10;
    }

    /* Заголовок */
    #title {
        font-size: 28px;
        letter-spacing: 8px;
        margin-bottom: 25px;
        color: #d4c5a0;
        text-shadow: 0 0 15px rgba(212,197,160,0.3);
        opacity: 0.9;
    }

    /* Динамическое сообщение */
    #message {
        font-size: 16px;
        letter-spacing: 4px;
        margin-bottom: 40px;
        color: #b0a0a0;
        min-height: 60px;
        line-height: 1.5;
    }

    /* Сетка кнопок */
    .button-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 18px;
        margin: 30px 0;
    }

    .btn {
        display: inline-block;
        border: 1px solid rgba(212,197,160,0.35);
        padding: 12px 28px;
        cursor: pointer;
        transition: all 0.25s ease;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(4px);
        font-family: monospace;
        font-size: 14px;
        letter-spacing: 3px;
        color: #d4c5a0;
        text-decoration: none;
    }

    .btn:hover {
        background: #d4c5a0;
        color: black;
        border-color: #d4c5a0;
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(212,197,160,0.3);
    }

    /* Специальные кнопки */
    .btn-special {
        border-color: rgba(255,51,102,0.5);
        color: #ff6699;
    }

    .btn-special:hover {
        background: #ff3366;
        color: black;
        border-color: #ff3366;
    }

    /* Нижняя панель */
    #bottom-bar {
        position: absolute;
        bottom: 20px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 10;
        font-size: 10px;
        opacity: 0.3;
        pointer-events: none;
    }

    /* Скрытое поле ввода кода */
    #code {
        position: absolute;
        bottom: 16px;
        right: 18px;
        opacity: 0;
        transition: 1s;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(212,197,160,0.2);
        color: #d4c5a0;
        font-family: monospace;
        outline: none;
        font-size: 10px;
        width: 110px;
        padding: 4px 8px;
        z-index: 20;
        pointer-events: auto;
    }

    #code:focus {
        opacity: 0.6;
        border-color: #d4c5a0;
    }

    /* Эффекты */
    .flash {
        animation: flashAnim 0.08s;
    }

    .glitch {
        animation: glitchAnim 0.1s;
    }

    @keyframes flashAnim {
        50% { opacity: 0; }
    }

    @keyframes glitchAnim {
        0% { transform: translate(-50%, -50%); }
        25% { transform: translate(calc(-50% - 4px), calc(-50% + 2px)); }
        50% { transform: translate(calc(-50% + 4px), calc(-50% - 2px)); }
        100% { transform: translate(-50%, -50%); }
    }

    /* Адаптив */
    @media (max-width: 600px) {
        .btn { padding: 8px 18px; font-size: 11px; letter-spacing: 2px; }
        #title { font-size: 22px; letter-spacing: 5px; }
        #message { font-size: 12px; }
        .button-grid { gap: 12px; }
    }
</style>
</head>
<body>

<div id="bg"></div>
<div id="noise"></div>
<div id="overlay"></div>

<div id="center">
    <div id="title">◉ HUB ◉</div>
    <div id="message">восстановление записи...</div>

    <div class="button-grid">
        <div class="btn" id="continueBtn">▶ ПРОДОЛЖИТЬ</div>
        <div class="btn btn-special" id="bookBtn">📖 КНИГА ОЗАРЕНИЯ</div>
        <div class="btn btn-special" id="gameBtn">🎮 8-BIT GAME</div>
    </div>
</div>

<div id="bottom-bar">
    <span id="quote">человек видит то, что может видеть</span>
    <span id="time">--:--</span>
</div>

<input type="text" id="code" autocomplete="off" placeholder="код">

<script>
    // ============================================
    // СОСТОЯНИЕ
    // ============================================
    let state = JSON.parse(localStorage.getItem("state"));

    if (!state) {
        state = {
            firstVisit: false,
            visits: 0,
            trust: 0,
            infected: 0,
            unlocked: false,
            codeUsed: false,
            loops: 0
        };
    }

    state.visits++;
    localStorage.setItem("state", JSON.stringify(state));

    // ============================================
    // ЭЛЕМЕНТЫ
    // ============================================
    const messageEl = document.getElementById("message");
    const continueBtn = document.getElementById("continueBtn");
    const bookBtn = document.getElementById("bookBtn");
    const gameBtn = document.getElementById("gameBtn");
    const timeEl = document.getElementById("time");
    const quoteEl = document.getElementById("quote");
    const codeInput = document.getElementById("code");
    const centerEl = document.getElementById("center");

    // ============================================
    // ВРЕМЯ
    // ============================================
    const weirdTimes = ["22:22", "11:11", "03:11", "21:11", "00:00", "03:36", "21:16"];
    if (state.loops >= 3) {
        timeEl.innerText = "22:22";
    } else {
        timeEl.innerText = weirdTimes[Math.floor(Math.random() * weirdTimes.length)];
    }

    // ============================================
    // СООБЩЕНИЯ
    // ============================================
    const messages = [
        "восстановление записи...",
        "обнаружены поврежденные фрагменты",
        "наблюдение продолжается",
        "она уже была здесь",
        "сигнал нестабилен",
        "не выключай запись",
        "память не является доказательством",
        "ты снова здесь",
        "216 секунд тишины",
        "лазеры погасли"
    ];
    messageEl.innerText = messages[Math.floor(Math.random() * messages.length)];

    // ============================================
    // ЦИТАТЫ
    // ============================================
    const quotes = [
        "хаотичность можно понять",
        "человек видит то что может видеть",
        "запись продолжается внутри тебя",
        "не существует последнего уровня",
        "она уже повторяла это движение",
        "наблюдение изменяет наблюдаемое",
        "216 → 0x216 ← 216"
    ];
    quoteEl.innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // ============================================
    // ПОЯВЛЕНИЕ ПОЛЯ ДЛЯ КОДА
    // ============================================
    if (state.visits >= 3 && !state.codeUsed) {
        setTimeout(() => {
            codeInput.style.opacity = "0.12";
        }, 7000);
    }

    // ============================================
    // ЭФФЕКТЫ
    // ============================================
    function doFlash() {
        document.body.classList.add("flash");
        setTimeout(() => document.body.classList.remove("flash"), 80);
    }

    function doGlitch() {
        centerEl.classList.add("glitch");
        setTimeout(() => centerEl.classList.remove("glitch"), 100);
    }

    setInterval(() => {
        if (Math.random() > 0.74) doFlash();
    }, 2600);

    setInterval(() => {
        if (Math.random() > 0.82) doGlitch();
    }, 3400);

    // Редкая смена текста на кнопке
    setTimeout(() => {
        if (Math.random() > 0.7) {
            continueBtn.innerText = "◉ НЕ НАЖИМАЙ ◉";
        }
    }, 5000);

    // ============================================
    // КНОПКИ
    // ============================================
    // Главная кнопка — случайный переход
    continueBtn.onclick = () => {
        state.infected++;
        state.loops++;
        localStorage.setItem("state", JSON.stringify(state));

        continueBtn.innerText = "ЗАГРУЗКА...";
        doFlash();

        const pages = [
            "signal.html", "final.html", "time.html", "loop.html",
            "observe.html", "glitch.html", "log.html", "invite.html", "video.html"
        ];
        const randomPage = pages[Math.floor(Math.random() * pages.length)];

        setTimeout(() => {
            window.location.href = randomPage;
        }, 1500);
    };

    // Книга Озарения
    bookBtn.onclick = () => {
        doFlash();
        bookBtn.innerText = "ЗАГРУЗКА...";
        setTimeout(() => {
            window.location.href = "book.html";
        }, 500);
    };

    // 8-битная игра
    gameBtn.onclick = () => {
        doFlash();
        gameBtn.innerText = "ЗАГРУЗКА...";
        setTimeout(() => {
            window.location.href = "game.html";
        }, 500);
    };

    // ============================================
    // СЕКРЕТНЫЙ КОД
    // ============================================
    codeInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            if (codeInput.value.toLowerCase() === "teo867102") {
                state.unlocked = true;
                state.codeUsed = true;
                state.trust += 50;
                localStorage.setItem("state", JSON.stringify(state));
                doFlash();
                setTimeout(() => {
                    window.location.href = "secret.html";
                }, 500);
            } else {
                messageEl.innerText = "код не распознан";
                doFlash();
                setTimeout(() => {
                    messageEl.innerText = messages[Math.floor(Math.random() * messages.length)];
                }, 2000);
            }
            codeInput.value = "";
        }
    });

    // ============================================
    // БЕЗДЕЙСТВИЕ
    // ============================================
    let idleTimer;
    document.addEventListener("mousemove", resetIdle);
    document.addEventListener("click", resetIdle);

    function resetIdle() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            messageEl.innerText = "мы всё ещё ждём";
        }, 30000);
    }
    resetIdle();

    // ============================================
    // КОНСОЛЬ
    // ============================================
    console.log("%c▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓", "color: #d4c5a0");
    console.log("%cHUB — ЦЕНТР СИГНАЛА", "color: #d4c5a0; font-size: 14px;");
    console.log("%cКНИГА ОЗАРЕНИЯ | 8-BIT ИГРА", "color: #8a7a5a; font-size: 11px;");
    console.log("%c▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓", "color: #d4c5a0");
</script>

<script src="audio.js"></script>
</body>
</html>
